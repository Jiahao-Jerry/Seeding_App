"text": "If Biden wants a popular war to boost his numbers, he could do worse than threatening to invade Texas.", "axes": {}}, {"pid": "81828076", "topic": "Pets", "activation": 0.2302, "text": "If I were God, even for just one day, one of the first things I'd do is give back everyone's old dogs, if they wanted them.\n\nBut they would be healthy, with youth restored and they'd remember all the love they'd been given... they'd remember You.\n\nWouldn't that be something?", "axes": {}}, {"pid": "62603612", "topic": "Economy & Jobs", "activation": 0.225, "text": "If I was the government, I would simply tax a billionaire or 5 and buy up the unused office buildings, change the zoning laws, convert that space to mixed use for housing the houseless and give low-interest loans to small business owners who want to open a shop or restaurant on the first floor, with", "axes": {"reading_level": 0.45, "concreteness": 0.65, "narrativity": 0.3, "hedging": 0.75, "tone": 0.55, "warmth": 0.5, "self_disclosure": 0.4, "casualness": 0.65, "humor": 0.5}}, {"pid": "88220162", "topic": "AI & Tech", "activation": 0.2144, "text": "If AI dudes honestly wanted unique and personal experiences with art they would simply try going to a museum, maybe look at experimental and modern art in particular", "axes": {}}, {"pid": "48156444", "topic": "Economy & Jobs", "activation": 0.2139, "text": "Wouldn’t it be great if we had a mainstream critque of what ‘economic growth’ means & to whom?\n\nAnd a population willing to think about it?", "axes": {}}, {"pid": "87534011", "topic": "Transportation & Urbanism", "activation": 0.2017, "text": "The Broadway Market and Square complex in Fells Point should be totally pedestrianized south of Fleet Street with the asphalt ripped out and the area turned into a true public square European type plaza. Also the Belgian block should be replaced with a smoother surface for bicycle + wheelchair tires", "axes": {}}, {"pid": "37074245", "topic": "Climate & Energy", "activation": 0.2002, "text": "we could pump the extra sea water from climate change into the great lakes and make one greater lake", "axes": {"reading_level": 0.3, "concreteness": 0.6, "narrativity": 0.2, "hedging": 0.3, "tone": 0.4, "warmth": 0.5, "self_disclosure": 0.2, "casualness": 0.7, "humor": 0.6}}, {"pid": "174447685", "topic": "Transportation & Urbanism", "activation": 0.1993, "text": "Giving Uber and Lyft the boot is a good start, now Minneapolis needs to work on pedestrianizing large swaths of the city to make driving personal automobiles as miserable as possible. \n\nIf Minneapolis decided to follow the Paris model, we’d be the envy of North America. It’d be a urbanism boomtown.", "axes": {"reading_level": 0.55, "concreteness": 0.6, "narrativity": 0.2, "hedging": 0.2, "tone": 0.65, "warmth": 0.35, "self_disclosure": 0.15, "casualness": 0.45, "humor": 0.5}}, {"pid": "45353202", "topic": "Economy & Jobs", "activation": 0.1985, "text": "Going into an election year it would be helpful if the inflation index could be supplemented with a corporate greed index.", "axes": {}}]}, {"f": 95, "density": 0.2068, "category": "partial_overlap", "lifts": {"reading_level": -0.02, "concreteness": -0.021, "narrativity": 0.053, "hedging": 0.023, "tone": 0.051, "warmth": -0.037, "self_disclosure": 0.047, "casualness": 0.005, "humor": -0.003}, "rs": {"reading_level": -0.05, "concreteness": -0.067, "narrativity": 0.076, "hedging": 0.064, "tone": 0.107, "warmth": -0.073, "self_disclosure": 0.048, "casualness": -0.008, "humor": -0.026}, "best_axis": "tone", "best_r": 0.107, "best_lift": 0.053, "examples": [{"pid": "137882", "topic": "Sports", "activation": 0.2645, "text": "When the NFL reached a settlement promising payouts for former players suffering from dementia, ALS and CTE due to concussions, it was touted as a “landmark” decision. \n\nBut with strict guidelines and aggressive reviews, many former players have been denied, including some who died with CTE.", "axes": {}}, {"pid": "438496", "topic": "Politics", "activation": 0.2506, "text": "Car crashes into Biden's motorcade as president leaves campaign event in Delaware. Biden was rushed into his car and was not involved", "axes": {}}, {"pid": "24942866", "topic": "Transportation & Urbanism", "activation": 0.2415, "text": "It was an honour to ride with everyone today, and heartbreaking to grieve with the family members of Bill Petropoulos. It never gets easier to witness the agony of a family in the aftermath of senseless #RoadViolence. All deaths on our road are completely preventable with Vision Zero design change.", "axes": {}}, {"pid": "6326368", "topic": "Pets", "activation": 0.2295, "text": "Yesterday one of our dog became lethargic.\nWe rushed to the emergency vet.\nDiagnostic: Acute pericardial effusion. \nToday, after two procedures, she's stable.\nThe cause: someone poisoned her.\nI'm so angry and so sad.", "axes": {}}, {"pid": "8322066", "topic": "Sports", "activation": 0.224, "text": "This is just so heartbreaking. “In Wyatt’s brain, researchers discovered the first case of stage 2 CTE to be diagnosed in a high school football player… The Kansas City, Missouri, teen had the worst brain trauma ever seen in someone so young, according to the Concussion Legacy Foundation.”", "axes": {}}, {"pid": "25639176", "topic": "Climate & Energy", "activation": 0.2237, "text": "Disasters raise the question of whether individuals and businesses will be able to protect themselves against the effects of climate change if their insurance companies cannot even get coverage themselves.", "axes": {"reading_level": 0.65, "concreteness": 0.3, "narrativity": 0.1, "hedging": 0.4, "tone": 0.55, "warmth": 0.5, "self_disclosure": 0.0, "casualness": 0.15, "humor": 0.0}}, {"pid": "12187849", "topic": "AI & Tech", "activation": 0.2223, "text": "Until an AI can have a full anxiety attack that leads into days of self doubt or depression because \"something about that eyebrow looked off\" and now it suddenly forgot how to draw eyebrows entirely and is experiencing a personal crisis it'll never begin to understand real art.", "axes": {}}, {"pid": "158585373", "topic": "Pets", "activation": 0.2116, "text": "Our sweet girl Sasha crossed the rainbow Bridge today.  She was a fighter right up until the end.  Her heart stayed strong even though her body was not strong anymore.  We are going to miss her so much.", "axes": {}}, {"pid": "7273801", "topic": "Transportation & Urbanism", "activation": 0.2101, "text": "Road death is not a natural cause of death. Road death is not a natural cause of death. Road death is not a natural cause of death. Traffic death is not a natural cause of death. Traffic death is not a natural cause of death. Traffic death is not a natural cause of death. Traffic death is not a natu", "axes": {}}, {"pid": "12633022", "topic": "Climate & Energy", "activation": 0.2022, "text": "Death should not be the metric by which we evaluate human suffering and ecosystem destruction due to climate change.", "axes": {"reading_level": 0.65, "concreteness": 0.15, "narrativity": 0.0, "hedging": 0.1, "tone": 0.6, "warmth": 0.3, "self_disclosure": 0.0, "casualness": 0.15, "humor": 0.0}}]}, {"f": 96, "density": 0.2359, "category": "confirms_axis", "lifts": {"reading_level": -0.034, "concreteness": 0.015, "narrativity": 0.045, "hedging": -0.039, "tone": 0.055, "warmth": -0.024, "self_disclosure": -0.01, "casualness": 0.053, "humor": 0.158}, "rs": {"reading_level": -0.105, "concreteness": 0.015, "narrativity": 0.094, "hedging": -0.104, "tone": 0.165, "warmth": -0.057, "self_disclosure": -0.028, "casualness": 0.153, "humor": 0.262}, "best_axis": "humor", "best_r": 0.262, "best_lift": 0.158, "examples": [{"pid": "168859763", "topic": "Pets", "activation": 0.2082, "text": "My sweet angel of a dog just belched in a way that sounded like it could have come out of John Goodman", "axes": {}}, {"pid": "39463117", "topic": "Economy & Jobs", "activation": 0.2055, "text": "Using the economy as a measure of individual purchasing power is like trying to estimate the health of your cattle by measuring the size of the ticks that feed on your herd.\n\nLarger ticks mean the cattle must be healthier in order to feed the larger ticks, right?", "axes": {}}, {"pid": "13869031", "topic": "Politics", "activation": 0.2019, "text": "well what if Biden shot rainbows out of his ass and Trump shot nukes out of his who would you vote for THEN??", "axes": {}}, {"pid": "9076710", "topic": "Economy & Jobs", "activation": 0.1944, "text": "When it comes to inflation and popping, nothing beats the long, drawn-out teasing that comes before the inevitable boom~", "axes": {}}, {"pid": "12077750", "topic": "Economy & Jobs", "activation": 0.1924, "text": "Some myths about the economy are like zombies — they just keep crawling back. Here are the three that eat at me the most.", "axes": {}}, {"pid": "5543805", "topic": "Food & Cooking", "activation": 0.1923, "text": "Sweet dreams are made of cheese\nWho am I to dis a brie?\nI've tasted the wheels and the bocconcini\nEmmentaler's looking for something\nSome of them make a fondue\nSome of them make into burrata\nSome of them turn to cheese curds\nSome of them spread on focaccia", "axes": {}}, {"pid": "105699230", "topic": "Politics", "activation": 0.1915, "text": "Biden better hope undersexed suburban PTA moms can break long enough from drinking white claws in the school parking lot to go vote for him because at the rate young voters are checking out they’re the only legs of the big tent left willing to drag his decomposing corpse over the finish line", "axes": {}}, {"pid": "23637875", "topic": "Sports", "activation": 0.1914, "text": "Forget betting on the Super Bowl, bookies should be taking bets on how long Foamstars lasts before End of Service", "axes": {}}, {"pid": "228352617", "topic": "Sports", "activation": 0.191, "text": "Adolis Garcia hit that ball so hard I'm amazed it didn't disintegrate or blast a hole in a fan in the Crawford Boxes", "axes": {}}, {"pid": "72446454", "topic": "Fitness & Gym", "activation": 0.1899, "text": "Hitting the gym more this year, gonna stop by Planet Fitness on my way home from work today and punch it right in the side of the building", "axes": {"reading_level": 0.2, "concreteness": 0.65, "narrativity": 0.5, "hedging": 0.1, "tone": 0.6, "warmth": 0.5, "self_disclosure": 0.5, "casualness": 0.75, "humor": 0.65}}]}, {"f": 97, "density": 0.2784, "category": "partial_overlap", "lifts": {"reading_level": -0.021, "concreteness": -0.033, "narrativity": -0.018, "hedging": 0.009, "tone": 0.005, "warmth": 0.028, "self_disclosure": 0.035, "casualness": 0.022, "humor": -0.01}, "rs": {"reading_level": -0.118, "concreteness": -0.103, "narrativity": -0.02, "hedging": 0.025, "tone": 0.016, "warmth": 0.095, "self_disclosure": 0.092, "casualness": 0.081, "humor": -0.039}, "best_axis": "reading_level", "best_r": -0.118, "best_lift": 0.035, "examples": [{"pid": "25538232", "topic": "Sports", "activation": 0.3169, "text": "Kansas City is playing really well and Baltimore is playing largely like ass and they're ONLY down one score. Chiefs can't be happy about that.", "axes": {}}, {"pid": "12306736", "topic": "Climate & Energy", "activation": 0.2925, "text": "altered carbon, but it's realistic so there's a ton of really really good stuff going on and the bad stuff still happens but is on a downward trend and pretty rare", "axes": {}}, {"pid": "121970361", "topic": "Gardening & Plants", "activation": 0.2884, "text": "These Mister Lincoln roses have always been great, but this year they have just been stunning. They’re like 7 feet tall now?! They’ve never been this tall. 🌱", "axes": {}}, {"pid": "90178935", "topic": "Fitness & Gym", "activation": 0.2333, "text": "Ok this gym session was really good. My posture is miles better, my ankle stability and core strength have both improved a lot, and my left shoulder doesnt dip as badly. I evened up the weights on each side so im actually lifting the same each side now. Plus new leg press pb of 210kg.", "axes": {"reading_level": 0.3, "concreteness": 0.75, "narrativity": 0.5, "hedging": 0.1, "tone": 0.65, "warmth": 0.7, "self_disclosure": 0.8, "casualness": 0.65, "humor": 0.15}}, {"pid": "29170817", "topic": "Food & Cooking", "activation": 0.2329, "text": "Recently tried this soup, pretty nice iced tea! I thought it was cherry but it's actually muscat and it's mixed with some citrus so it's a nice combined grape & citrus flavor\n\nWould recommend to iced tea heads", "axes": {"reading_level": 0.3, "concreteness": 0.75, "narrativity": 0.5, "hedging": 0.25, "tone": 0.35, "warmth": 0.7, "self_disclosure": 0.4, "casualness": 0.65, "humor": 0.3}}, {"pid": "163670698", "topic": "Fitness & Gym", "activation": 0.2319, "text": "bulgarian split squats are amazing. took me a while to get the form but it's so worth it, inflicts more pain with less weight, less spinal and abdominal pressure, just pure leg day.", "axes": {"reading_level": 0.45, "concreteness": 0.65, "narrativity": 0.35, "hedging": 0.15, "tone": 0.6, "warmth": 0.65, "self_disclosure": 0.55, "casualness": 0.55, "humor": 0.2}}, {"pid": "108021819", "topic": "Video Games", "activation": 0.2184, "text": "people are saying the Deagle in PUBG is an awful weapon, huge recoil, middling damage, low magazine capacity, terrible accuracy, and to that i say, that is a fantastic simulation of the Deagle shooting experience", "axes": {}}, {"pid": "1823055", "topic": "Movies & Film", "activation": 0.2127, "text": "Watched Tremors on SyFy and it still holds up. A simple premise executed in brilliant B-movie fashion. Imagine trying to get that made today.", "axes": {}}, {"pid": "31677962", "topic": "Movies & Film", "activation": 0.2093, "text": "It is very much an anti-cop documentary and the people behind it are fascinating characters. \nFive stars.", "axes": {"reading_level": 0.25, "concreteness": 0.3, "narrativity": 0.15, "hedging": 0.1, "tone": 0.35, "warmth": 0.55, "self_disclosure": 0.2, "casualness": 0.55, "humor": 0.15}}, {"pid": "26033662", "topic": "Photography", "activation": 0.2038, "text": "I have zero regrets in bringing the ancient Fujifilm X-M1 to Chicago. It is a very compact and capable street photography camera.", "axes": {}}]}, {"f": 98, "density": 0.0, "category": "dead", "lifts": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "rs": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "best_axis": "reading_level", "best_r": 0.0, "best_lift": 0.0, "examples": []}, {"f": 99, "density": 0.0, "category": "dead", "lifts": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "rs": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "best_axis": "reading_level", "best_r": 0.0, "best_lift": 0.0, "examples": []}, {"f": 100, "density": 0.1848, "category": "confirms_axis", "lifts": {"reading_level": -0.008, "concreteness": -0.041, "narrativity": -0.054, "hedging": -0.03, "tone": 0.056, "warmth": -0.098, "self_disclosure": -0.061, "casualness": -0.004, "humor": 0.03}, "rs": {"reading_level": 0.011, "concreteness": -0.088, "narrativity": -0.153, "hedging": -0.014, "tone": 0.127, "warmth": -0.209, "self_disclosure": -0.124, "casualness": -0.043, "humor": -0.001}, "best_axis": "warmth", "best_r": -0.209, "best_lift": -0.098, "examples": [{"pid": "6444384", "topic": "Economy & Jobs", "activation": 0.3298, "text": "NEW: How the Ultrawealthy Use Private Foundations to Bank Huge Tax Breaks While Giving the Public Little in Return\n\nThe rich get huge tax breaks by donating art, property and company shares to benefit the public. But some donors collect millions while offering little or no public access.", "axes": {"reading_level": 0.55, "concreteness": 0.65, "narrativity": 0.2, "hedging": 0.2, "tone": 0.65, "warmth": 0.25, "self_disclosure": 0.0, "casualness": 0.15, "humor": 0.0}}, {"pid": "19920877", "topic": "Higher Education", "activation": 0.3116, "text": "My favorite part about academia is how you get to pay taxes on reimbursements, which are reimbursing money you already paid taxes on. \nThere really must be a better way...", "axes": {}}, {"pid": "18754444", "topic": "Video Games", "activation": 0.3065, "text": "Normalise buying indie games at full price instead of waiting for them to go on sale\n\nFolks seem perfectly happy to fork out $70-120 on a big name game where all the profit goes to CEOs, but refuse to spend $20 on an indie game where it goes to the people who made it", "axes": {"reading_level": 0.45, "concreteness": 0.65, "narrativity": 0.2, "hedging": 0.2, "tone": 0.6, "warmth": 0.35, "self_disclosure": 0.15, "casualness": 0.55, "humor": 0.25}}, {"pid": "17459478", "topic": "Transportation & Urbanism", "activation": 0.2937, "text": "bought an electric bike on 2 years interest free. the $24 a week repayments should nearly be covered by the amount i’m gonna save on petrol just going back and forth to mahi :)", "axes": {}}, {"pid": "601310", "topic": "Economy & Jobs", "activation": 0.2824, "text": "Chris Christie's solution to Social Security solvency is that Warren Buffet should not get his $4000/month. That'll totally work.", "axes": {}}, {"pid": "22977367", "topic": "Economy & Jobs", "activation": 0.261, "text": "\"if we tax the rich then they'll move their money somewhere else\"\n\nDuh, they're not paying us any money, that is precisely the point.", "axes": {}}, {"pid": "885506", "topic": "Video Games", "activation": 0.2606, "text": "Millions of kids design games on Roblox.\n\nBut the company pays in Robux, and doesn't let you cash out until you hit 30,000. That should be $300, but after the company cut it's just $105.\n\nSo kids are being underpaid, while the CEO took $232 million last year.", "axes": {}}, {"pid": "56952598", "topic": "Music", "activation": 0.2502, "text": "This Bandcamp Friday, I'll buy some tunes and bulk download my entire Bandcamp collection with Batchcamp browser extension...", "axes": {"reading_level": 0.55, "concreteness": 0.75, "narrativity": 0.35, "hedging": 0.1, "tone": 0.4, "warmth": 0.5, "self_disclosure": 0.4, "casualness": 0.55, "humor": 0.3}}, {"pid": "132662", "topic": "Economy & Jobs", "activation": 0.2475, "text": "A staggering $50 trillion. That is how much the upward redistribution of income has cost American workers over the past several decades.", "axes": {}}, {"pid": "84224707", "topic": "Economy & Jobs", "activation": 0.2397, "text": "\"If we tax corporations, corporations will only pass the cost on to the consumer.\"\n\nI've got news for you, guys.  If we *don't* tax corporations, the government will pass the taxes on to the taxpayer.\n\nPersonally, I'd rather see McDonald's pay some more in taxes and justify a more expensive Big Mac.", "axes": {"reading_level": 0.35, "concreteness": 0.65, "narrativity": 0.25, "hedging": 0.2, "tone": 0.6, "warmth": 0.4, "self_disclosure": 0.4, "casualness": 0.65, "humor": 0.5}}]}, {"f": 101, "density": 0.1913, "category": "partial_overlap", "lifts": {"reading_level": 0.026, "concreteness": 0.008, "narrativity": -0.038, "hedging": -0.002, "tone": -0.039, "warmth": -0.002, "self_disclosure": -0.073, "casualness": -0.028, "humor": -0.063}, "rs": {"reading_level": 0.029, "concreteness": -0.022, "narrativity": -0.091, "hedging": -0.01, "tone": -0.074, "warmth": -0.029, "self_disclosure": -0.128, "casualness": -0.061, "humor": -0.09}, "best_axis": "self_disclosure", "best_r": -0.128, "best_lift": -0.073, "examples": [{"pid": "35242236", "topic": "Books & Reading", "activation": 0.3407, "text": "Found my book at the CPL Lincoln Square branch the other day, pretty neat! chipublib.bibliocommons.com/v2/record/S1...", "axes": {}}, {"pid": "56297396", "topic": "Transportation & Urbanism", "activation": 0.2987, "text": "Breaking: NYC DOT crunched the numbers and found that speed cameras simply work: nyc.streetsblog.org/2023/08/28/s...", "axes": {}}, {"pid": "103790", "topic": "Climate & Energy", "activation": 0.2876, "text": "Montreal to ban use of propane, natural gas, heating oil in new buildings montrealgazette.com/news/local-n...", "axes": {}}, {"pid": "7754944", "topic": "Books & Reading", "activation": 0.2869, "text": "My thoughts on Between The Chalk And The Sea by Gail Simmonds and published by Headline\n\nhalfmanhalfbook.co.uk/review/betwe...", "axes": {}}, {"pid": "18178755", "topic": "Ancient History", "activation": 0.2709, "text": "Sometimes there are hidden gems on internet. Here, enjoy oldest mentions of bipaliids in China and Japan   www2u.biglobe.ne.jp/~gen-yu/koug...", "axes": {}}, {"pid": "29719978", "topic": "Economy & Jobs", "activation": 0.2632, "text": "Case-Shiller: National House Price Index Up 4.8% year-over-year in October\nFHFA: House Prices \"Up 6.3 Percent from Last Year\" calculatedrisk.substack.com/p/case-shill...", "axes": {}}, {"pid": "1241879", "topic": "Fitness & Gym", "activation": 0.2617, "text": "Standing Squat To Knees\nImprove Strength In 50s\n3 Sets 12 Reps\n#legs #workout #coach \nonlyfans.com/bisexualcoach", "axes": {}}, {"pid": "50477527", "topic": "Sports", "activation": 0.2585, "text": "The QMJHL has banned fighting. The OHL has taken steps against it. The NCAA is fight-free.\n\nWill the trend against fighting ever trickle up to the NHL? \n\nAnd should it?\n\n$1/month to subscribe:\ntheathletic.com/4872524/2023...", "axes": {"reading_level": 0.35, "concreteness": 0.65, "narrativity": 0.35, "hedging": 0.6, "tone": 0.4, "warmth": 0.5, "self_disclosure": 0.05, "casualness": 0.3, "humor": 0.0}}, {"pid": "3400005", "topic": "Food & Cooking", "activation": 0.2502, "text": "I need to make a “here, smell this” post: NYT’s tater tot hotdish recipe cooking.nytimes.com/recipes/1020...", "axes": {"reading_level": 0.3, "concreteness": 0.6, "narrativity": 0.2, "hedging": 0.05, "tone": 0.55, "warmth": 0.7, "self_disclosure": 0.35, "casualness": 0.65, "humor": 0.6}}, {"pid": "33156805", "topic": "Music", "activation": 0.2452, "text": "From free jazz to contemporary modern ensemble music, Halvorson has made thoughtful arrangements for Amaryllis. dustedmagazine.tumblr.com/post/7415899...", "axes": {}}]}, {"f": 102, "density": 0.2248, "category": "confirms_axis", "lifts": {"reading_level": -0.009, "concreteness": -0.009, "narrativity": 0.017, "hedging": 0.053, "tone": -0.027, "warmth": 0.016, "self_disclosure": 0.119, "casualness": 0.03, "humor": -0.014}, "rs": {"reading_level": -0.087, "concreteness": -0.074, "narrativity": 0.013, "hedging": 0.136, "tone": -0.075, "warmth": 0.033, "self_disclosure": 0.202, "casualness": 0.102, "humor": -0.02}, "best_axis": "self_disclosure", "best_r": 0.202, "best_lift": 0.119, "examples": [{"pid": "77418121", "topic": "Food & Cooking", "activation": 0.2577, "text": "I've just mushed up a load of Frosties and milk into a paste and used it to fill the gaps between my tiles. They're grrrrrrrout!", "axes": {}}, {"pid": "10781677", "topic": "Fitness & Gym", "activation": 0.2506, "text": "I've heard people grunt/scream their way through deadlifts, but until today I'd never heard someone moan through an entire yoga class", "axes": {}}, {"pid": "55919333", "topic": "Music", "activation": 0.2458, "text": "does anyone have a good record player recommendation. do not be scared to name anything pricy fuck crosley", "axes": {"reading_level": 0.2, "concreteness": 0.3, "narrativity": 0.05, "hedging": 0.1, "tone": 0.65, "warmth": 0.5, "self_disclosure": 0.2, "casualness": 0.75, "humor": 0.5}}, {"pid": "34387221", "topic": "Pets", "activation": 0.2333, "text": "Starting to suspect one of my colleagues at work is a furry…\n\nHe’s absolutely obsessed with Kung Fu Panda.", "axes": {}}, {"pid": "59994167", "topic": "Economy & Jobs", "activation": 0.2225, "text": "I'm not an economist, but if you suck money out of circulation into banks & offshore accounts you're gonna spiral down into recession, Rishi.", "axes": {}}, {"pid": "22872684", "topic": "Photography", "activation": 0.2127, "text": "Currently analysing images I've taken with 3 cameras; a Zenit TTL, a Nikon FE and a Canon AE-1. All Ilford HP5+. Taken in the same place, same light. Scanned and post processed with the same settings. An interesting experiment to test the cameras. #believeinfilm #filmisnotdead", "axes": {}}, {"pid": "71480280", "topic": "AI & Tech", "activation": 0.2112, "text": "Actually knowing differential geometry makes me want to tear my eyes out every time AI people say 'tensor'", "axes": {}}, {"pid": "138311470", "topic": "Photography", "activation": 0.211, "text": "I've been developing a backlog of film and I can't remember where some of the photos were taken. This is Wigan I think.", "axes": {"reading_level": 0.2, "concreteness": 0.6, "narrativity": 0.5, "hedging": 0.6, "tone": 0.2, "warmth": 0.5, "self_disclosure": 0.6, "casualness": 0.6, "humor": 0.0}}, {"pid": "59534689", "topic": "Transportation & Urbanism", "activation": 0.2073, "text": "I just found out that Americans generally don't call traffic cones \"pylons\". I've called them both, but I usually say pylon.", "axes": {}}, {"pid": "23872677", "topic": "Climate & Energy", "activation": 0.2067, "text": "I'm pretty sure this is false, bunker fuel is nasty shit, but the entire global shipping industry's carbon emissions or a drop in the bucket compared to automobiles/aviation. \n\nI'd be interested to see the numbers you're using.", "axes": {"reading_level": 0.45, "concreteness": 0.35, "narrativity": 0.1, "hedging": 0.65, "tone": 0.35, "warmth": 0.5, "self_disclosure": 0.15, "casualness": 0.55, "humor": 0.2}}]}, {"f": 103, "density": 0.1657, "category": "novel_candidate", "lifts": {"reading_level": 0.005, "concreteness": 0.027, "narrativity": 0.014, "hedging": -0.026, "tone": -0.017, "warmth": 0.005, "self_disclosure": -0.047, "casualness": -0.024, "humor": -0.013}, "rs": {"reading_level": 0.018, "concreteness": 0.074, "narrativity": 0.034, "hedging": -0.059, "tone": -0.075, "warmth": 0.029, "self_disclosure": -0.075, "casualness": -0.089, "humor": -0.055}, "best_axis": "casualness", "best_r": -0.089, "best_lift": -0.047, "examples": [{"pid": "137810351", "topic": "Food & Cooking", "activation": 0.3652, "text": "The birth place of xiao long bao. With the original intended side - egg slice and dried scallop soup, and the condiment of ginger infused young rice vinegar.", "axes": {}}, {"pid": "16987925", "topic": "Economy & Jobs", "activation": 0.3336, "text": "Last week, Xinjiang government promotes tourism of the region, but the replies are filled with local residents complaining about commodity prices.\n\nOn this Monday, suddenly a lot of videos surfaced where local residents apologize for saying the prices are too high", "axes": {"reading_level": 0.45, "concreteness": 0.65, "narrativity": 0.7, "hedging": 0.2, "tone": 0.65, "warmth": 0.25, "self_disclosure": 0.05, "casualness": 0.4, "humor": 0.5}}, {"pid": "45694510", "topic": "Space & Astronomy", "activation": 0.3153, "text": "The Indian space program has managed another amazing feat in a short period of time with far less resources than most. Congrats to all involved.", "axes": {}}, {"pid": "44489987", "topic": "AI & Tech", "activation": 0.3076, "text": "Chinese tech firm iFlytek is in hot water after being accused of selling an AI-assisted tablet that generated an essay critical of Chairman Mao Zedong.", "axes": {}}, {"pid": "2137584", "topic": "Books & Reading", "activation": 0.2621, "text": "“An author with a physical disability on Wednesday won Japan’s prestigious Akutagawa literary award for the first time for her work about a disabled woman’s anger and desires.”", "axes": {}}, {"pid": "151592655", "topic": "Food & Cooking", "activation": 0.2602, "text": "中華丼 (Chuka-don) is a Japanese dish consisting of a bowl of rice topped with a stir-fried mixture of vegetables, meat, and seafood in a starchy sauce. It is a popular dish in Japan and is often served as a quick and easy meal.", "axes": {}}, {"pid": "17176986", "topic": "Food & Cooking", "activation": 0.2545, "text": "It's been a while since I cooked Afghan food. Chalaw (basmati rice), qorma e murgh (chicken curry), bamiya (okra).", "axes": {"reading_level": 0.45, "concreteness": 0.8, "narrativity": 0.5, "hedging": 0.1, "tone": 0.3, "warmth": 0.6, "self_disclosure": 0.5, "casualness": 0.55, "humor": 0.0}}, {"pid": "158386", "topic": "Climate & Energy", "activation": 0.2469, "text": "Indonesia's President Joko Widodo on Wednesday inaugurated a 192 megawatt peak (MWp) floating solar power plant on a reservoir in West Java province as part of a drive to increase renewable energy sources and switch away from coal.", "axes": {"reading_level": 0.55, "concreteness": 0.75, "narrativity": 0.35, "hedging": 0.1, "tone": 0.2, "warmth": 0.5, "self_disclosure": 0.0, "casualness": 0.15, "humor": 0.0}}, {"pid": "3142170", "topic": "AI & Tech", "activation": 0.23, "text": "China’s AI industry exploits student interns from vocational schools, making them do tedious and labor-intensive data labeling work to fulfill their graduation requirements\nrestofworld.org/2023/china-a...", "axes": {}}, {"pid": "112949656", "topic": "Economy & Jobs", "activation": 0.2293, "text": "After years of blaming inflation on local factors, 2 major conflicts is going to see National blame the continuing inflation on overseas factors.", "axes": {}}]}, {"f": 104, "density": 0.2529, "category": "partial_overlap", "lifts": {"reading_level": -0.004, "concreteness": 0.067, "narrativity": -0.024, "hedging": -0.021, "tone": 0.006, "warmth": -0.029, "self_disclosure": -0.035, "casualness": -0.011, "humor": -0.005}, "rs": {"reading_level": -0.027, "concreteness": 0.17, "narrativity": -0.089, "hedging": -0.031, "tone": -0.002, "warmth": -0.063, "self_disclosure": -0.056, "casualness": -0.042, "humor": -0.012}, "best_axis": "concreteness", "best_r": 0.17, "best_lift": 0.067, "examples": [{"pid": "132662", "topic": "Economy & Jobs", "activation": 0.2964, "text": "A staggering $50 trillion. That is how much the upward redistribution of income has cost American workers over the past several decades.", "axes": {}}, {"pid": "86916222", "topic": "Food & Cooking", "activation": 0.2928, "text": "I just made my first food … thing. Recipe? I didnt make the recipe. \n\nI just cooked using 100% metric. 800g chicken, 800g potatoes, 50g this, 50g that.\n\nSo gd easy.", "axes": {}}, {"pid": "35838884", "topic": "Climate & Energy", "activation": 0.2778, "text": "I would discount anything published in an MDPI journal so maybe instead of global warming of 2°C killing roughly 1 billion humans, it's only 500 million.", "axes": {}}, {"pid": "16143566", "topic": "Video Games", "activation": 0.2635, "text": "Sony Interactive Entertainment is laying off about 900 PlayStation employees worldwide, a reduction of about 8%, the company announced this week.", "axes": {}}, {"pid": "42662043", "topic": "Video Games", "activation": 0.2631, "text": "Game is too short and definitely not worth $60. I was only able to squeeze a little over two days of playtime out of it in a week.\n\nTherefore I give it a 2 out of 7.", "axes": {}}, {"pid": "27142566", "topic": "Fitness & Gym", "activation": 0.263, "text": "eating 3750 calories a day and stuck at 230lbs I’m gonna have to do ~4250 a day to hit 250 by december 👀", "axes": {}}, {"pid": "25299480", "topic": "Higher Education", "activation": 0.26, "text": "oh, guess what?\n\n\"What would it take to solve the WVU budget crisis? Cutting administrative payroll back to 2013 levels would completely eliminate the FY 2024 budget deficit. Cutting it back to to 85% of 2013 levels, to match the decline in enrollment, would generate savings of $74 million.\"", "axes": {}}, {"pid": "30248224", "topic": "Birds & Nature", "activation": 0.2561, "text": "I love birds, I really do, but I'm not sure how excited I am for the geese to return 😆 \nMost recent Svalbard summer population estimates are 80000 pink-footed geese, 35000 barnacle geese and 6000 brent geese.\n\nThat's 121000 geese, or almost 50 per person. That's too many geese.", "axes": {}}, {"pid": "72432483", "topic": "Climate & Energy", "activation": 0.2494, "text": "Fun fact: Europa is tiny, about 10% smaller than the moon. Its gravity is 13% of earth's.\n\nIts ocean is 60 to 150 kilometers deep, compared to earth's deepest spot, the Challenger Deep, at 11km.\n\nDue to its low gravity, the bottom of Europa's ocean is about the same pressure as that of Earth's.", "axes": {}}, {"pid": "72002245", "topic": "Gardening & Plants", "activation": 0.2477, "text": "Today's haul of Supremo, Sweet Million, Sugary and Yellow Pear tomatoes: 2.210kg which is just shy of five pounds. 🌱", "axes": {}}]}, {"f": 105, "density": 0.1858, "category": "partial_overlap", "lifts": {"reading_level": 0.007, "concreteness": -0.051, "narrativity": -0.03, "hedging": -0.012, "tone": 0.02, "warmth": -0.016, "self_disclosure": -0.026, "casualness": -0.03, "humor": -0.047}, "rs": {"reading_level": 0.044, "concreteness": -0.132, "narrativity": -0.09, "hedging": -0.004, "tone": 0.074, "warmth": -0.054, "self_disclosure": -0.058, "casualness": -0.067, "humor": -0.066}, "best_axis": "concreteness", "best_r": -0.132, "best_lift": -0.051, "examples": [{"pid": "14576474", "topic": "Higher Education", "activation": 0.5765, "text": "DEI initiatives are necessary because we live in a society that continues to be driven by both conscious and unconscious bigotry.", "axes": {}}, {"pid": "42824521", "topic": "Higher Education", "activation": 0.3002, "text": "For faculty and trainees from historically excluded groups, diversity statements make traditionally invisible labor and expertise visible. In the absence of institutional support, these efforts will go back to being invisible and unvalued", "axes": {"reading_level": 0.7, "concreteness": 0.3, "narrativity": 0.15, "hedging": 0.2, "tone": 0.55, "warmth": 0.5, "self_disclosure": 0.05, "casualness": 0.2, "humor": 0.0}}, {"pid": "45297118", "topic": "Video Games", "activation": 0.2719, "text": "When we're designing queer games we need to ask ourselves, what makes a game queer, what are moments that people say \"gay\", can we evoke queerness mechanically? How many labels do we want to represent and how many aspects of one label do we want to represent?\n\nIt's a blast to do.", "axes": {"reading_level": 0.6, "concreteness": 0.4, "narrativity": 0.2, "hedging": 0.2, "tone": 0.55, "warmth": 0.65, "self_disclosure": 0.4, "casualness": 0.5, "humor": 0.25}}, {"pid": "6868784", "topic": "Politics", "activation": 0.2705, "text": "🤔\n\nMy Black friends have been talking about baby Hind and the Red Crescent.\n\nMy white friends have been talking about Biden's age.", "axes": {"reading_level": 0.3, "concreteness": 0.6, "narrativity": 0.5, "hedging": 0.2, "tone": 0.55, "warmth": 0.4, "self_disclosure": 0.6, "casualness": 0.7, "humor": 0.5}}, {"pid": "50146423", "topic": "Higher Education", "activation": 0.2669, "text": "If you start your DEI video with a white woman saying “What’s up what’s up what’s up” you have no grasp of actual DEI", "axes": {"reading_level": 0.3, "concreteness": 0.65, "narrativity": 0.2, "hedging": 0.1, "tone": 0.7, "warmth": 0.15, "self_disclosure": 0.05, "casualness": 0.65, "humor": 0.6}}, {"pid": "1566632", "topic": "Politics", "activation": 0.2611, "text": "Who could have guessed that this racist border bill would add Latine people to the growing list of young, Black, MENA, and Muslim voters abandoning Biden?", "axes": {"reading_level": 0.45, "concreteness": 0.35, "narrativity": 0.2, "hedging": 0.15, "tone": 0.65, "warmth": 0.25, "self_disclosure": 0.0, "casualness": 0.5, "humor": 0.45}}, {"pid": "29114279", "topic": "Books & Reading", "activation": 0.2574, "text": "If you’re interested in the history of America labor which highlights the contributions of women, BIPOC, and queer peoples (and sheds light on the deplorable conditions of prison labor), I highly recommend Kim Kelly’s Fight Like Hell", "axes": {}}, {"pid": "4527074", "topic": "Higher Education", "activation": 0.2559, "text": "No one should be surprised by the mass abandoning of DEI efforts because most NEVER understood, cared about or bought into a reality that acknowledges and seeks to repair the inequity and harm resulting from systems, institutions, and policies DESIGNED to privilege the few at the expense of the many", "axes": {}}, {"pid": "191236688", "topic": "Books & Reading", "activation": 0.2377, "text": "Black Cake by Charmaine Wilkerson has superb storytelling, beautifully woven together in a complex family history that crosses oceans and generations. It’s a warm and delicious embrace of a novel.", "axes": {}}, {"pid": "11785710", "topic": "Music", "activation": 0.2374, "text": "Witnessing Janelle Monaé’s evolution from a Philip K. Dick inspired dystopian afrofuturist to an artist who works almost exclusively in the present as a vessel of body positive queer Black joy and realizing it’s all a purposeful act of revolutionary sonic warfare against our oppressive status quo", "axes": {}}]}, {"f": 106, "density": 0.0, "category": "dead", "lifts": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "rs": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "best_axis": "reading_level", "best_r": 0.0, "best_lift": 0.0, "examples": []}, {"f": 107, "density": 0.0, "category": "dead", "lifts": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "rs": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "best_axis": "reading_level", "best_r": 0.0, "best_lift": 0.0, "examples": []}, {"f": 108, "density": 0.0, "category": "dead", "lifts": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "rs": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "best_axis": "reading_level", "best_r": 0.0, "best_lift": 0.0, "examples": []}, {"f": 109, "density": 0.0936, "category": "partial_overlap", "lifts": {"reading_level": 0.056, "concreteness": -0.063, "narrativity": -0.081, "hedging": 0.017, "tone": 0.012, "warmth": -0.078, "self_disclosure": -0.109, "casualness": -0.073, "humor": -0.089}, "rs": {"reading_level": 0.076, "concreteness": -0.164, "narrativity": -0.138, "hedging": 0.001, "tone": 0.06, "warmth": -0.141, "self_disclosure": -0.124, "casualness": -0.115, "humor": -0.078}, "best_axis": "concreteness", "best_r": -0.164, "best_lift": -0.109, "examples": [{"pid": "19045646", "topic": "Climate & Energy", "activation": 0.3468, "text": "We are failing to meet not just the challenge of the climate crisis – but all of the other Sustainable Development Goals as well.", "axes": {}}, {"pid": "30532985", "topic": "Climate & Energy", "activation": 0.2974, "text": "Australia's greenhouse gas emissions are slightly rising, and have been for the tenure so far of centre-left PM Anthony Albanese", "axes": {}}, {"pid": "41736527", "topic": "Climate & Energy", "activation": 0.2961, "text": "We can still prevent the collapse of the West Antarctic ice sheet – if we act fast to keep future warming in check", "axes": {}}, {"pid": "14837643", "topic": "Climate & Energy", "activation": 0.2856, "text": "China, the world’s largest climate polluter, has agreed in a deal with the United States to reduce planet-warming emissions from the power sector and to curb all greenhouse gases.", "axes": {}}, {"pid": "4518800", "topic": "Climate & Energy", "activation": 0.2849, "text": "The COP28 text being agreed upon while the Alliance of Small Island States wasn’t even in the room is highly symbolic.", "axes": {}}, {"pid": "5972035", "topic": "Climate & Energy", "activation": 0.2503, "text": "Did you know that the IEA 1.5°C scenario (Net Zero CO2 emissions in 2050) uses a lot less Carbon Dioxide Removal than scenarios assessed by the IPCC...\n\nMost IPCC assessed scenarios still use excessive amounts of Bioenergy with CCS (BECCS).\n\n(Afforestation not included here)", "axes": {}}, {"pid": "112911675", "topic": "Climate & Energy", "activation": 0.2402, "text": "The UN and IPCC say the point of no return for climate change is 2028. 2028. Why are you all not freaking out about this? We're fucked. We're so fucked and no one is panicking.", "axes": {"reading_level": 0.25, "concreteness": 0.35, "narrativity": 0.2, "hedging": 0.05, "tone": 0.85, "warmth": 0.2, "self_disclosure": 0.4, "casualness": 0.75, "humor": 0.0}}, {"pid": "31173519", "topic": "Climate & Energy", "activation": 0.238, "text": "53% of all greenhouse gas emissions currently in the atmosphere were added after I was born \n\n(which was just before James Hansen testified about the impacts of global warming in US congress)", "axes": {}}, {"pid": "83163174", "topic": "Climate & Energy", "activation": 0.2365, "text": "\"Judge Rules in Favor of Montana Youths in a Landmark Climate Case / The court found that young people have a constitutional right to a healthful environment and that the state must consider potential climate damage when approving projects.\"", "axes": {}}, {"pid": "22879521", "topic": "Climate & Energy", "activation": 0.2304, "text": "Figueres should do an apology tour to all the youth climate activists she painted as radicals for figuring out early on that fossil fuel companies will never be willing partners in energy transition. OR she can spend the rest of her life telling Gates, Bloomberg, Kerry to stfu. I’ll take either", "axes": {}}]}, {"f": 110, "density": 0.2884, "category": "confirms_axis", "lifts": {"reading_level": 0.031, "concreteness": 0.061, "narrativity": -0.036, "hedging": -0.02, "tone": -0.025, "warmth": -0.003, "self_disclosure": -0.048, "casualness": -0.027, "humor": -0.05}, "rs": {"reading_level": 0.055, "concreteness": 0.204, "narrativity": -0.08, "hedging": -0.091, "tone": -0.1, "warmth": 0.021, "self_disclosure": -0.075, "casualness": -0.054, "humor": -0.076}, "best_axis": "concreteness", "best_r": 0.204, "best_lift": 0.061, "examples": [{"pid": "28735934", "topic": "Gardening & Plants", "activation": 0.5236, "text": "Seed starts planted for veggie garden! Bean, peas, lettuce, carrots, squash, assorted hot peppers, sweet peppers, cukes, onions, 9 types of tomatoes", "axes": {}}, {"pid": "43785930", "topic": "Sports", "activation": 0.3306, "text": "sixers really missing joel embiid and allen iverson and charles barkley and julius erving and wilt chamberlain today", "axes": {}}, {"pid": "71291502", "topic": "Gardening & Plants", "activation": 0.3187, "text": "🤗🤗Time to sow tomatoes 🍅 and chilis 🌶️ … lost for choice: Black Crimean, Krakus, Brad‘s Atomic Grape?…Pumpkin chili? Habanero? Serrano? Scotch Bonnet? 🤨🤨🤨", "axes": {}}, {"pid": "18614208", "topic": "Music", "activation": 0.3106, "text": "What are your go-to fall bands? Some of mine: The Church, Ida, Gemma Hayes, Jill Scott, Deerhunter, Elbow, Elliott Smith, and Yo La Tengo.", "axes": {}}, {"pid": "33261921", "topic": "Climate & Energy", "activation": 0.2972, "text": "DON’T BUY THE SUSTAINABLE PALM OIL LIE. \n\nRSPO members including FerreroUK, WWF PepsiCo Mondelez, Cargill, Wilmar, Nutella, Nestle, Girl Scout cookies, Unilever…\nhave bought from mills responsible for: \n\nland grabbing, child labor, species extinction, deforestation..\n\n#BanPalmOil", "axes": {}}, {"pid": "83252400", "topic": "Birds & Nature", "activation": 0.2956, "text": "Seen this morning at Montrose Point:\nblack-and-white warbler\nbay-breasted warbler\nchestnut-sided warbler\nTennessee warbler", "axes": {}}, {"pid": "203170597", "topic": "Movies & Film", "activation": 0.2949, "text": "All About Eve rules but also: The Thin Man; Bringing Up Baby; Fred and Ginger films; The Lady Vanishes", "axes": {}}, {"pid": "93350561", "topic": "Transportation & Urbanism", "activation": 0.2743, "text": "Just some of the many places it would make sense to have subway stations in Bmore:\nHollins Market\nCross Street Market\nUMD Medical Center\nBon Secours Hospital\nMonument b/t Patterson Park & Milton\nBasically all of North Ave and Eastern Ave\nPenn Station\nJHU/Union Memorial/BMA\nHampden\nHarlem Square", "axes": {}}, {"pid": "230373492", "topic": "Books & Reading", "activation": 0.2741, "text": "10 authors I've read at least 5 books by\n\nElizabeth Bowen\nVirginia Woolf\nJohn Banville\nMichael Moorcock\nUrsula Le Guin\nRK Narayan\nYasunari Kawabata\nLouise Glück\nBruce Coville\nRoberto Bolaño", "axes": {}}, {"pid": "2981015", "topic": "Climate & Energy", "activation": 0.2676, "text": "Taking care of the Planet\nInvest in renewable energia, such as solar energy, wind energy, geothermal energy, hydro energy, ocean energy, bioenergy.\nReplacement fossil fuels - coal, oil and gas \n\nNo War\nPeace on Earth", "axes": {"reading_level": 0.3, "concreteness": 0.65, "narrativity": 0.1, "hedging": 0.05, "tone": 0.4, "warmth": 0.6, "self_disclosure": 0.0, "casualness": 0.5, "humor": 0.0}}]}, {"f": 111, "density": 0.4872, "category": "partial_overlap", "lifts": {"reading_level": 0.025, "concreteness": -0.003, "narrativity": 0.022, "hedging": 0.02, "tone": -0.018, "warmth": 0.046, "self_disclosure": 0.054, "casualness": -0.011, "humor": -0.084}, "rs": {"reading_level": 0.028, "concreteness": -0.046, "narrativity": -0.036, "hedging": -0.002, "tone": -0.077, "warmth": 0.1, "self_disclosure": 0.04, "casualness": -0.042, "humor": -0.122}, "best_axis": "humor", "best_r": -0.122, "best_lift": -0.084, "examples": [{"pid": "18234468", "topic": "Birds & Nature", "activation": 4.2961, "text": "pspspsps 🐯\n\nRidhhi (Tigress) at Ranthambhore National Park, India - Feb 2024.\n\nThis was her heading to get her 3 cubs (8 months old) \n\n🦊 📸📸", "axes": {}}, {"pid": "2559340", "topic": "Higher Education", "activation": 2.8531, "text": "\"The functional equivalent of an atomic bomb at WVU.\" Welcome coverage of the austerity scandal today in The Nation.", "axes": {}}, {"pid": "138313436", "topic": "Gardening & Plants", "activation": 2.8022, "text": "heehee oopsie whoopsie daisies found a forgotten cucumber this morning hiding under the dayflowers in the garden... free seeds for next year! 🌱", "axes": {}}, {"pid": "35456756", "topic": "Economy & Jobs", "activation": 2.1759, "text": "If the economy is so good why are there layoffs in almost every industry announced several times a day", "axes": {}}, {"pid": "42110324", "topic": "AI & Tech", "activation": 2.1306, "text": "Anyone who thinks artificial intelligence will replace actual writers has never heard a software engineer tell a story.", "axes": {}}, {"pid": "123001797", "topic": "Politics", "activation": 2.1193, "text": "with a single ad Democrats just did more damage to Biden’s re-election than every leftist you hate combined", "axes": {}}, {"pid": "36217749", "topic": "Food & Cooking", "activation": 2.0799, "text": "First day off breakfast. Some crepes filled with frozen fruit I had in the freezer and some breakfast potatoes.", "axes": {}}, {"pid": "79565319", "topic": "Politics", "activation": 2.0054, "text": "If Biden wants a popular war to boost his numbers, he could do worse than threatening to invade Texas.", "axes": {}}, {"pid": "8428337", "topic": "Sports", "activation": 2.0019, "text": "Dan Wetzel of Yahoo Sports is reporting a developing scandal involving the Michigan football team and stealing signs.", "axes": {}}, {"pid": "14331701", "topic": "Food & Cooking", "activation": 1.958, "text": "Come over for taco night babe, I’m using Grandma Werling’s Taco Beef Filling with extra torula yeast", "axes": {}}]}, {"f": 112, "density": 0.2399, "category": "novel_candidate", "lifts": {"reading_level": 0.001, "concreteness": 0.025, "narrativity": -0.016, "hedging": -0.006, "tone": -0.018, "warmth": 0.024, "self_disclosure": -0.034, "casualness": 0.004, "humor": 0.039}, "rs": {"reading_level": -0.044, "concreteness": 0.085, "narrativity": -0.006, "hedging": -0.008, "tone": -0.068, "warmth": 0.068, "self_disclosure": -0.009, "casualness": 0.034, "humor": 0.081}, "best_axis": "concreteness", "best_r": 0.085, "best_lift": 0.039, "examples": [{"pid": "128385117", "topic": "Gardening & Plants", "activation": 0.3158, "text": "Our newest floral Dahlia is a Blended pour cast in Soft 00-50 Platinum Cured Silicone\nColours are... Rose Gold, Aubergine and Elusive for the leaves", "axes": {"reading_level": 0.6, "concreteness": 0.85, "narrativity": 0.2, "hedging": 0.05, "tone": 0.35, "warmth": 0.6, "self_disclosure": 0.15, "casualness": 0.4, "humor": 0.0}}, {"pid": "4090401", "topic": "Pets", "activation": 0.2843, "text": "I’ve owned my angry capybara mug for years and only just noticed that he has a sad face on his snout", "axes": {}}, {"pid": "38350787", "topic": "Ancient History", "activation": 0.2779, "text": "Left: Glass Hippo designed by Bertil Vallien and Erik Höglund for Kosta Boda (1970)\nRight: Viking Glass Hippos, 1970s", "axes": {}}, {"pid": "93033867", "topic": "Sports", "activation": 0.2616, "text": "It takes a special type of Sports fan to wear an all star jersey. Fans who wear all star jerseys often times carry more powerful item...", "axes": {}}, {"pid": "5725170", "topic": "Food & Cooking", "activation": 0.2132, "text": "Dustin Pedroia's Premium Black Bean and Corn Salsa (2008-2009): Following his MVP season, Boston Red Sox 2B Dustin Pedroia received his own salsa, which contained both black beans AND corn!", "axes": {}}, {"pid": "17102997", "topic": "Fitness & Gym", "activation": 0.2098, "text": "This shirt? It's a 3x. It's a little tight, so I'm not quite there yet, but it's coming. This time last year? I was a 6x. \n\nWeigh-in today was 351 lbs. The progress I'm making is mind-blowing. It's surreal.", "axes": {"reading_level": 0.2, "concreteness": 0.85, "narrativity": 0.7, "hedging": 0.1, "tone": 0.7, "warmth": 0.75, "self_disclosure": 0.95, "casualness": 0.65, "humor": 0.0}}, {"pid": "124395899", "topic": "Photography", "activation": 0.2082, "text": "A personal favorite diptych from a foggy morning here in MT. Beautiful in either black or white frames & calming no matter what. Only one set left!", "axes": {}}, {"pid": "39802521", "topic": "Transportation & Urbanism", "activation": 0.205, "text": "UK road signage standards dictate that a white circular sign with a red border prohibits the road user or action displayed on the sign. When did they sneak this one through parliament? It is NOT ILLEGAL", "axes": {}}, {"pid": "3187982", "topic": "Fitness & Gym", "activation": 0.2044, "text": "Tried my jocks and underwear after weight loss, hadn't tried these on yet.  Not too bad but I definitely need to work on definition and growing these toothpick arms.", "axes": {}}, {"pid": "67286512", "topic": "Sports", "activation": 0.203, "text": "Seattle Sounders  will be unveiling (most likely) their new branding on Tuesday and if these colors from their latest teaser are in their new branding color palette I am excited.", "axes": {}}]}, {"f": 113, "density": 0.1918, "category": "partial_overlap", "lifts": {"reading_level": -0.05, "concreteness": -0.045, "narrativity": -0.034, "hedging": 0.007, "tone": 0.016, "warmth": -0.009, "self_disclosure": -0.032, "casualness": 0.025, "humor": 0.048}, "rs": {"reading_level": -0.176, "concreteness": -0.126, "narrativity": -0.095, "hedging": -0.005, "tone": 0.056, "warmth": -0.051, "self_disclosure": -0.088, "casualness": 0.088, "humor": 0.122}, "best_axis": "reading_level", "best_r": -0.176, "best_lift": -0.05, "examples": [{"pid": "86611448", "topic": "Movies & Film", "activation": 0.3323, "text": "If you've never seen Mel Brooks' movies, it doesn't matter what order you watch them in, each one will be your new favorite.", "axes": {}}, {"pid": "7726277", "topic": "Fitness & Gym", "activation": 0.2901, "text": "If you have some dumbbells lying around or can safely improvise the weight then this workout will make you strong in your body and your brain.", "axes": {"reading_level": 0.25, "concreteness": 0.4, "narrativity": 0.1, "hedging": 0.15, "tone": 0.55, "warmth": 0.7, "self_disclosure": 0.05, "casualness": 0.55, "humor": 0.3}}, {"pid": "189072562", "topic": "Food & Cooking", "activation": 0.271, "text": "Lunch tip: if you want to have a hot burrito for lunch, make it in the morning and slide it into a thermos", "axes": {}}, {"pid": "30084460", "topic": "Birds & Nature", "activation": 0.2448, "text": "When you get out of the car for an early morning hike, and a Cooper's Hawk is sitting, waiting for you...\n🪶", "axes": {}}, {"pid": "11950082", "topic": "Higher Education", "activation": 0.2408, "text": "If you get rid of your foreign languages and literature departments, you forfeit your right to be called a university and you should lose your accreditation immediately.", "axes": {}}, {"pid": "11162006", "topic": "Economy & Jobs", "activation": 0.2389, "text": "if you tell me the economy is good, what you are really saying is you can give me all your money at gunpoint", "axes": {"reading_level": 0.25, "concreteness": 0.3, "narrativity": 0.15, "hedging": 0.05, "tone": 0.75, "warmth": 0.15, "self_disclosure": 0.4, "casualness": 0.65, "humor": 0.6}}, {"pid": "1546955", "topic": "Higher Education", "activation": 0.237, "text": "If you think the 'enrollment cliff' will help your career, there is a pretty good chance that you are a consultant.", "axes": {"reading_level": 0.45, "concreteness": 0.3, "narrativity": 0.1, "hedging": 0.4, "tone": 0.6, "warmth": 0.2, "self_disclosure": 0.0, "casualness": 0.4, "humor": 0.65}}, {"pid": "14074544", "topic": "Higher Education", "activation": 0.2363, "text": "If you’re a full professor and not doing something every day to raise up those around you, you are doing things very wrong indeed.", "axes": {}}, {"pid": "86532689", "topic": "Transportation & Urbanism", "activation": 0.2344, "text": "If you live in an urban neighborhood that isn't currently experiencing gang violence (and even in some cases if it is), the most common threat to your safety on a daily basis is probably from cars. Suburbanites/Exurbanites/Rural people treat that statement like hysteria but it's true", "axes": {}}, {"pid": "37108736", "topic": "Pets", "activation": 0.2303, "text": "If you're wondering how annoyed kitties are if you get home three hours after dinner time, the answer is:\n\nVery.", "axes": {}}]}, {"f": 114, "density": 0.0, "category": "dead", "lifts": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "rs": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "best_axis": "reading_level", "best_r": 0.0, "best_lift": 0.0, "examples": []}, {"f": 115, "density": 0.1858, "category": "novel_candidate", "lifts": {"reading_level": -0.028, "concreteness": 0.035, "narrativity": 0.024, "hedging": -0.039, "tone": -0.003, "warmth": -0.014, "self_disclosure": -0.027, "casualness": -0.014, "humor": 0.019}, "rs": {"reading_level": -0.081, "concreteness needs water to cool hardware\n> immerse hardware in water\n> water boils\n> use boiling water to turn turbine\n> turbine generates electricity \n> use electricity to power AI\n> infinite energy achieved", "axes": {}}, {"pid": "33261841", "topic": "Pets", "activation": 0.3089, "text": "Which one are you:\n\n1) Animal Lover \n2) Pet Lover \n\nAll animals are sentient beings who want to live. \n\n#EndSpeciesism", "axes": {}}, {"pid": "18027342", "topic": "Higher Education", "activation": 0.2826, "text": "Before law school: Doesn’t read contracts. \n\nDuring and immediately after law school: Reads contracts very thoroughly. \n\nAfter being out of law school a few years: Doesn’t read contracts.", "axes": {}}, {"pid": "64000420", "topic": "Fitness & Gym", "activation": 0.279, "text": "- lock up for a couple weeks\n- take a break\n- get pent up again\n- lock back up again\n- profit\n- repeat ♾️\n\n☺️", "axes": {}}, {"pid": "13918864", "topic": "Video Games", "activation": 0.2789, "text": "My least favourite video game environments:\n- spooky insane asylum\n- mines\n- sewer\n- abandoned laboratory where the scientists were doing something naughty", "axes": {}}, {"pid": "42169093", "topic": "Pets", "activation": 0.2756, "text": "✅ clean the cat’s water fountain \n✅ accidentally spill diet coke all over the kitchen floor \n✅ clean the diet coke spill", "axes": {"reading_level": 0.15, "concreteness": 0.85, "narrativity": 0.65, "hedging": 0.05, "tone": 0.55, "warmth": 0.65, "self_disclosure": 0.7, "casualness": 0.8, "humor": 0.75}}, {"pid": "14317502", "topic": "Music", "activation": 0.2716, "text": "top 5 songs to fuck to:\n\n1) camp granada  \n2) yakety sax\n3) monster mash\n4) pomp and circumstance \n5) obla di obla da", "axes": {"reading_level": 0.15, "concreteness": 0.95, "narrativity": 0.05, "hedging": 0.05, "tone": 0.75, "warmth": 0.5, "self_disclosure": 0.6, "casualness": 0.9, "humor": 0.85}}, {"pid": "48576779", "topic": "Food & Cooking", "activation": 0.2689, "text": ines are 3-5 years away.", "axes": {}}, {"pid": "947445", "topic": "Space & Astronomy", "activation": 0.1674, "text": "Look at this amazing and weird radio emission captured by ASKAP for the EMU survey 🔭\nRadio astronomy is cool", "axes": {}}, {"pid": "45694510", "topic": "Space & Astronomy", "activation": 0.1674, "text": "The Indian space program has managed another amazing feat in a short period of time with far less resources than most. Congrats to all involved.", "axes": {}}]}, {"f": 118, "density": 0.0, "category": "dead", "lifts": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "rs": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "best_axis": "reading_level", "best_r": 0.0, "best_lift": 0.0, "examples": []}, {"f": 119, "density": 0.2494, "category": "partial_overlap", "lifts": {"reading_level": -0.002, "concreteness": 0.017, "narrativity": -0.017, "hedging": -0.015, "tone": -0.002, "warmth": -0.017, "self_disclosure": -0.037, "casualness": -0.002, "humor": 0.014}, "rs": {"reading_level": 0.0, "concreteness": -0.019, "narrativity": -0.066, "hedging": -0.027, "tone": 0.004, "warmth": -0.065, "self_disclosure": -0.104, "casualness": -0.02, "humor": 0.012}, "best_axis": "self_disclosure", "best_r": -0.104, "best_lift": -0.037, "examples": [{"pid": "69869447", "topic": "Sports", "activation": 0.3162, "text": "Jon Miller says Orioles-Kevin Brown saga ‘makes no sense,’ talks Peter Angelos’ spin on his own exit: ‘He lied about all of that.’", "axes": {"reading_level": 0.5, "concreteness": 0.7, "narrativity": 0.55, "hedging": 0.15, "tone": 0.6, "warmth": 0.25, "self_disclosure": 0.1, "casualness": 0.4, "humor": 0.0}}, {"pid": "25035645", "topic": "Economy & Jobs", "activation": 0.282, "text": "Journalism in dialog: Why are Americans una const AXIS_COLORS  = {"reading_level": "#6c8ebf", "concreteness": "#d6b656", "narrativity": "#d79b00", "hedging": "#ae4132", "tone": "#82b366", "warmth": "#e8734a", "self_disclosure": "#9673a6", "casualness": "#23748a", "humor": "#5cb85c"};
const CAT_COLORS   = {"confirms_axis":"#5cb85c","partial_overlap":"#e6a817","novel_candidate":"#6c8ebf","dead":"#555"};
const AXIS_NAMES   = ["reading_level", "concreteness", "narrativity", "hedging", "tone", "warmth", "self_disclosure", "casualness", "humor"];
const CONFIRM_LIFT = 0.2;
const PARTIAL_LIFT = 0.1;

function buildSidebar(items) {
  const list = document.getElementById('feature-list');
  list.innerHTML = '';
  items.forEach((feat, i) => {
    const item = document.createElement('div');
    item.className = 'feat-item';
    item.dataset.fidx = feat.f;
    const catColor = CAT_COLORS[feat.category] || '#555';
    const axLabel  = feat.best_axis ? feat.best_axis.replace(/_/g,' ') : '—';
    const sym      = feat.category === 'confirms_axis' ? '✓' : feat.category === 'partial_overlap' ? '~' : feat.category === 'dead' ? '✗' : '?';
    item.innerHTML = `
      <div class="feat-title">
        F${feat.f}
        <span class="cat-badge" style="background:${catColor}22;color:${catColor}">${sym}</span>
      </div>
      <div class="feat-sub">${axLabel} · lift=${feat.best_lift.toFixed(3)} · ρ=${feat.density.toFixed(3)}</div>`;
    item.addEventListener('click', () => showFeature(feat.f));
    list.appendChild(item);
  });
}

function applyFilter() {
  const cat = document.getElementById('cat-filter').value;
  const filtered = cat === 'all' ? FEATURES : FEATURES.filter(f => f.category === cat);
  buildSidebar(filtered);
}

function showFeature(fIdx) {
  document.querySelectorAll('.feat-item').forEach(el => el.classList.remove('active'));
  const active = document.querySelector(`.feat-item[data-fidx="${fIdx}"]`);
  if (active) active.classList.add('active');

  const feat = FEATURES.find(f => f.f === fIdx);
  if (!feat) return;
  const catColor = CAT_COLORS[feat.category] || '#555';

  const maxLift = Math.max(...Object.values(feat.lifts).map(Math.abs), 0.01);
  const maxR    = Math.max(...Object.values(feat.rs).map(Math.abs), 0.01);
  const absMax  = Math.max(maxLift, maxR);

  let liftHtml = '';
  AXIS_NAMES.forEach(ax => {
    const lift   = feat.lifts[ax] || 0;
    const r      = feat.rs[ax]    || 0;
    const color  = AXIS_COLORS[ax] || '#6c8ebf';
    const isBest = ax === feat.best_axis;
    const liftPct = Math.abs(lift) / absMax * 100;
    const rPct    = Math.abs(r)    / absMax * 100;
    liftHtml += `
      <div class="axis-row">
        <div class="axis-row-label ${isBest ? 'best' : ''}">${ax.replace(/_/g,' ')}</div>
        <div class="metric-row">
          <div class="metric-tag">lift</div>
          <div class="bar-bg">
            <div class="bar-fill" style="width:${liftPct}%;background:${color};opacity:${isBest ? 1 : 0.55}"></div>
          </div>
          <div class="bar-val">${lift >= 0 ? '+' : ''}${lift.toFixed(3)}</div>
        </div>
        <div class="metric-row">
          <div class="metric-tag">r</div>
          <div class="bar-bg">
            <div class="bar-fill" style="width:${rPct}%;background:${color};opacity:${isBest ? 0.65 : 0.3}"></div>
          </div>
          <div class="bar-val">${r >= 0 ? '+' : ''}${r.toFixed(3)}</div>
        </div>
      </div>`;
  });

  let exHtml = '';
  if (!feat.examples || feat.examples.length === 0) {
    exHtml = '<p style="color:#555">Feature never fires on this corpus.</p>';
  } else {
    feat.examples.forEach(ex => {
      const axesHtml = Object.entries(ex.axes || {}).map(([ax, v]) => {
        const cls = v >= 0.6 ? 'high' : v <= 0.3 ? 'low' : '';
        return `<span class="axis-chip ${cls}">${ax.replace(/_/g,' ')} ${v.toFixed(2)}</span>`;
      }).join('');
      exHtml += `
        <div class="example-card">
          <div class="example-meta">
            post ${ex.pid} &nbsp;·&nbsp; ${ex.topic} &nbsp;·&nbsp;
            activation: <span class="activation-badge">${ex.activation.toFixed(4)}</span>
          </div>
          <div class="text-block">${escHtml(ex.text)}</div>
          ${axesHtml ? `<div class="axes-row">${axesHtml}</div>` : ''}
        </div>`;
    });
  }

  document.getElementById('detail').innerHTML = `
    <h2>Feature F${feat.f}</h2>
    <div class="meta">
      <span class="cat-badge" style="background:${catColor}22;color:${catColor};font-size:12px">${feat.category}</span>
      &nbsp; best axis: <strong>${feat.best_axis || '—'}</strong>
      &nbsp; lift: <strong>${feat.best_lift.toFixed(4)}</strong>
      &nbsp; r: <strong>${feat.best_r.toFixed(4)}</strong>
      &nbsp; density: <strong>${feat.density.toFixed(4)}</strong>
    </div>
    <div class="section-title">Lift across 9 axes</div>
    ${liftHtml}
    <div class="section-title">Top ${feat.examples.length} activating posts</div>
    ${exHtml}`;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

buildSidebar(FEATURES);
if (FEATURES.length > 0) showFeature(FEATURES[0].f);
</script>
