ve arrived a day early, prepare yourself for the jizz tsunami.", "axes": {}}, {"pid": "56724445", "topic": "Sports", "activation": 0.2175, "text": "The SF Giants signed Matt Chapman to a three-year deal. They should sign Snell and/or Montgomery, too.", "axes": {"reading_level": 0.3, "concreteness": 0.75, "narrativity": 0.1, "hedging": 0.2, "tone": 0.4, "warmth": 0.5, "self_disclosure": 0.05, "casualness": 0.5, "humor": 0.0}}, {"pid": "23641936", "topic": "Video Games", "activation": 0.2121, "text": "phil spencer to nintendo: your future is off your own hardware \n\nphil spencer internally: our future is off our own hardware", "axes": {}}]}, {"f": 52, "density": 0.0, "category": "dead", "lifts": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "rs": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "best_axis": "reading_level", "best_r": 0.0, "best_lift": 0.0, "examples": []}, {"f": 53, "density": 0.0, "category": "dead", "lifts": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "rs": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "best_axis": "reading_level", "best_r": 0.0, "best_lift": 0.0, "examples": []}, {"f": 54, "density": 0.2514, "category": "confirms_axis", "lifts": {"reading_level": -0.034, "concreteness": -0.038, "narrativity": 0.039, "hedging": 0.048, "tone": -0.02, "warmth": 0.074, "self_disclosure": 0.172, "casualness": 0.014, "humor": -0.022}, "rs": {"reading_level": -0.131, "concreteness": -0.152, "narrativity": 0.048, "hedging": 0.107, "tone": -0.04, "warmth": 0.131, "self_disclosure": 0.281, "casualness": 0.067, "humor": -0.018}, "best_axis": "self_disclosure", "best_r": 0.281, "best_lift": 0.172, "examples": [{"pid": "10340085", "topic": "Video Games", "activation": 0.2168, "text": "I love playing the Assassin’s Creed games on easy mode with all the map markers on because I love the fantasy of stabbing baddies and pretending I have a great sense of direction", "axes": {"reading_level": 0.3, "concreteness": 0.7, "narrativity": 0.5, "hedging": 0.1, "tone": 0.4, "warmth": 0.75, "self_disclosure": 0.75, "casualness": 0.65, "humor": 0.6}}, {"pid": "186362705", "topic": "Higher Education", "activation": 0.2114, "text": "I really hate the phrase \"dark academia\". I don't have an issue with the concept itself, the phrase just feels like nails on a chalkboard to me for some reason.", "axes": {"reading_level": 0.25, "concreteness": 0.35, "narrativity": 0.2, "hedging": 0.55, "tone": 0.4, "warmth": 0.65, "self_disclosure": 0.75, "casualness": 0.55, "humor": 0.3}}, {"pid": "139185796", "topic": "Sports", "activation": 0.2036, "text": "Super Bowl Ads were great as a kid because I didn’t have access to an unlimited catalogue of short films, but now I have the internet and can watch anything I want, so I skip the ads", "axes": {}}, {"pid": "11851254", "topic": "Video Games", "activation": 0.1967, "text": "Art is what got me into board games. Art is what drives my motivation to play. I gush. I swoon. I drool over it.\n\nI stand for artists and creatives that deserve to be compensated.\n\nI won’t support people who steal the work of others to line their own pockets.", "axes": {}}, {"pid": "44519876", "topic": "Transportation & Urbanism", "activation": 0.1963, "text": "Smug columnist lectures us about cars...smugly.\n\nI love driving a stick. I like the feel of it. I like how it makes you concentrate on driving. I like the control. I haven't had one for many years, because my wife is a disaster with a stick. She burned through a clutch a year!", "axes": {}}, {"pid": "613732", "topic": "Pets", "activation": 0.1958, "text": "I’m definitely at least mildly allergic to these new cats. Hoping that I get used to them, because I haven’t had cats since I was a kid. I have Allegra on deck, but I’ll take any tips.", "axes": {"reading_level": 0.3, "concreteness": 0.6, "narrativity": 0.5, "hedging": 0.6, "tone": 0.3, "warmth": 0.65, "self_disclosure": 0.75, "casualness": 0.6, "humor": 0.2}}, {"pid": "4090401", "topic": "Pets", "activation": 0.1932, "text": "I’ve owned my angry capybara mug for years and only just noticed that he has a sad face on his snout", "axes": {}}, {"pid": "197499532", "topic": "Music", "activation": 0.1895, "text": "you know i’m going through something when one of my top artists of the month on spotify is the oak ridge boys", "axes": {}}, {"pid": "9377837", "topic": "Politics", "activation": 0.1892, "text": "I literally would not care if they tried Hunter Biden for treason if it meant I’d never have to hear of him again", "axes": {}}, {"pid": "92450988", "topic": "Sports", "activation": 0.185, "text": "So many people are asking if I am excited about the renewed calls for network neutrality. \n\nI'm not.\n\nI feel like Charlie Brown facing Lucy and that football. I mean, yeah, I'm going to run my heart out for the kick, but I am pretty sure that I'll be disappointed.", "axes": {}}]}, {"f": 55, "density": 0.2589, "category": "partial_overlap", "lifts": {"reading_level": -0.022, "concreteness": -0.031, "narrativity": -0.013, "hedging": 0.011, "tone": 0.02, "warmth": -0.014, "self_disclosure": 0.005, "casualness": 0.024, "humor": 0.07}, "rs": {"reading_level": -0.098, "concreteness": -0.102, "narrativity": -0.017, "hedging": 0.035, "tone": 0.07, "warmth": -0.026, "self_disclosure": 0.029, "casualness": 0.092, "humor": 0.14}, "best_axis": "humor", "best_r": 0.14, "best_lift": 0.07, "examples": [{"pid": "5184468", "topic": "Space & Astronomy", "activation": 0.2165, "text": "Oh, we need to examine Uranus? Well here, feast your eyes on Uranus! \n\nI've gotta say, Uranus looks great!", "axes": {}}, {"pid": "67023318", "topic": "Pets", "activation": 0.2005, "text": "puppy dog koans — mew. Very confusing i do not understand this wan. This hab been puppy dog koan. goodby", "axes": {"reading_level": 0.15, "concreteness": 0.3, "narrativity": 0.35, "hedging": 0.2, "tone": 0.55, "warmth": 0.75, "self_disclosure": 0.4, "casualness": 0.85, "humor": 0.8}}, {"pid": "65186590", "topic": "Economy & Jobs", "activation": 0.2001, "text": "Uh...economists do not say that inflation was caused by federal spending. (Some economists think it was a contributing factor, others not).", "axes": {"reading_level": 0.45, "concreteness": 0.35, "narrativity": 0.05, "hedging": 0.6, "tone": 0.55, "warmth": 0.3, "self_disclosure": 0.1, "casualness": 0.45, "humor": 0.2}}, {"pid": "11887105", "topic": "Sports", "activation": 0.1911, "text": "LOUISVILLE-Asked Cardinals fan:\n“God, did you hear about Nate Oats?”\nFan: “No”\nMe: “Staying. He signed a big extension.”\nThought he would cry.", "axes": {}}, {"pid": "38581443", "topic": "Pets", "activation": 0.1895, "text": "Horse shit on the floor? Hey man, that's country life\n\nHedgehog shit on the floor? Hey everyone we've got a hedgehog, come look at this turd!\n\nBut if I shit on the floor? Banned from Olive Garden", "axes": {}}, {"pid": "11334775", "topic": "Fitness & Gym", "activation": 0.188, "text": "Working out to get “in shape”? That’s not it. My shape’s good, I just want to be able to carry someone to bed again.", "axes": {"reading_level": 0.2, "concreteness": 0.75, "narrativity": 0.5, "hedging": 0.1, "tone": 0.4, "warmth": 0.7, "self_disclosure": 0.75, "casualness": 0.65, "humor": 0.6}}, {"pid": "44033771", "topic": "Transportation & Urbanism", "activation": 0.1834, "text": "saw cubic meters abbreviated CU.M on a truck and giggled because i’m twelve. look out it’s the cum truck", "axes": {}}, {"pid": "2174317", "topic": "Pets", "activation": 0.1832, "text": "Heads up dog people, xylitol (toxic, very bad sweetener!) is getting a makeover as ‘birch sugar.’ Check ingredients carefully before sharing with your canine pals!", "axes": {}}, {"pid": "8099692", "topic": "Fitness & Gym", "activation": 0.1826, "text": "Sometimes I think I’m getting the hang of German, then I learn that “gym” is “Fitnessstudio”. That’s THREE S’s!!", "axes": {"reading_level": 0.25, "concreteness": 0.8, "narrativity": 0.5, "hedging": 0.3, "tone": 0.65, "warmth": 0.7, "self_disclosure": 0.65, "casualness": 0.7, "humor": 0.75}}, {"pid": "136082038", "topic": "Sports", "activation": 0.1819, "text": "No, no, you must’ve heard me wrong. I’m not a sports fan. That’d be absurd. I’m a *Sports* fan. You know, the Huey Lewis and the News album?", "axes": {}}]}, {"f": 56, "density": 0.2724, "category": "partial_overlap", "lifts": {"reading_level": 0.022, "concreteness": -0.041, "narrativity": -0.058, "hedging": 0.03, "tone": -0.031, "warmth": 0.03, "self_disclosure": -0.013, "casualness": -0.026, "humor": -0.059}, "rs": {"reading_level": 0.03, "concreteness": -0.121, "narrativity": -0.126, "hedging": 0.064, "tone": -0.096, "warmth": 0.085, "self_disclosure": -0.016, "casualness": -0.042, "humor": -0.088}, "best_axis": "narrativity", "best_r": -0.126, "best_lift": -0.059, "examples": [{"pid": "31501113", "topic": "Photography", "activation": 0.3509, "text": "Shutter speed is everything in waterfall #photography📸\n\nOverall, do you prefer slow shutter speeds or fast shutter speeds?", "axes": {"reading_level": 0.3, "concreteness": 0.35, "narrativity": 0.1, "hedging": 0.05, "tone": 0.4, "warmth": 0.65, "self_disclosure": 0.15, "casualness": 0.6, "humor": 0.0}}, {"pid": "28811135", "topic": "Transportation & Urbanism", "activation": 0.2593, "text": "Electric cargo bikes are absolute game changers, but a decent set of panniers can handle a good amount of groceries too.", "axes": {}}, {"pid": "117039572", "topic": "Transportation & Urbanism", "activation": 0.24, "text": "The store [Bikehouse Dunedin] sold about 20 cargo bikes last year — an increase from selling them a few years ago.\n\n\"It’s a bit of a mixture for what people are using them for — we have people using them just for groceries, for their dogs, taking a surfboard to the beach and for work.”", "axes": {}}, {"pid": "123189179", "topic": "Sports", "activation": 0.2347, "text": "One thought about Josh Allen:\n\nGreat QBs are supposed to get their offensive coordinators head coaching opportunities, not fired.", "axes": {}}, {"pid": "631566", "topic": "Video Games", "activation": 0.2222, "text": "I'd be really interested to get recommendations for board game critics who aren't cishet white men like myself. I recognise that most of the people I read, listen, and watch are basically me and would like to change that.", "axes": {"reading_level": 0.45, "concreteness": 0.35, "narrativity": 0.2, "hedging": 0.55, "tone": 0.3, "warmth": 0.75, "self_disclosure": 0.7, "casualness": 0.4, "humor": 0.0}}, {"pid": "177486501", "topic": "Pets", "activation": 0.2193, "text": "one of my favorite things about talking furry stuff with my non-furry friends is getting to tell them about protogens\n\nproots good", "axes": {}}, {"pid": "56633781", "topic": "Food & Cooking", "activation": 0.2166, "text": "This vegan katsu curry recipe uses sweet potato cutlets and a vegetable-packed curry sauce made with coconut milk.", "axes": {}}, {"pid": "95794600", "topic": "Fitness & Gym", "activation": 0.2159, "text": "Enjoying some post-workout pigeon pose. Anyone else enjoy yoga as part of their physical and mental wellness routines?", "axes": {"reading_level": 0.3, "concreteness": 0.6, "narrativity": 0.5, "hedging": 0.4, "tone": 0.35, "warmth": 0.7, "self_disclosure": 0.4, "casualness": 0.45, "humor": 0.0}}, {"pid": "66772365", "topic": "Transportation & Urbanism", "activation": 0.212, "text": "Portland Oregon has a famously walkable downtown. One of the reasons it’s so pedestrian friendly is its 200 foot block street grid. Street corners are great placemakers. Short blocks create a by-design walkability and create a steady flow of foot traffic to local shops and businesses.", "axes": {"reading_level": 0.55, "concreteness": 0.7, "narrativity": 0.2, "hedging": 0.2, "tone": 0.3, "warmth": 0.5, "self_disclosure": 0.0, "casualness": 0.25, "humor": 0.0}}, {"pid": "46109070", "topic": "Photography", "activation": 0.202, "text": "Hi just a pro tip:\nThere is no \"best\" camera! There are cameras that are better or worse for a particular style of shooting or personal preference, but anybody can make great images with just about any camera now!", "axes": {}}]}, {"f": 57, "density": 0.0, "category": "dead", "lifts": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "rs": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "best_axis": "reading_level", "best_r": 0.0, "best_lift": 0.0, "examples": []}, {"f": 58, "density": 0.2228, "category": "partial_overlap", "lifts": {"reading_level": -0.037, "concreteness": -0.026, "narrativity": 0.028, "hedging": -0.005, "tone": 0.011, "warmth": -0.017, "self_disclosure": 0.022, "casualness": 0.024, "humor": 0.072}, "rs": {"reading_level": -0.127, "concreteness": -0.119, "narrativity": -0.001, "hedging": 0.009, "tone": 0.043, "warmth": -0.064, "self_disclosure": 0.036, "casualness": 0.077, "humor": 0.123}, "best_axis": "reading_level", "best_r": -0.127, "best_lift": 0.072, "examples": [{"pid": "176896081", "topic": "Fitness & Gym", "activation": 0.3415, "text": "About two to three times a day on average. \n\nSometimes I'll go a couple days without and then five or six times in one day, just depends lol", "axes": {}}, {"pid": "15348418", "topic": "Gardening & Plants", "activation": 0.3333, "text": "Cold stratification is a process where seeds are carefully arranged in damp soil or a sterile medium, labeled, placed in the refrigerator and then forgotten forever", "axes": {}}, {"pid": "681963", "topic": "Music", "activation": 0.3212, "text": "every time i listen to an album i like i declare it the best album anyone has ever made, and every time i'm right", "axes": {}}, {"pid": "54106443", "topic": "Higher Education", "activation": 0.2782, "text": "Everything in academia takes three times longer than you expect, except grading, which takes a thousand times longer", "axes": {}}, {"pid": "9872670", "topic": "Economy & Jobs", "activation": 0.26, "text": "If every job report—just about every monthly or quarterly macroeconomic report, really—exceeds expectations, and this keeps happening, with errors always in the same direction, doesn't that mean the expecters are doing something wrong?", "axes": {"reading_level": 0.65, "concreteness": 0.3, "narrativity": 0.1, "hedging": 0.7, "tone": 0.55, "warmth": 0.5, "self_disclosure": 0.05, "casualness": 0.3, "humor": 0.25}}, {"pid": "15381503", "topic": "Video Games", "activation": 0.242, "text": "The worst thing about D&D is rolling a load more HP every level. That one design decision creates so many subsequent issues.", "axes": {}}, {"pid": "66618028", "topic": "Transportation & Urbanism", "activation": 0.2374, "text": "Whats that kind of antisocial where sometimes when you hang out with a group of friends you feel like you got hit by several trucks the next day?", "axes": {}}, {"pid": "12077750", "topic": "Economy & Jobs", "activation": 0.2289, "text": "Some myths about the economy are like zombies — they just keep crawling back. Here are the three that eat at me the most.", "axes": {}}, {"pid": "18655890", "topic": "Video Games", "activation": 0.2273, "text": "Dark Souls is about how if you keep fighting only to maintain a rotten status quo, re-recording it like a VHS tape over and over, eventually dudes get too big", "axes": {}}, {"pid": "87326458", "topic": "Fitness & Gym", "activation": 0.2125, "text": "i know you're supposed to take rest days from the gym a few times a week but every time i do it's such a struggle to get myself going there again... i think it's easier/healthier for me if i just go as many days in a row as i can even if it means just walking on a treadmill and leaving", "axes": {}}]}, {"f": 59, "density": 0.2414, "category": "novel_candidate", "lifts": {"reading_level": -0.004, "concreteness": 0.024, "narrativity": 0.03, "hedging": -0.013, "tone": -0.021, "warmth": -0.0, "self_disclosure": -0.011, "casualness": -0.023, "humor": -0.006}, "rs": {"reading_level": -0.015, "concreteness": 0.06, "narrativity": 0.083, "hedging": -0.042, "tone": -0.069, "warmth": -0.002, "self_disclosure": -0.019, "casualness": -0.062, "humor": -0.014}, "best_axis": "narrativity", "best_r": 0.083, "best_lift": 0.03, "examples": [{"pid": "356779", "topic": "Pets", "activation": 0.3391, "text": "The 50s. When men were real men and never left the house without their shoulder kittens. Photo from my collection, no further info.", "axes": {"reading_level": 0.3, "concreteness": 0.7, "narrativity": 0.5, "hedging": 0.1, "tone": 0.6, "warmth": 0.65, "self_disclosure": 0.4, "casualness": 0.7, "humor": 0.75}}, {"pid": "231912", "topic": "Climate & Energy", "activation": 0.3213, "text": "40 years ago this month, the EPA released a report called \"Can We Delay a Greenhouse Warming?\"\n\nI checked how their projections have held up.", "axes": {}}, {"pid": "148130781", "topic": "Economy & Jobs", "activation": 0.3082, "text": "* Why were 60's so good economically? *\n\nThe 1960s were a period of significant economic growth and prosperity in many parts of the world, particularly in developed nations. This economic boom was influenced by several key factors:", "axes": {}}, {"pid": "22031557", "topic": "Photography", "activation": 0.2879, "text": "Your unfriendly reminder that picture-in-picture technology was first used in a televised broadcast of the Olympics. In 1976. \n48 years ago.", "axes": {}}, {"pid": "73573334", "topic": "Economy & Jobs", "activation": 0.2788, "text": "Periodic reminder that during WW2 and for years after, we had agencies like the Office of Price Control to prevent exactly this sort of thing from dragging our nation down.", "axes": {}}, {"pid": "5109271", "topic": "Economy & Jobs", "activation": 0.2638, "text": "Periodic reminder that between 1941 and 1953, the United States had two agencies for price controls, rent stabilization, and salaries: Roosevelt's Office of Price Administration and Truman's Economic Stabilization Agency.", "axes": {}}, {"pid": "145662192", "topic": "Economy & Jobs", "activation": 0.2605, "text": "it was horrible in the 1970s - real wages fell significantly, but the underlying cause of declining living standards in the 70's was a resource shock from the OPEC oil embargo, not (as conservatives have always argued) liberalism and unions debasing the currency.", "axes": {}}, {"pid": "128205887", "topic": "Photography", "activation": 0.2582, "text": "My grandfather's camera - Kodak 620 folder. Looks to be in good nick. Anyone know anything about it?", "axes": {}}, {"pid": "10888281", "topic": "Transportation & Urbanism", "activation": 0.251, "text": "The day Sweden switched from driving on the left-hand side of the road to driving on the right, 1967.", "axes": {}}, {"pid": "24293154", "topic": "Video Games", "activation": 0.2438, "text": "Back in the day, every game was open-sourced. All you needed was to read the assembly code in the binary. Simple. As funny and impossible as this seems today, the fact that you could do it then, and learn how s/w was coded, modify and reuse it, created a massive community of coders and hackers.", "axes": {}}]}, {"f": 60, "density": 0.1117, "category": "partial_overlap", "lifts": {"reading_level": 0.001, "concreteness": 0.004, "narrativity": -0.038, "hedging": -0.029, "tone": 0.071, "warmth": -0.012, "self_di {}}, {"pid": "39612698", "topic": "Pets", "activation": 0.4251, "text": "ITS DIVINE SKIN NOW CLEAN OF ALL ALKALINE, ACID AND BASE, IT NOW SHINES WITH HOLY LIGHT, ITS HUMOURS BALANCED, THE MACHINE SPIRIT IS PLEASED. REMOVETH ALL ALCOHOLIC SPIRIT AND ANOINT WITH NEUTRAL PH HOLY OULS\n\n…. THE NEIGHBORS CAT JUST KILLED A BLUE JAY ON ITS ROOF", "axes": {}}, {"pid": "47323188", "topic": "Economy & Jobs", "activation": 0.3986, "text": "WE NEED TO START TAXING THESE GENDER BILLIONAIRES\n\nGENDER SHOULD NOT BE HOARDED. IT SHOULD BE NATIONALIZED AND REDISTRIBUTED EVENLY UNTIL WE'RE ALL AT LEAST 110% GENDER\n\n#ForceFemmeTheBern2024", "axes": {}}, {"pid": "21204393", "topic": "Climate & Energy", "activation": 0.3812, "text": "Well, paint me green and call me a pickle! WHO COULD HAVE PREDICTED THAT THE GOVERNMENT'S PLAN TO GENERATE MILLIONS AND MILLIONS OF CHEAP OFFSETS WOULD BE A DETERRENT TO DECARBONISATION??\n#auspol #climate", "axes": {}}, {"pid": "78283500", "topic": "Climate & Energy", "activation": 0.3789, "text": "“IF YOU THINK ABOUT IT,” shouts a brain-haver on the internet, “SCROOGE WAS AN ENVIRONMENTALIST LIMITING THE USE OF COAL!”", "axes": {}}, {"pid": "45466375", "topic": "Pets", "activation": 0.3533, "text": "Frustrating your puppy girl by pretending to throw the ball.\nWHY DID YOU DO THAT SHARON? WAS THERE EVEN A BALL TO THROW IN THE FIRSR PLACE!? Where is it where where where where where WHERE WHerEe", "axes": {}}]}, {"f": 61, "density": 0.2293, "category": "confirms_axis", "lifts": {"reading_level": -0.028, "concreteness": -0.075, "narrativity": -0.044, "hedging": 0.058, "tone": 0.009, "warmth": -0.017, "self_disclosure": 0.036, "casualness": 0.03, "humor": 0.032}, "rs": {"reading_level": -0.098, "concreteness": -0.226, "narrativity": -0.129, "hedging": 0.104, "tone": 0.039, "warmth": -0.071, "self_disclosure": 0.027, "casualness": 0.065, "humor": 0.039}, "best_axis": "concreteness", "best_r": -0.226, "best_lift": -0.075, "examples": [{"pid": "3931270", "topic": "AI & Tech", "activation": 0.2778, "text": "I don't know who needs to hear this, but I don't think you need to create a whole-ass masters degree program about AI.", "axes": {"reading_level": 0.3, "concreteness": 0.2, "narrativity": 0.1, "hedging": 0.4, "tone": 0.6, "warmth": 0.5, "self_disclosure": 0.3, "casualness": 0.75, "humor": 0.5}}, {"pid": "147447005", "topic": "Fitness & Gym", "activation": 0.2578, "text": "I have no idea, honestly. I don’t have a spotter usually, so I don’t tend to push it. My rep range is usually 5-8 on my heaviest lifts, but I’m typically aiming for 10 reps. I don’t really trust the 1rm calculators; lift off feels inaccurate.", "axes": {}}, {"pid": "14405809", "topic": "Higher Education", "activation": 0.2572, "text": "Tell me you don’t know how scholarship qualifications work without saying you don’t know how scholarship qualifications work", "axes": {"reading_level": 0.3, "concreteness": 0.1, "narrativity": 0.05, "hedging": 0.1, "tone": 0.65, "warmth": 0.15, "self_disclosure": 0.0, "casualness": 0.75, "humor": 0.8}}, {"pid": "122827186", "topic": "Higher Education", "activation": 0.2462, "text": "Josh Barro doesn't get to generalize about \"American universities.\" He didn't earn that, and anyway he wouldn't do it the only way you should (v carefully)", "axes": {"reading_level": 0.55, "concreteness": 0.35, "narrativity": 0.1, "hedging": 0.2, "tone": 0.65, "warmth": 0.2, "self_disclosure": 0.15, "casualness": 0.55, "humor": 0.4}}, {"pid": "41175463", "topic": "Transportation & Urbanism", "activation": 0.2088, "text": "I don’t need the cycling infrastructure I see in Utrecht. I’ll settle for what they have in Oostende.", "axes": {}}, {"pid": "121961549", "topic": "AI & Tech", "activation": 0.2014, "text": "I'll never commission anyone who works with AI or has AI assisted work. Look, you can settle for quick and lazy machine spit all you want, I won't. That's it. It just doesn't excite me. Technology is just whatever to me as is. Don't even start it. You won't get anywhere with me and I'm not budging.", "axes": {}}, {"pid": "60336694", "topic": "Fitness & Gym", "activation": 0.1977, "text": "I ain't met the chest day I can't turn into a shoulder day by sheer force of forgetting what I was doing", "axes": {}}, {"pid": "55055300", "topic": "Pets", "activation": 0.1923, "text": "Pixel does not care for the other cats in the neighbourhood! (We like them a lot though! Don't tell Pixel!)", "axes": {}}, {"pid": "54032416", "topic": "Food & Cooking", "activation": 0.1915, "text": "Pro-tip: no one really knows what an Osso Buco is, so you can basically just make any old roast and call it that.", "axes": {}}, {"pid": "19067635", "topic": "Books & Reading", "activation": 0.1878, "text": "I don't usually read literary fiction, but when I do it's Kauzo Ishiguro's 2005 masterpiece  'Never Let Me Go'", "axes": {}}]}, {"f": 62, "density": 0.0, "category": "dead", "lifts": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "rs": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "best_axis": "reading_level", "best_r": 0.0, "best_lift": 0.0, "examples": []}, {"f": 63, "density": 0.1637, "category": "partial_overlap", "lifts": {"reading_level": -0.009, "concreteness": -0.012, "narrativity": 0.021, "hedging": 0.004, "tone": -0.001, "warmth": 0.005, "self_disclosure": -0.001, "casualness": 0.022, "humor": 0.066}, "rs": {"reading_level": -0.059, "concreteness": -0.036, "narrativity": 0.031, "hedging": -0.021, "tone": 0.001, "warmth": 0.018, "self_disclosure": 0.009, "casualness": 0.05, "humor": 0.115}, "best_axis": "humor", "best_r": 0.115, "best_lift": 0.066, "examples": [{"pid": "55271407", "topic": "Space & Astronomy", "activation": 0.3586, "text": "Red matter was a substance capable of forming a black hole when ignited. One drop was sufficient to collapse a star or consume an entire planet.", "axes": {}}, {"pid": "98340270", "topic": "Food & Cooking", "activation": 0.29, "text": "As food spoils quickly in Thavnair's heat and humidity, so have locals learned to preserve food with a plethora of spices. The ingredients are used to create their signature curry dishes, with many of them including hamsa meat and eggs.", "axes": {}}, {"pid": "4536932", "topic": "AI & Tech", "activation": 0.2715, "text": "Putting aside the time travelling cognitohazard, why the hell would I care if a future AI invented a fake version of me to torture forever. That is simply none of my business.", "axes": {}}, {"pid": "40853642", "topic": "Books & Reading", "activation": 0.2703, "text": "The great SF tale A Fire Born of Exile by Aliette de Bodard explores the power and danger of revenge", "axes": {}}, {"pid": "12922716", "topic": "Higher Education", "activation": 0.2609, "text": "If Starfleet Academy was run by current university administrators… of course the budget shortfall is exactly 45 million bars of gold-pressed latinum, and the consultants are Ferengi 🤣🤣🤣", "axes": {}}, {"pid": "4698038", "topic": "Birds & Nature", "activation": 0.2564, "text": "A pair of psuedoraptors approach the edge of a freshwater pool among the dunes of the valley of Two Sky River.\n\nTheir diminutive symbiotic flyers, which aid them in flushing out prey, can be seen about them.\n\n(myart)", "axes": {}}, {"pid": "82845864", "topic": "Sports", "activation": 0.2486, "text": "Given that Blood Bowl is going strong in the 26th century, while the End Times were in the early 25th, one can only conclude that the sport literally prevented the apocalypse.", "axes": {}}, {"pid": "13918864", "topic": "Video Games", "activation": 0.2421, "text": "My least favourite video game environments:\n- spooky insane asylum\n- mines\n- sewer\n- abandoned laboratory where the scientists were doing something naughty", "axes": {}}, {"pid": "84651522", "topic": "AI & Tech", "activation": 0.2406, "text": "the Butlerian Jihad memes are funny but I'll just point out that it only happens in the setting because the AIs already \"won\", the enslavers were other humans at first, and it all only exists as a reason to write religious feudalism in space anyways", "axes": {}}, {"pid": "33614683", "topic": "AI & Tech", "activation": 0.235, "text": "the Human Instrumentality Project is actually just a scam made up by Big SEELE to make us buy more Impacts", "axes": {}}]}, {"f": 64, "density": 0.2484, "category": "confirms_axis", "lifts": {"reading_level": -0.03, "concreteness": -0.032, "narrativity": 0.022, "hedging": 0.083, "tone": -0.02, "warmth": 0.029, "self_disclosure": 0.119, "casualness": 0.058, "humor": 0.043}, "rs": {"reading_level": -0.118, "concreteness": -0.072, "narrativity": 0.088, "hedging": 0.178, "tone": -0.073, "warmth": 0.091, "self_disclosure": 0.221, "casualness": 0.149, "humor": 0.076}, "best_axis": "self_disclosure", "best_r": 0.221, "best_lift": 0.119, "examples": [{"pid": "168282586", "topic": "Fitness & Gym", "activation": 0.2693, "text": "Spartan day! \n(I’m not competing, still injured, but I’m supporting my trainer - but I’ll be back soon)", "axes": {}}, {"pid": "54106443", "topic": "Higher Education", "activation": 0.243, "text": "Everything in academia takes three times longer than you expect, except grading, which takes a thousand times longer", "axes": {}}, {"pid": "28915617", "topic": "Books & Reading", "activation": 0.2395, "text": "Idk if I should reply to myself or quote post myself more on this platform still but here is the book I’m reading rn specifically about her", "axes": {}}, {"pid": "81294666", "topic": "Pets", "activation": 0.2309, "text": "Weekend scrap buster project. This was way too big for one person to wrestle. I hope it lasts for a while. I don’t want to do it again. Hope the dogs appreciate it. 🛷 🧶", "axes": {}}, {"pid": "7438915", "topic": "Gardening & Plants", "activation": 0.2301, "text": "Working on recreating my gardening journal (the other was eaten by my Labrador). I just want to finish before my first tomato harvest.\n\n🌱", "axes": {}}, {"pid": "195299139", "topic": "Photography", "activation": 0.2277, "text": "Making progress with the wedding photos, will have to select a couple of the B&W's to print in the darkroom also", "axes": {"reading_level": 0.4, "concreteness": 0.6, "narrativity": 0.3, "hedging": 0.3, "tone": 0.35, "warmth": 0.55, "self_disclosure": 0.4, "casualness": 0.5, "humor": 0.0}}, {"pid": "36452717", "topic": "Food & Cooking", "activation": 0.2262, "text": "Soups update\n\nI got a lot less meat off those leggies than I expected but it's also because I suck at it. \n\nSoooo I put the bones with some still attached into a bag in the freezer to make MOAR BROTH another day. \n\nThe broth I did make is darker than usual but tasty. I'm letting it cool so I can", "axes": {"reading_level": 0.25, "concreteness": 0.75, "narrativity": 0.65, "hedging": 0.3, "tone": 0.35, "warmth": 0.65, "self_disclosure": 0.6, "casualness": 0.75, "humor": 0.4}}, {"pid": "125725652", "topic": "Photography", "activation": 0.222, "text": "Pointe de Penmarc’h.\n\nTaken back in August, but only just got the scans back so can I still claim it for #ShittyCameraChallenge?", "axes": {}}, {"pid": "114497146", "topic": "Food & Cooking", "activation": 0.2158, "text": "Why yes, I did add some of the carnitas I made yesterday to the chili I also made yesterday… I have created… CHARNITAS!", "axes": {}}, {"pid": "4355276", "topic": "Sports", "activation": 0.2112, "text": "Going to lock and not look at Twitter, but a lot of people are going to call for the Phillies to make big changes. They need to just keep making improvements, but they are really fucking good baseball team who played poorly and that is the postseason, no one to blame but them.", "axes": {}}]}, {"f": 65, "density": 0.1522, "category": "partial_overlap", "lifts": {"reading_level": -0.022, "concreteness": 0.043, "narrativity": 0.037, "hedging": -0.029, "tone": -0.01, "warmth": 0.104, "self_disclosure": 0.019, "casualness": 0.052, "humor": -0.022}, "rs": {"reading_level": -0.091, "concreteness": 0.072, "narrativity": 0.036, "hedging": -0.053, "tone": -0.026, "warmth": 0.187, "self_disclosure": 0.024, "casualness": 0.138, "humor": -0.032}, "best_axis": "warmth", "best_r": 0.187, "best_lift": 0.104, "examples": [{"pid": "106782224", "topic": "Fitness & Gym", "activation": 0.3129, "text": "Seeing results from weight training 🏋️‍♀️ is tediously slow, but I did notice that lifting the heavy tyres in/out of the car was much easier than last Spring 💪😊", "axes": {"reading_level": 0.25, "concreteness": 0.75, "narrativity": 0.55, "hedging": 0.3, "tone": 0.4, "warmth": 0.75, "self_disclosure": 0.65, "casualness": 0.7, "humor": 0.35}}, {"pid": "173636111", "topic": "Food & Cooking", "activation": 0.2762, "text": "Super Bowl  🏈  Party Dip Idea 🎉 \n\n1) 10 Oz container of Doritos Cool Ranch Jalapeño Dip 🫑 \n\n2) the finger of a willing lover 👍", "axes": {}}, {"pid": "57147329", "topic": "Birds & Nature", "activation": 0.2706, "text": "Greetings from Germany 🇩🇪🌧️ \nI've took this #bird picture during this years vacation in Estonia 🇪🇪 \nMale Barnacle Goose at Paljassaare bay, Tallinn. 🪶", "axes": {"reading_level": 0.45, "concreteness": 0.8, "narrativity": 0.6, "hedging": 0.1, "tone": 0.35, "warmth": 0.7, "self_disclosure": 0.5, "casualness": 0.65, "humor": 0.0}}, {"pid": "38314222", "topic": "Gardening & Plants", "activation": 0.266, "text": "Leftovers from the thieves \nHash Express 🌲🌱🔥🤙\nHash Church X Pineapple Express from Natural Born Smokers via Coastal Mary Seeds 💪", "axes": {}}, {"pid": "29519803", "topic": "Transportation & Urbanism", "activation": 0.2576, "text": "Austin City Council votes to eliminate parking mandates citywide! 🎉🎉🎉\n\nThank you to CM Zo Qadri for leading on this crucial reform, and many thanks to all the supporters! We did it y'all! 🙌", "axes": {"reading_level": 0.25, "concreteness": 0.6, "narrativity": 0.35, "hedging": 0.1, "tone": 0.75, "warmth": 0.8, "self_disclosure": 0.4, "casualness": 0.7, "humor": 0.1}}, {"pid": "4624536", "topic": "Gardening & Plants", "activation": 0.2571, "text": "This wicked witch 🧙‍♀️ (coleus) is still looking great! It took over everything else in the pot. #coleus #gardening 🌱", "axes": {}}, {"pid": "22041735", "topic": "Economy & Jobs", "activation": 0.2451, "text": "The Narrative™️ cannot fail. It can only be failed. \n\nWhen media outlets show you who they are, over and over and over and over and over and over and over and over again, believe them 🤷‍♂️🤦‍♂️", "axes": {}}, {"pid": "128493107", "topic": "Food & Cooking", "activation": 0.2409, "text": "My favorite dish to eat while I'm in #PuertoRico 🇵🇷 is churrasco with chimichurri sauce accompanied by mofongo and a house salad 🥗. Then washing it down with a passion fruit mojito. 😋", "axes": {}}, {"pid": "81075039", "topic": "Transportation & Urbanism", "activation": 0.233, "text": "how out of touch with reality do you have to be to say distracted walking can be as dangerous as distracted driving...🤡\n\ndo better PA 🚶🏙️", "axes": {}}, {"pid": "67975247", "topic": "Sports", "activation": 0.2321, "text": "Just ONE Premier League defender has won the ball back 50+ times in the middle third of the pitch this season - William Saliba 🇫🇷🔴\nStepping 🆙", "axes": {}}]}, {"f": 66, "density": 0.0, "category": "dead", "lifts": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "rs": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "best_axis": "reading_level", "best_r": 0.0, "best_lift": 0.0, "examples": []}, {"f": 67, "density": 0.2178, "category": "confirms_axis", "lifts": {"reading_level": -0.005, "concreteness": -0.037, "narrativity": -0.017, "hedging": -0.002, "tone": 0.057, "warmth": -0.081, "self_disclosure": -0.058, "casualness": -0.011, "humor": 0.0}, "rs": {"reading_level": -0.001, "concreteness": -0.125, "narrativity": -0.067, "hedging": -0.016, "tone": 0.155, "warmth": -0.209, "self_disclosure": -0.149, "casualness": -0.075, "humor": -0.049}, "best_axis": "warmth", "best_r": -0.209, "best_lift": -0.081, "examples": [{"pid": "120260241", "topic": "Politics", "activation": 0.2895, "text": "Biden has supported continuation and expansion of mass surveillance used after 9/11. Mass surveillance has been greatly abused, targeting  Muslims, immigrants, and protesters for racial, environmental, and labor justice.", "axes": {}}, {"pid": "24653832", "topic": "Higher Education", "activation": 0.2761, "text": "What good reason is there to exhort students to report faculty engaging in a legally protected labor action to university administrators?", "axes": {}}, {"pid": "7671467", "topic": "Climate & Energy", "activation": 0.273, "text": "Federal prosecutors in San Diego today announced a first-of-its-kind indictment against a man accused of \"smuggling potent greenhouse gases into the United States from Mexico and then selling them for profit.\"", "axes": {"reading_level": 0.55, "concreteness": 0.75, "narrativity": 0.6, "hedging": 0.15, "tone": 0.3, "warmth": 0.5, "self_disclosure": 0.0, "casualness": 0.2, "humor": 0.0}}, {"pid": "127703", "topic": "Higher Education", "activation": 0.2471, "text": "Liberty University Hit With Record Fines for Failing to Handle Complaints of Sexual Assault, Other Crimes\n\nSpurred by a ProPublica investigation, the federal Department of Education found the evangelical school in Virginia had discouraged students from reporting rape and other crimes.", "axes": {"reading_level": 0.55, "concreteness": 0.75, "narrativity": 0.5, "hedging": 0.15, "tone": 0.6, "warmth": 0.3, "self_disclosure": 0.0, "casualness": 0.2, "humor": 0.0}}, {"pid": "8428337", "topic": "Sports", "activation": 0.2467, "text": "Dan Wetzel of Yahoo Sports is reporting a developing scandal involving the Michigan football team and stealing signs.", "axes": {}}, {"pid": "7128496", "topic": "Higher Education", "activation": 0.2396, "text": "In a leaked report we discover that the reason that Liberty University 'claimed' the safest campuses was because they bullied, coerced and actively covered abuse, harassment and sexual assaults\n\nOrganisations that claim moral superiority need to be held accountable", "axes": {"reading_level": 0.45, "concreteness": 0.55, "narrativity": 0.5, "hedging": 0.3, "tone": 0.7, "warmth": 0.25, "self_disclosure": 0.0, "casualness": 0.4, "humor": 0.0}}, {"pid": "50991483", "topic": "Higher Education", "activation": 0.2393, "text": "American University bans protests inside University buildings. As conservatives scream  \"censorship!\" students' right to speech continues to erode", "axes": {"reading_level": 0.45, "concreteness": 0.6, "narrativity": 0.25, "hedging": 0.15, "tone": 0.65, "warmth": 0.2, "self_disclosure": 0.1, "casualness": 0.4, "humor": 0.25}}, {"pid": "16017365", "topic": "AI & Tech", "activation": 0.2375, "text": "black mirror episode: tortured artist gets accused of posting AI art, but they just can’t draw hands", "axes": {}}, {"pid": "82663547", "topic": "Sports", "activation": 0.2243, "text": "Mason Greenwood will not play for Manchester United ever again. Correct decision made by MUFC. Just because he wasn’t convicted doesn’t mean he’s not guilty. He’s obviously a very unsavoury character that shouldn’t ever play professionally again.", "axes": {}}, {"pid": "39346531", "topic": "AI & Tech", "activation": 0.2126, "text": "AI can never beat allegations it’s not legit if it can’t stop creeping into people’s lives without their consent to use them.", "axes": {}}]}, {"f": 68, "density": 0.0, "category": "dead", "lifts": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "rs": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "best_axis": "reading_level", "best_r": 0.0, "best_lift": 0.0, "examples": []}, {"f": 69, "density": 0.0, "category": "dead", "lifts": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "rs": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "best_axis": "reading_level", "best_r": 0.0, "best_lift": 0.0, "examples": []}, {"f": 70, "density": 0.2584, "category": "partial_overlap", "lifts": {"reading_level": -0.03, "concreteness": -0.018, "narrativity": 0.008, "hedging": 0.02, "tone": 0.016, "warmth": 0.013, "self_disclosure": 0.047, "casualness": 0.072, "humor": 0.059}, "rs": {"reading_level": -0.121, "concreteness": -0.087, "narrativity": -0.004, "hedging": 0.039, "tone": 0.04, "warmth": 0.021, "self_disclosure": 0.064, "casualness": 0.195, "humor": 0.096}, "best_axis": "casualness", "best_r": 0.195, "best_lift": 0.072, "examples": [{"pid": "51480571", "topic": "Photography", "activation": 0.229, "text": "Chatting with @user about slide film and our mutual love of it - like all film and paper prices have increased recently. Nothing will stop me spending on my passion but with so many diverse analogue photography paths I tread and limited monthly spending…..thoughts.", "axes": {}}, {"pid": "22066903", "topic": "Music", "activation": 0.2063, "text": "My fave radio is some college kid named Ryder in a CBD haze playing indigenous Alaskan EDM at 7 am on his weekly show “The Phase Chamber.”", "axes": {}}, {"pid": "10548207", "topic": "Sports", "activation": 0.1874, "text": "Jayden Daniels getting lifted in the air by like five Ole Miss defenders at the end of a play, he is our league's most beloved Jackass cast member", "axes": {}}, {"pid": "16019364", "topic": "Gardening & Plants", "activation": 0.1825, "text": "My monstera opened a new leaf and it’s stunning. I had been worried cause recent leaves have all been the stumpy kind with no holes.", "axes": {}}, {"pid": "84451393", "topic": "Birds & Nature", "activation": 0.1805, "text": "TIL to watch my bird buddy vids until the end even if the app only identifies one bird. A male cardinal hammed it up for most of the video, but right at the end an unidentified butter butt appeared for Sunday brunch for just a few seconds. 🪶", "axes": {}}, {"pid": "11858102", "topic": "Fitness & Gym", "activation": 0.1801, "text": "This cut got me feeling small as fuck but ngl it's kinda awesome to see so much more definition come through. I just have to remind myself this cut is by no means the end goal, I'm just setting ground work for when I blow tf up. Weighed 184 Feb 14, sitting 174.9 today 👌", "axes": {}}, {"pid": "68845620", "topic": "Movies & Film", "activation": 0.1799, "text": "Rewatching The Boys & god casting Aya Cash (& the writing) was so brilliant. She has this incredible delivery, mean yet disarming & charming, an effortlessly cool bitch you want to like you. The perfect person to seem like she's speaking truth to power at first, then actually be a nazi sociopath.", "axes": {}}, {"pid": "31239298", "topic": "Economy & Jobs", "activation": 0.1762, "text": "Talking w/ my Lyft driver about how business been and this mf said “economic slowdown” but in the context of “the dot com boom is finally over” 💀", "axes": {}}, {"pid": "103002146", "topic": "Higher Education", "activation": 0.1739, "text": "hot take: just because you're leaving academia, doesn't mean your collaborators are. it's your responsibility to delegate work to make sure the work you're leaving behind can still get finished, *especially* if said collaborators are junior to you.", "axes": {}}, {"pid": "215597973", "topic": "Food & Cooking", "activation": 0.1733, "text": "Shoutout to @user  for this absolutely killer spam fried rice tonight.\n\nHe even picked the green beans out of the frozen veggies for me 🥰🥰🥰", "axes": {}}]}, {"f": 71, "density": 0.1848, "category": "partial_overlap", "lifts": {"reading_level": -0.035, "concreteness": 0.017, "narrativity": 0.063, "hedging": -0.027, "tone": 0.018, "warmth": 0.074, "self_disclosure": 0.094, "casualness": 0.034, "humor": 0.023}, "rs": {"reading_level": -0.103, "concreteness": 0.027, "narrativity": 0.123, "hedging": -0.048, "tone": 0.026, "warmth": 0.16, "self_disclosure": 0.134, "casualness": 0.084, "humor": 0.037}, "best_axis": "warmth", "best_r": 0.16, "best_lift": 0.094, "examples": [{"pid": "21285302", "topic": "Books & Reading", "activation": 0.2276, "text": "Just wondering if anyone would be into a sapphic story set in a Welsh borders 1910s girls' school about a young butch lesbian field hockey captain with powerful poetry-magic falling for a fashionable debutante whose family want her to be the living vessel of an immortal Otherworldly dark queen", "axes": {}}, {"pid": "56279612", "topic": "Gardening & Plants", "activation": 0.2143, "text": "meet Rosa’s younger sister, Samantha!\n\nRosa’s very supportive of her younger sis, who happens to tend to a large flower garden at their house. Samantha may be younger, but she’s capable of standing up for herself.", "axes": {}}, {"pid": "118573339", "topic": "Sports", "activation": 0.2055, "text": "Rose Lavelle and Sofia Huerta were full participants in training today for OL Reign. Big match to prepare for on Sunday!", "axes": {}}, {"pid": "69878535", "topic": "Sports", "activation": 0.2042, "text": "Mia Fishel tore her right ACL in USWNT training yesterday, replaced on Gold Cup roster by Alex Morgan, per USSF.", "axes": {}}, {"pid": "22661963", "topic": "Music", "activation": 0.1971, "text": "my review of Kylie Minogue's Tension album:\nthe horny 80s twin sister of Aphrodite. perfect length, has familiar Kylie-isms like danceable melancholy, but with some new 80s dance-pop and a little R&B (Hands!? Wtf!). I think it's the best thing she's done *since* Aphrodite.", "axes": {}}, {"pid": "19469879", "topic": "Sports", "activation": 0.1933, "text": "as much as i love chelsea, the nwsl is much stronger with stoney and harvey in it. with amoros & nahas showing what they can do, giraldez coming in and donaldson finally getting into the league, i'm extremely excited about the rapid increase of serious coaching in the nwsl.", "axes": {}}, {"pid": "2482328", "topic": "Pets", "activation": 0.1894, "text": "First they court you. Then you fall for them. Then they act coldly so you leave. Then they want you back but it’s too late. You joined a cult & are married to Jesus now, in a creepy & sexual way. Then they worry about you. Then they contact the authorities bc WTF’s wrong with you? Just get a cat.", "axes": {}}, {"pid": "64977749", "topic": "Photography", "activation": 0.1885, "text": "Been wanting to take more clean pictures of my ball jointed dolls but I've been healing from a flu.\n\nTake these oldies! They are made with a Canon EOS 2000D.  Very beginner friendly camera.\n\nI painted their faces myself. \n\nThese dolls represent my characters. #ocs #bjd #photography", "axes": {}}, {"pid": "9811720", "topic": "Books & Reading", "activation": 0.1838, "text": "Currently reading: An Introduction to Sally by Elizabeth von Arnim. Full of von Arnim's sly humour, absolutely loving it.", "axes": {}}, {"pid": "51659005", "topic": "Music", "activation": 0.1824, "text": "lana del rey was in her sufjan stevens “impossible soul” era when she wrote and recorded “venice bitch”", "axes": {}}]}, {"f": 72, "density": 0.2474, "category": "partial_overlap", "lifts": {"reading_level": -0.024, "concreteness": 0.007, "narrativity": 0.044, "hedging": -0.028, "tone": 0.007, "warmth": -0.017, "self_disclosure": 0.031, "casualness": -0.009, "humor": 0.059}, "rs": {"reading_level": -0.11, "concreteness": -0.028, "narrativity": 0.098, "hedging": -0.072, "tone": 0.078, "warmth": -0.074, "self_disclosure": 0.072, "casualness": 0.021, "humor": 0.131}, "best_axis": "humor", "best_r": 0.131, "best_lift": 0.059, "examples": [{"pid": "30488029", "topic": "Food & Cooking", "activation": 0.2393, "text": "As part of my ongoing attempt to destroy the fabric of reality, I’m making a sausage egg and cheese sandwich, with vegan eggs, vegan sausage, and vegan cheese, on gluten free bread. I think this counts as anti-cosmic!", "axes": {}}, {"pid": "12434448", "topic": "Music", "activation": 0.2155, "text": "If, over time, a band replaces all of its original members and changes their sound; is it still the same band, or an entirely new band?", "axes": {}}, {"pid": "150898139", "topic": "AI & Tech", "activation": 0.2, "text": "If I steal images posted by AI prompters and recreate them in my own style, sell the originals/prints I create from them, and then buy a bunch of art from my artist friends, does that make me Art Robin Hood?", "axes": {}}, {"pid": "143301127", "topic": "Higher Education", "activation": 0.1977, "text": "Every thesis defense should end with the ritual sacrifice of a tenured professor, to consecrate the progress of science.", "axes": {}}, {"pid": "11710667", "topic": "Food & Cooking", "activation": 0.1889, "text": "I do not want a baked potato right now, which means it's the perfect time to bake potatoes. if in an hour I still do not want baked potatoes, I will scoop them hollow, mix their insides with chorizo and butter and herbs, stuff them, and bake them more. this is my two-tiered plan for potato success", "axes": {}}, {"pid": "2079428", "topic": "AI & Tech", "activation": 0.1808, "text": "How pathetic one must be to call himself an “AI artist”. \nI pressed a button and a bomb exploded, I am now a nuclear engineer.", "axes": {}}, {"pid": althy Russian sage survived multiple assassination attempts and ultimately managed to grasp the helm of Empire", "axes": {}}, {"pid": "37520165", "topic": "Birds & Nature", "activation": 0.2051, "text": "A male bullfinch, upon a tangle of frosted wild rose, his breast well aglow even in the half-light — a coral pink, mirroring the daybreak sky above.", "axes": {}}, {"pid": "598705", "topic": "Music", "activation": 0.1911, "text": "At the risk of taking a joke too seriously, what’s striking about this live performance is how much is sounds like the album version of the song.", "axes": {}}, {"pid": "12921978", "topic": "Gardening & Plants", "activation": 0.1869, "text": "Last year’s dwarf irises—among my very favourite plants—were a treasure. This year we learn whether they’ll perennialize in the spots I picked for them, but as insurance, we planted another fifty. There can never be too many! They take up no space; their post-bloom foliage is narrow and subtle 🌱", "axes": {}}, {"pid": "3611513", "topic": "Politics", "activation": 0.1856, "text": "Every Democratic defeat is immediately, definitively explained by asserting that every policy position to the left of Bob Dole is unpopular and no Republican defeat is ever followed with even the timid suggestion that maybe their worldview just isn't very popular.", "axes": {}}, {"pid": "166971718", "topic": "Transportation & Urbanism", "activation": 0.1842, "text": "The big-bellied capybara driver glares down at you in the passenger seat as you fretfully try to get the Uber app to stop declining your payment. After the tenth failed attempt, you hear the deafening click of the car doors being locked. 1/2", "axes": {"reading_level": 0.35, "concreteness": 0.8, "narrativity": 0.75, "hedging": 0.1, "tone": 0.6, "warmth": 0.25, "self_disclosure": 0.4, "casualness": 0.55, "humor": 0.8}}, {"pid": "53781222", "topic": "Video Games", "activation": 0.1812, "text": "Understandable game design cowardice on display here, eliminating a classic, distinctive awkwardness in favor of the ultra-basic “cool, unnoticeable, EZ” vibes of usability-driven walking. And they barely do it in the movie either.", "axes": {}}, {"pid": "84461650", "topic": "Books & Reading", "activation": 0.1792, "text": "As Nebula nominations open, I'd like to remind that in addition to the deeply immersive novel Heretic and the NYT-featured novella Pluralities, Atthis Arts strained ourselves to every practical limit to make the Ukrainian collection happen because there was no larger press available. (1/5)", "axes": {}}]}, {"f": 80, "density": 0.1783, "category": "partial_overlap", "lifts": {"reading_level": 0.019, "concreteness": 0.014, "narrativity": 0.017, "hedging": -0.019, "tone": -0.038, "warmth": 0.011, "self_disclosure": -0.034, "casualness": -0.032, "humor": -0.037}, "rs": {"reading_level": 0.036, "concreteness": 0.041, "narrativity": 0.038, "hedging": -0.022, "tone": -0.101, "warmth": 0.031, "self_disclosure": -0.055, "casualness": -0.098, "humor": -0.063}, "best_axis": "tone", "best_r": -0.101, "best_lift": -0.038, "examples": [{"pid": "162098477", "topic": "Transportation & Urbanism", "activation": 0.3319, "text": "Gavin's Bridge in Nijmegen has been structurally renovated and has a new road surface. But, there's no money left for a new paint job.", "axes": {}}, {"pid": "61437870", "topic": "Books & Reading", "activation": 0.3201, "text": "Still exciting to me: 'Eroberte im Mittelalter' has been released in March 2023 as a printed and electronic version at DeGruyter. Once again: Massive thanks to everyone being involved in the process and who will hopefully join here soon – it was a real pleasure working with you! @user", "axes": {}}, {"pid": "33917031", "topic": "Higher Education", "activation": 0.3065, "text": "So far very few Finnish legal scholars found their way here. This means that I can pretty much bullshit anything about our laws and still be the authority.\nSo, have you always wondered something about Finnish legal system? Now is your time to ask, and I will make some stuff up.", "axes": {}}, {"pid": "51074567", "topic": "Birds & Nature", "activation": 0.2934, "text": "Here follows a bunch of photos from this summer’s visit to the Swedish Air Force museum. Little bit out of the way, but rammed with rare birds- a lot of “last of the species”", "axes": {"reading_level": 0.3, "concreteness": 0.6, "narrativity": 0.5, "hedging": 0.2, "tone": 0.4, "warmth": 0.6, "self_disclosure": 0.4, "casualness": 0.55, "humor": 0.2}}, {"pid": "11208771", "topic": "Higher Education", "activation": 0.2931, "text": "Utrecht University in the Netherlands has withdrawn itself from the World University Ranking provided by Times Higher Education by not sending that company data anymore. As this has generated quite some reactions - praise, questions, some doubts, I want to provide some context. Hence this thread 1/n", "axes": {}}, {"pid": "77423734", "topic": "Transportation & Urbanism", "activation": 0.2819, "text": "Before and after of a part of Utrecht's reconstructed Western City Boulevard. From a road designed for maximum traffic flow to a road layout with less space for cars and more for active traffic and greenery. And more livable neighborhoods along the route.\n\n📍 Marnixlaan, Utrecht", "axes": {}}, {"pid": "47413032", "topic": "Climate & Energy", "activation": 0.2809, "text": "In Finland, there have been now four consecutive months with a nationwide temperature anomaly < -2°C (Oct-Jan). \n\nThe last such streak of cold months occurred in the winter of 2009-2010.\n\nWill February be the fifth such month?", "axes": {}}, {"pid": "98289841", "topic": "Higher Education", "activation": 0.2804, "text": "Germans or those residing there, am I correct about this: there is not that much public discussion/pressures on increasing tertiary education, despite the fact the volume is pretty low in comparison to other OECD coutries", "axes": {}}, {"pid": "90523589", "topic": "Higher Education", "activation": 0.2794, "text": "If you‘re a recent full professor in Germany aka you got the job you desperately wanted and are only now realizing that it’s mostly politics and admin and grading and commuting - stfu about it on social media the rest of us are doing this for less money & without the job security", "axes": {}}, {"pid": "121431672", "topic": "Fitness & Gym", "activation": 0.2767, "text": "I proudly announce that Kallisto has already lost 5 gramm due to her sport and diet plan. She still has cheeks for days but hey, she's making progress.", "axes": {}}]}, {"f": 81, "density": 0.1938, "category": "partial_overlap", "lifts": {"reading_level": -0.0, "concreteness": -0.048, "narrativity": -0.029, "hedging": -0.008, "tone": 0.019, "warmth": -0.051, "self_disclosure": -0.038, "casualness": -0.019, "humor": -0.015}, "rs": {"reading_level": 0.005, "concreteness": -0.122, "narrativity": -0.098, "hedging": 0.015, "tone": 0.07, "warmth": -0.167, "self_disclosure": -0.086, "casualness": -0.036, "humor": -0.013}, "best_axis": "warmth", "best_r": -0.167, "best_lift": -0.051, "examples": [{"pid": "16143566", "topic": "Video Games", "activation": 0.3857, "text": "Sony Interactive Entertainment is laying off about 900 PlayStation employees worldwide, a reduction of about 8%, the company announced this week.", "axes": {}}, {"pid": "172686020", "topic": "Sports", "activation": 0.3083, "text": "“He was the head coach and he reported to the sporting director but he was also the technical director who hired the sporting director and he hired his son as the chief scout. Now that they fired him they have an interim manager who replaced the interim manager.”", "axes": {}}, {"pid": "43280967", "topic": "AI & Tech", "activation": 0.2773, "text": "if MSFT were acquiring openAI, they would have more flexibility around bringing all of these people on, but you can’t hire hundreds of people from a partner on a whim, that’s not how any of this works", "axes": {"reading_level": 0.55, "concreteness": 0.4, "narrativity": 0.1, "hedging": 0.3, "tone": 0.55, "warmth": 0.25, "self_disclosure": 0.05, "casualness": 0.5, "humor": 0.1}}, {"pid": "185204193", "topic": "Video Games", "activation": 0.2705, "text": "This concerns AAA Gaming. The industry has lost 5k jobs in 24 days. Nearly every AAA studio is consolidated under two huge companies whose only goal is short-term profit. What does this mean for the future? More consolidation, less releases, longer projects, more turnover and less stability.", "axes": {"reading_level": 0.55, "concreteness": 0.6, "narrativity": 0.2, "hedging": 0.2, "tone": 0.65, "warmth": 0.3, "self_disclosure": 0.05, "casualness": 0.3, "humor": 0.0}}, {"pid": "5811117", "topic": "Video Games", "activation": 0.2609, "text": "CD Projekt Staff form new union for all Polish game developers following three rounds of layoffs at the Cyberpunk 2077 studio over the summer", "axes": {}}, {"pid": "28011946", "topic": "Video Games", "activation": 0.2597, "text": "just laid off from xbox... i was the guy who individually punched all the little holes into the console....\nthey are shipping solid rectangles going forward. be warned!!", "axes": {}}, {"pid": "75174038", "topic": "Video Games", "activation": 0.2572, "text": "Employees with long tenure produce superior results in game development, just look at Nintendo, who has employed a number of legendary game developers since the 1980s. 1/12", "axes": {}}, {"pid": "1711514", "topic": "AI & Tech", "activation": 0.255, "text": "I think any AI Company which is unable to replace its CEO with an AI shows they're a bad AI company.", "axes": {"reading_level": 0.3, "concreteness": 0.2, "narrativity": 0.1, "hedging": 0.15, "tone": 0.6, "warmth": 0.2, "self_disclosure": 0.15, "casualness": 0.4, "humor": 0.65}}, {"pid": "17489013", "topic": "AI & Tech", "activation": 0.2494, "text": "if unity wants a path to profitability they could start by firing everyone with 'blockchain' or 'generative AI' in their job description", "axes": {}}, {"pid": "45627552", "topic": "AI & Tech", "activation": 0.2326, "text": "“I worked there for five years […] Our team had four core members and two of us got the boot. The two who remained will just review AI content to make sure it’s acceptable.\" mashable.com/article/duol...", "axes": {"reading_level": 0.3, "concreteness": 0.75, "narrativity": 0.6, "hedging": 0.1, "tone": 0.65, "warmth": 0.25, "self_disclosure": 0.7, "casualness": 0.55, "humor": 0.2}}]}, {"f": 82, "density": 0.2614, "category": "partial_overlap", "lifts": {"reading_level": -0.035, "concreteness": -0.017, "narrativity": 0.007, "hedging": -0.021, "tone": 0.014, "warmth": 0.044, "self_disclosure": -0.004, "casualness": 0.033, "humor": 0.032}, "rs": {"reading_level": -0.121, "concreteness": -0.061, "narrativity": 0.003, "hedging": -0.064, "tone": 0.038, "warmth": 0.095, "self_disclosure": -0.03, "casualness": 0.083, "humor": 0.057}, "best_axis": "reading_level", "best_r": -0.121, "best_lift": 0.044, "examples": [{"pid": "28906742", "topic": "Food & Cooking", "activation": 0.2975, "text": "*Binging with Babish voice* \n\nHey guys, so today we’re gonna make a spicy poblano roasted hog with a sweet cream reduction.", "axes": {}}, {"pid": "33299963", "topic": "Higher Education", "activation": 0.2508, "text": "Hi there! 👋 We’re here for all the #AcademicChatter and supporting community for all those who are marginalized in academia. And always asking, as we did in our first podcast episode, why are there so many assholes in academia?", "axes": {"reading_level": 0.3, "concreteness": 0.4, "narrativity": 0.35, "hedging": 0.15, "tone": 0.55, "warmth": 0.75, "self_disclosure": 0.2, "casualness": 0.7, "humor": 0.5}}, {"pid": "42027104", "topic": "Pets", "activation": 0.2312, "text": "Happy Cannoli Gotcha Day! One year ago today, we brought the wee baby Cannoli home, and she was the wee-est wee baby. Cannoliversary", "axes": {}}, {"pid": "80178866", "topic": "Food & Cooking", "activation": 0.2285, "text": "Green Chef ran another special so y’all know what that means: For the next four nights, food pics clogging up ur timeline! Tilapia tacos with Cotija Street Corn is up first.", "axes": {}}, {"pid": "50585054", "topic": "Books & Reading", "activation": 0.2192, "text": "Okay, y'all. I ain't no more good. Writing royalty right here, the amazing Donna Hill. National Black Book Festival highlight🖤.", "axes": {}}, {"pid": "903438", "topic": "Movies & Film", "activation": 0.2155, "text": "Since it’s National Horror Movie Day, I’m going to revisit Ari Aster’s Hereditary. Has anyone else checked this one out?", "axes": {}}, {"pid": "37396893", "topic": "Transportation & Urbanism", "activation": 0.2137, "text": "Alright New Orleans, y'all done lost your driving privileges. Starting now no cars allowed. Streetcars, bicycles, buses only.", "axes": {}}, {"pid": "33917031", "topic": "Higher Education", "activation": 0.2021, "text": "So far very few Finnish legal scholars found their way here. This means that I can pretty much bullshit anything about our laws and still be the authority.\nSo, have you always wondered something about Finnish legal system? Now is your time to ask, and I will make some stuff up.", "axes": {}}, {"pid": "71637877", "topic": "Books & Reading", "activation": 0.2016, "text": "New Author Interview - today on the blog Lili Hayward kindly talked to me about their new novel A Midwinter’s Tail - we talk islands, myths and cats", "axes": {}}, {"pid": "9039743", "topic": "Economy & Jobs", "activation": 0.2015, "text": "Feel like the economy is in trouble? We asked three rich guys who do nothing but drink wine on a boat all year what they think and they said the economy is fine", "axes": {"reading_level": 0.25, "concreteness": 0.65, "narrativity": 0.55, "hedging": 0.1, "tone": 0.65, "warmth": 0.5, "self_disclosure": 0.15, "casualness": 0.7, "humor": 0.8}}]}, {"f": 83, "density": 0.3215, "category": "partial_overlap", "lifts": {"reading_level": 0.012, "concreteness": -0.042, "narrativity": -0.035, "hedging": -0.021, "tone": 0.006, "warmth": -0.003, "self_disclosure": -0.03, "casualness": -0.02, "humor": -0.005}, "rs": {"reading_level": 0.023, "concreteness": -0.155, "narrativity": -0.097, "hedging": -0.071, "tone": 0.012, "warmth": 0.005, "self_disclosure": -0.058, "casualness": -0.08, "humor": -0.035}, "best_axis": "concreteness", "best_r": -0.155, "best_lift": -0.042, "examples": [{"pid": "8979283", "topic": "Higher Education", "activation": 0.2675, "text": "French, Philosophy, Art History, Sociology & others to be cut in pursuit of the time honored educational values of “revenue generation” & “efficiency enhancement”", "axes": {}}, {"pid": "62485626", "topic": "Gardening & Plants", "activation": 0.2484, "text": "This spring, exhausted with work stress, I chose to take a break and grow things. I grew 8 leaves, 12 herbs, and 2 tomato varieties, all from heirloom (pre-WWII) seeds. Everything was grown in chemical fertilizer and pesticide free soil, with a little vermicompost. It has been amazing.", "axes": {}}, {"pid": "142413524", "topic": "Gardening & Plants", "activation": 0.2429, "text": "Tulips & Daffodils\nhave always had a particular allure for me at the beginning of March, meant to banish my personal SAD-addled blues, and prepare for brighter days, longer daylight, and the promise of Summer’s warmth\n\nFeed your eyes with color and your mood will follow", "axes": {}}, {"pid": "221105145", "topic": "Pets", "activation": 0.2292, "text": "Small account doing alt text: behold, a majestic honey badger, rearing up on its black legs, its muscular body tensed in erotic anticipation. On its face is an expression of determination and a glimpse of buried primal passions, its eyes betray a lustful playfu\n\nLarge account doing alt text: cat lol", "axes": {}}, {"pid": "2616314", "topic": "Pets", "activation": 0.2245, "text": "At least 95% of my communication with my dogs is non-verbal.  So much communication through taking/yielding space, body positioning/intent, head movement and eye monitoring.  Only when they're out of eye contact are verbal commands really more useful.", "axes": {}}, {"pid": "31036213", "topic": "Ancient History", "activation": 0.2188, "text": "Egyptians believed that azurite is a stone of mystery and psychic powers, used to pierce the veils of life's greatest mysteries. The priests used azurite-based paints to draw the eye of Horus on their foreheads to raise their consciousness to the level of communing with gods.", "axes": {"reading_level": 0.55, "concreteness": 0.75, "narrativity": 0.5, "hedging": 0.15, "tone": 0.35, "warmth": 0.5, "self_disclosure": 0.0, "casualness": 0.2, "humor": 0.0}}, {"pid": "6192453", "topic": "Space & Astronomy", "activation": 0.2172, "text": "\"Crown of Storms\" / acrylic on canvas. Inspired by NASA's JUNO Mission, chaotic storms of Jupiter's polar region swirl in beautiful abstract fluidity.", "axes": {}}, {"pid": "58175806", "topic": "Movies & Film", "activation": 0.2159, "text": "A superb documentary feature full of real life. Varda explores a wasteland of discarded objects, wasted food and outcasts. Poetic and magical. Highly recommend.", "axes": {}}, {"pid": "183567983", "topic": "Video Games", "activation": 0.2152, "text": "[i want shorter games with worse graphics voice] i want my JRPGs without dozens of hours of needless AAA padding that utterly wrecks any sense of drama, stakes, character growth, etc.", "axes": {"reading_level": 0.45, "concreteness": 0.6, "narrativity": 0.2, "hedging": 0.15, "tone": 0.65, "warmth": 0.35, "self_disclosure": 0.5, "casualness": 0.7, "humor": 0.3}}, {"pid": "197780853", "topic": "Fitness & Gym", "activation": 0.2123, "text": "This is the fun part! I shock my body with a whole different lifting regime every 12 weeks. So - today I spent 2 hours in the gym devising & trialling a whole new Arms Day workout. Different exercises, bodyweight callisthenics, free-weights, higher reps & much lower weight (for now). Great stuff! 🏋🏽💪🏼", "axes": {}}]}, {"f": 84, "density": 0.2168, "category": "partial_overlap", "lifts": {"reading_level": -0.01, "concreteness": -0.027, "narrativity": -0.005, "hedging": 0.008, "tone": 0.017, "warmth": -0.027, "self_disclosure": 0.023, "casualness": 0.034, "humor": 0.034}, "rs": {"reading_level": -0.063, "concreteness": -0.062, "narrativity": -0.018, "hedging": -0.004, "tone": 0.082, "warmth": -0.068, "self_disclosure": 0.026, "casualness": 0.115, "humor": 0.093}, "best_axis": "casualness", "best_r": 0.115, "best_lift": 0.034, "examples": [{"pid": "31113161", "topic": "Video Games", "activation": 0.4183, "text": "so uh, who's still left to make the actual game? You know, the product what makes the actual monies?", "axes": {}}, {"pid": "197499532", "topic": "Music", "activation": 0.4154, "text": "you know i’m going through something when one of my top artists of the month on spotify is the oak ridge boys", "axes": {}}, {"pid": "14924752", "topic": "Economy & Jobs", "activation": 0.407, "text": "so what you're telling me is this inflation was of a limited nature in terms of time? like it went up and then back down? gotta be a name for that", "axes": {}}, {"pid": "32415100", "topic": "Fitness & Gym", "activation": 0.3345, "text": "i think the yoga thing about breathing into only the left or right lung is a placebo effect but i also think it’s a very useful one", "axes": {}}, {"pid": "25209818", "topic": "Pets", "activation": 0.3, "text": "it's coming up so this is your annual reminder that cats know and care absolutely NOTHING about Advent", "axes": {}}, {"pid": "19063124", "topic": "Books & Reading", "activation": 0.2628, "text": "you're damn right i'm gonna wrap up 25 christmas storybooks we already have and unwrap and read one each night even tho the babies have no idea what's happening and even tho i heard that idea from laura fucking bush", "axes": {"reading_level": 0.3, "concreteness": 0.75, "narrativity": 0.6, "hedging": 0.15, "tone": 0. iously believed.\"🧪🌎", "axes": {}}, {"pid": "61189471", "topic": "Climate & Energy", "activation": 0.2887, "text": "NPS did a prescribed burn yesterday at the battlefield we hike at. So weird to have it down to nothing, but they're trying to give the native plants a chance to grow.  They do a different area most years.", "axes": {}}, {"pid": "40424483", "topic": "Climate & Energy", "activation": 0.276, "text": "As the wildfires in the Texas Panhandle continue leaving scorched homes, barns and livestock in their wake, some residents are beginning to glimpse what recovery will look like when the blazes are finally extinguished.", "axes": {}}, {"pid": "59911158", "topic": "Climate & Energy", "activation": 0.2752, "text": "mining in the Appalachian Mountains has surface mined over 500 of the individual mountains in the entire mountain range. this causes major environmental and ecological disaster, basically destroying and “killing” the mountain\n\nsource: “Fighting King Coal” by Shannon Elizabeth Bell", "axes": {}}, {"pid": "31493096", "topic": "Climate & Energy", "activation": 0.2295, "text": "The Smokehouse Fire has torn across hundreds of thousands of acres of TX since igniting Mon afternoon. Its explosive spread is tied directly to the dry, warm and windy conditions that dominated the Panhandle Monday and Tuesday.\nit has spread at an average rate of 150 football fields every minute.", "axes": {}}, {"pid": "66803228", "topic": "Ancient History", "activation": 0.2293, "text": "This is An Grainan of Aileach, 6th century ring fort. I was really lucky to grow up near this incredible structure. It offers stunning views of Inishowen. Most ring forts have been completely destroyed, and the faint reminders left on the land are called Fairy Forts. It's bad luck to remove them.", "axes": {}}, {"pid": "124983410", "topic": "Photography", "activation": 0.2268, "text": "Dry stone walls can act as a connective linear feature across the farmed landscape - Lake District Observation
