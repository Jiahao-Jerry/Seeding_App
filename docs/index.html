"activation": 0.2032, "text": "youre seriously going to tell me the living wage for someone who's 6'4 is the same as the living wage as someone who's 4'8? thats antimaterialist bro", "axes": {}}, {"pid": "31872912", "topic": "Sports", "activation": 0.1994, "text": "At 40, Onome Ebi is the first ever African - male or female - to appear at six World Cups.\n\nSuper Falcons Star!", "axes": {}}, {"pid": "32718701", "topic": "Sports", "activation": 0.1994, "text": "The man most famous for playing an incredible nerd on TV has quietly become one of America's greatest multi-sport athletes", "axes": {}}, {"pid": "3392100", "topic": "Politics", "activation": 0.1979, "text": "The average US Senator is ten years older than the younger Golden Girls. Sophia is younger than Biden or McConnell.", "axes": {}}]}, {"f": 24, "density": 0.0, "category": "dead", "lifts": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "rs": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "best_axis": "reading_level", "best_r": 0.0, "best_lift": 0.0, "examples": []}, {"f": 25, "density": 0.1092, "category": "novel_candidate", "lifts": {"reading_level": -0.036, "concreteness": 0.016, "narrativity": 0.001, "hedging": -0.013, "tone": 0.004, "warmth": -0.029, "self_disclosure": -0.009, "casualness": 0.029, "humor": 0.062}, "rs": {"reading_level": -0.03, "concreteness": -0.014, "narrativity": -0.038, "hedging": -0.024, "tone": 0.022, "warmth": -0.088, "self_disclosure": -0.06, "casualness": 0.005, "humor": 0.057}, "best_axis": "warmth", "best_r": -0.088, "best_lift": 0.062, "examples": [{"pid": "34658607", "topic": "Transportation & Urbanism", "activation": 0.3818, "text": "Nobody loves to hit cruise and sit in the passing lane more than a chud driving a pickup truck in Ontario", "axes": {}}, {"pid": "76892511", "topic": "Transportation & Urbanism", "activation": 0.3118, "text": "the overlanding /off-roading trend that is currently shaping the light truck market     needs to happen to MiniVans", "axes": {}}, {"pid": "72298866", "topic": "Transportation & Urbanism", "activation": 0.286, "text": "The best car is the one that is not built because of fantastic alternatives and timely regulation of superfluous car traffic.\nThen even the drive doesn't matter.", "axes": {"reading_level": 0.6, "concreteness": 0.2, "narrativity": 0.15, "hedging": 0.15, "tone": 0.55, "warmth": 0.4, "self_disclosure": 0.05, "casualness": 0.25, "humor": 0.5}}, {"pid": "53104791", "topic": "Transportation & Urbanism", "activation": 0.2808, "text": "i help train self-driving cars. in order to make the experience more realistic, they’re generally trained to hit pedestrians every now and then", "axes": {}}, {"pid": "19404488", "topic": "Transportation & Urbanism", "activation": 0.2789, "text": "There are still fatal accidents on roads with lower speed limits for the reason that there are still people like Geoff Upson despite compulsory schooling", "axes": {"reading_level": 0.55, "concreteness": 0.65, "narrativity": 0.2, "hedging": 0.1, "tone": 0.6, "warmth": 0.2, "self_disclosure": 0.0, "casualness": 0.3, "humor": 0.5}}, {"pid": "55963594", "topic": "Transportation & Urbanism", "activation": 0.2742, "text": "Good piece from @user (his last with us; sigh): the National Transportation Safety Board is recommending intelligent speed assistance (ISA) systems to limit reckless driving. But what about the cybersecurity risk of remote takeover of vehicles?", "axes": {}}, {"pid": "38538099", "topic": "Transportation & Urbanism", "activation": 0.2696, "text": "I think you're referring to CAFE standards, written into law in 1975 and established separate manufacturer average fuel standards for cars and light trucks, but amended in 2007, by D congress, signed by Bush? EVs bring down average CAFE MPGs, but I don't believe the size (classification) matters", "axes": {}}, {"pid": "51521099", "topic": "Transportation & Urbanism", "activation": 0.2673, "text": "Who here has had experience driving hybrid cars? I've ruled out full EVs as they're still too expensive on the used market, or they don't have enough range.", "axes": {}}, {"pid": "10888281", "topic": "Transportation & Urbanism", "activation": 0.2612, "text": "The day Sweden switched from driving on the left-hand side of the road to driving on the right, 1967.", "axes": {}}, {"pid": "53980833", "topic": "Transportation & Urbanism", "activation": 0.2578, "text": "my headlights on my older model car are so dim i drive with my brights on and they’re still not that great plus no one flashes me 🤣\nyes, i know i can try cleaning the lenses - i am not asking for advice", "axes": {"reading_level": 0.25, "concreteness": 0.75, "narrativity": 0.5, "hedging": 0.15, "tone": 0.4, "warmth": 0.65, "self_disclosure": 0.6, "casualness": 0.75, "humor": 0.6}}]}, {"f": 26, "density": 0.1637, "category": "partial_overlap", "lifts": {"reading_level": 0.04, "concreteness": 0.008, "narrativity": -0.005, "hedging": 0.022, "tone": -0.018, "warmth": -0.008, "self_disclosure": -0.073, "casualness": -0.051, "humor": -0.042}, "rs": {"reading_level": 0.081, "concreteness": 0.014, "narrativity": -0.051, "hedging": 0.056, "tone": -0.067, "warmth": -0.029, "self_disclosure": -0.126, "casualness": -0.094, "humor": -0.038}, "best_axis": "self_disclosure", "best_r": -0.126, "best_lift": -0.073, "examples": [{"pid": "140695240", "topic": "Space & Astronomy", "activation": 0.3759, "text": "the Lucy probe story in there is also p neat. The main asteroid has an even smaller asteroid as its moon", "axes": {}}, {"pid": "5115530", "topic": "Space & Astronomy", "activation": 0.3169, "text": "There’s a rogue black hole in our galaxy with a mass seven times greater than the sun. \n\nJust like your mom", "axes": {}}, {"pid": "25888448", "topic": "Space & Astronomy", "activation": 0.2874, "text": "On Saturn's moon Titan, there is a gigantic tower that stretches so high into the sky it pierces the thick tholin clouds that blanket the moon's surface", "axes": {}}, {"pid": "13355094", "topic": "Space & Astronomy", "activation": 0.2676, "text": "Starfleet named the ship Voyager, after a NASA probe that got lost, fell in a black hole, became a god, and tried to destroy Earth. In retrospect, maybe what happened next was inevitable.", "axes": {}}, {"pid": "6192453", "topic": "Space & Astronomy", "activation": 0.2623, "text": "\"Crown of Storms\" / acrylic on canvas. Inspired by NASA's JUNO Mission, chaotic storms of Jupiter's polar region swirl in beautiful abstract fluidity.", "axes": {}}, {"pid": "5184468", "topic": "Space & Astronomy", "activation": 0.2553, "text": "Oh, we need to examine Uranus? Well here, feast your eyes on Uranus! \n\nI've gotta say, Uranus looks great!", "axes": {}}, {"pid": "92192503", "topic": "Space & Astronomy", "activation": 0.249, "text": "I know that some people choose to continue to recognize Pluto as a planet despite its demotion by the IAU. Me, I'm chosen to continue to believe that Neptune really is that blue.", "axes": {}}, {"pid": "48914395", "topic": "Space & Astronomy", "activation": 0.2472, "text": "Nasa's Osiris-Rex capsule, which contains dust from Asteroid Bennu, could reveal how life on Earth began.", "axes": {}}, {"pid": "65845612", "topic": "Space & Astronomy", "activation": 0.2428, "text": "Here's a map of the orbital ground track of China's new L-band synchronous-altitude radar satellite Ludi Tance 4A", "axes": {}}, {"pid": "158399065", "topic": "Space & Astronomy", "activation": 0.2411, "text": "So gravitational waves can theoretically be created artificially and people have considered how to make them into gravitational laser beams. Which is just such a wild idea.", "axes": {}}]}, {"f": 27, "density": 0.2374, "category": "partial_overlap", "lifts": {"reading_level": -0.061, "concreteness": -0.019, "narrativity": 0.012, "hedging": -0.003, "tone": 0.013, "warmth": 0.001, "self_disclosure": 0.051, "casualness": 0.055, "humor": 0.002}, "rs": {"reading_level": -0.181, "concreteness": -0.065, "narrativity": 0.039, "hedging": 0.002, "tone": 0.051, "warmth": 0.022, "self_disclosure": 0.121, "casualness": 0.172, "humor": 0.037}, "best_axis": "reading_level", "best_r": -0.181, "best_lift": -0.061, "examples": [{"pid": "24112218", "topic": "Transportation & Urbanism", "activation": 0.283, "text": "Hey guys im designing a transit system and want to get more people to ride it. I came up with this awesome idea where ill call some bus lines \"frequent service\" and then the busses will come every 30 minutws if youre lucky. Pretty smart right? I call it trimet", "axes": {}}, {"pid": "10627890", "topic": "Space & Astronomy", "activation": 0.2673, "text": "Ok but is there anyone to geek out on about Black holes and white holes in outer space and the biggest black hole that it exists and how there’s possibly other life beings out there and-", "axes": {}}, {"pid": "4199544", "topic": "Pets", "activation": 0.2451, "text": "Hi my name is McKellan. I used to be Chief but then I got adopted. My sisters are Darby & Indy and I love them", "axes": {"reading_level": 0.15, "concreteness": 0.8, "narrativity": 0.7, "hedging": 0.05, "tone": 0.3, "warmth": 0.9, "self_disclosure": 0.75, "casualness": 0.65, "humor": 0.2}}, {"pid": "20020034", "topic": "Video Games", "activation": 0.2239, "text": "Please help solve this argument.  I love Candy Crush and Solitaire and play a lot. The kid says that doesn't make me a gamer, but I reckon they're games so I am!", "axes": {}}, {"pid": "48511793", "topic": "Video Games", "activation": 0.2233, "text": "I wanna get into Splatoon so bad man, it’s the one game that I WANT to like but it just doesn’t grab me", "axes": {}}, {"pid": "27702836", "topic": "Politics", "activation": 0.215, "text": "I am nominating my dad for president, he's still younger than biden and trump and I want him to stop teaching in remote  alaska until he dies and no one finds out for a month", "axes": {}}, {"pid": "76253368", "topic": "Birds & Nature", "activation": 0.2116, "text": "So I saw this baby squirrel in my back yard for weeks that didn't get bigger and I looked it up, turns out it's a red squirrel and they're just smaller than the \"normal\" gray squirrels which are smaller than the fox squirrels we also have and also yes I have adhd why'd you ask", "axes": {"reading_level": 0.4, "concreteness": 0.75, "narrativity": 0.65, "hedging": 0.15, "tone": 0.55, "warmth": 0.7, "self_disclosure": 0.75, "casualness": 0.75, "humor": 0.6}}, {"pid": "28915617", "topic": "Books & Reading", "activation": 0.2092, "text": "Idk if I should reply to myself or quote post myself more on this platform still but here is the book I’m reading rn specifically about her", "axes": {}}, {"pid": "37160390", "topic": "Movies & Film", "activation": 0.2059, "text": "Spooktober Movie night 2 complete! Watched Gaia and it was alright. Not the horror movie it was hyped to be but it did have a pretty cool idea around fungi infections. I thought the inclusion a religious worship of he earth was interesting as well. If you like suspenseful dramas I'd say go for it.", "axes": {}}, {"pid": "109298440", "topic": "Economy & Jobs", "activation": 0.2008, "text": "How do economic indicators factor negative work... because that is what i will be participating in this week... negative work", "axes": {}}]}, {"f": 28, "density": 0.2429, "category": "partial_overlap", "lifts": {"reading_level": -0.014, "concreteness": 0.042, "narrativity": 0.088, "hedging": -0.013, "tone": -0.008, "warmth": 0.035, "self_disclosure": 0.052, "casualness": 0.023, "humor": 0.037}, "rs": {"reading_level": -0.067, "concreteness": 0.106, "narrativity": 0.171, "hedging": -0.051, "tone": -0.032, "warmth": 0.076, "self_disclosure": 0.057, "casualness": 0.057, "humor": 0.061}, "best_axis": "narrativity", "best_r": 0.171, "best_lift": 0.088, "examples": [{"pid": "49812012", "topic": "Music", "activation": 0.2556, "text": "Neil Young with Crazy Horse:\n\nNeil starts off playing rhythm guitar in the right channel, while Danny Whitten plays a gloriously lazy lead in the left, and they continue to alternate lead & rhythm roles throughout. Surely, one of the best guitar jams of all time…", "axes": {}}, {"pid": "27458591", "topic": "Food & Cooking", "activation": 0.2448, "text": ", so the trick is right before the egg is done you kill the heat , put the cheese 𝘰𝘯 and then cover the pan for like ten 15 seconds ... yeah exactly", "axes": {}}, {"pid": "52448751", "topic": "Politics", "activation": 0.2442, "text": "imagine being one of the politicians who showed up hours early to get an aisle seat only to reach out your hand to Biden and have him just not see you and walk past", "axes": {}}, {"pid": "145494571", "topic": "Fitness & Gym", "activation": 0.244, "text": "Went to the range today and worked on my grip. Finally understood the role my right elbow plays in my accuracy. Tightened it up and did pretty ok.", "axes": {}}, {"pid": "81073870", "topic": "Transportation & Urbanism", "activation": 0.2413, "text": "\"Get off the sidewalk!\" pedestrian yells at cyclist who is moving along the 12-foot wide bike path with a yellow dotted line painted down the middle.", "axes": {}}, {"pid": "14923698", "topic": "Sports", "activation": 0.2328, "text": "You should be able to strike a batter out on one pitch if it’s a really good one. The umpire should get to decide that.", "axes": {"reading_level": 0.2, "concreteness": 0.3, "narrativity": 0.1, "hedging": 0.1, "tone": 0.4, "warmth": 0.5, "self_disclosure": 0.0, "casualness": 0.5, "humor": 0.0}}, {"pid": "132084856", "topic": "Fitness & Gym", "activation": 0.232, "text": "Make sure when you're lifting heavy objects to use swift jerking motions and only your low back muscles.", "axes": {}}, {"pid": "59904098", "topic": "Birds & Nature", "activation": 0.231, "text": "Beamer single tracks absolutely perfectly. First picture is a trot, second picture is after some birds moved and he broke into a lope.", "axes": {}}, {"pid": "164145104", "topic": "Sports", "activation": 0.2304, "text": "All four substitutes were involved in the Arsenal goal. Partey long pass, Tomiyasu nod down, Havertz lay off Martinelli goal", "axes": {}}, {"pid": "8068220", "topic": "Ancient History", "activation": 0.225, "text": "A gable within a gable in Frankwell, Shrewsbury. Possibly C15th. The principals of the cruck frame are split from a single tree. The beam that ties them together is arch braced - and check out the trenches (cut-outs) where the purlins once fitted.", "axes": {"reading_level": 0.7, "concreteness": 0.85, "narrativity": 0.2, "hedging": 0.3, "tone": 0.5, "warmth": 0.65, "self_disclosure": 0.1, "casualness": 0.4, "humor": 0.2}}]}, {"f": 29, "density": 0.2479, "category": "novel_candidate", "lifts": {"reading_level": -0.006, "concreteness": -0.026, "narrativity": 0.012, "hedging": 0.018, "tone": -0.025, "warmth": -0.008, "self_disclosure": 0.013, "casualness": -0.017, "humor": -0.045}, "rs": {"reading_level": -0.039, "concreteness": -0.098, "narrativity": -0.004, "hedging": 0.056, "tone": -0.051, "warmth": -0.028, "self_disclosure": 0.026, "casualness": -0.039, "humor": -0.059}, "best_axis": "concreteness", "best_r": -0.098, "best_lift": -0.045, "examples": [{"pid": "43649705", "topic": "Video Games", "activation": 0.27, "text": "I've been playing RPGs since about 1989, aware of larger industry trends since the early 2000s, and self-publishing for almost ten years.\n\nSeeing people who weren't born yet when I started playing write about this and call themselves 'historians' feels very weird.", "axes": {}}, {"pid": "60827305", "topic": "Economy & Jobs", "activation": 0.2466, "text": "You might not be aware of this if you were born in the 90s or later but wage growth is supposed to exceed the rate of inflation", "axes": {}}, {"pid": "156402977", "topic": "Economy & Jobs", "activation": 0.2425, "text": "The minimum wage in Wisconsin has not increased since I worked a minimum wage job in high school in 2009.", "axes": {}}, {"pid": "161467405", "topic": "Politics", "activation": 0.2423, "text": "Biden has also been famous for his gaffes since the 80s, not a sign of decline if you’ve been doing it for 40 years", "axes": {}}, {"pid": "51291103", "topic": "Music", "activation": 0.2364, "text": "Man I sure did listen to that Mars\nVolta album a lot in 2003-2004 and then not much at all after that", "axes": {}}, {"pid": "3579912", "topic": "Space & Astronomy", "activation": 0.2359, "text": "you ever stop and think about how we've been flying a little robot helicopter on mars for like three years now", "axes": {"reading_level": 0.2, "concreteness": 0.75, "narrativity": 0.2, "hedging": 0.3, "tone": 0.6, "warmth": 0.7, "self_disclosure": 0.4, "casualness": 0.75, "humor": 0.5}}, {"pid": "56087499", "topic": "Video Games", "activation": 0.2285, "text": "it's so wild that rpgs have been including stealth minigames for going on 30 years now and yet not a single one has ever been fun", "axes": {"reading_level": 0.25, "concreteness": 0.3, "narrativity": 0.1, "hedging": 0.05, "tone": 0.55, "warmth": 0.4, "self_disclosure": 0.2, "casualness": 0.65, "humor": 0.65}}, {"pid": "18027342", "topic": "Higher Education", "activation": 0.2264, "text": "Before law school: Doesn’t read contracts. \n\nDuring and immediately after law school: Reads contracts very thoroughly. \n\nAfter being out of law school a few years: Doesn’t read contracts.", "axes": {}}, {"pid": "72909208", "topic": "Climate & Energy", "activation": 0.2226, "text": "The seasonal open water passage through the Arctic Ocean has closed.\n\nThis year the opening was longer than in 2021 or 2022, but still far shorter than the record set in 2020.\n\nSummer open water passages through the Arctic were uncommon until ~2005 but have become an annual occurrence recently.", "axes": {}}, {"pid": "7508738", "topic": "Economy & Jobs", "activation": 0.2214, "text": "Imagine if you would a 15 year time span where the price of everything has doubled but minimum wage has stayed stagnant and median wage has only gone up by 1.5x", "axes": {}}]}, {"f": 30, "density": 0.2339, "category": "novel_candidate", "lifts": {"reading_level": -0.018, "concreteness": -0.011, "narrativity": 0.003, "hedging": -0.01, "tone": -0.016, "warmth": -0.013, "self_disclosure": 0.004, "casualness": -0.001, "humor": -0.007}, "rs": {"reading_level": -0.038, "concreteness": -0.058, "narrativity": -0.017, "hedging": -0.025, "tone": -0.026, "warmth": -0.067, "self_disclosure": -0.018, "casualness": -0.022, "humor": 0.004}, "best_axis": "warmth", "best_r": -0.067, "best_lift": -0.018, "examples": [{"pid": "26228043", "topic": "Food & Cooking", "activation": 0.2468, "text": "My column is out in print today and tomorrow via Suffolk News editions and online Saturday. I've written about a Japanese - style cucumber and seaweed salad.", "axes": {}}, {"pid": "8428337", "topic": "Sports", "activation": 0.23, "text": "Dan Wetzel of Yahoo Sports is reporting a developing scandal involving the Michigan football team and stealing signs.", "axes": {}}, {"pid": "4501334", "topic": "Sports", "activation": 0.2261, "text": "Fox aired Cowboys-Bills to the entire country, and as a \"reward\" they got a game whose broadcast ran merely 2 hours, 43 minutes, 39 seconds.", "axes": {}}, {"pid": "243644", "topic": "Economy & Jobs", "activation": 0.2159, "text": "I joined CNBC for a (somewhat heated) discussion of what's driving inflation and whether billionaires should be taxed. Take a look.", "axes": {}}, {"pid": "38750714", "topic": "Economy & Jobs", "activation": 0.2096, "text": "My column this week is on the latest inflation figures and why the RBA should not raise rates next week", "axes": {}}, {"pid": "10329642", "topic": "AI & Tech", "activation": 0.2089, "text": "Anime Herald has no chill for smug AI bros trying to play semantics with one paragraph taken out of context of a 20,000 word article.", "axes": {}}, {"pid": "41157264", "topic": "Climate & Energy", "activation": 0.2026, "text": "Just today, Michael Shellenberger and his climate change advocacy organization, Environmental Progress, released an allegedly damning report based on leaked conversations from WPATH medical professionals. This is being dubbed the 'WPATH Files.' \n\nLet's take a look at it.👇", "axes": {"reading_level": 0.55, "concreteness": 0.75, "narrativity": 0.6, "hedging": 0.65, "tone": 0.4, "warmth": 0.45, "self_disclosure": 0.1, "casualness": 0.55, "humor": 0.0}}, {"pid": "41650491", "topic": "Pets", "activation": 0.2004, "text": "finally framed this Oregonian full-page newspaper ad featuring my dog that i somehow tricked ryan reynolds into", "axes": {}}, {"pid": "10896676", "topic": "Fitness & Gym", "activation": 0.1997, "text": "Week 6 of the diet. Here is a comparison of day one on the 21st of September to today the 26th of October. I put them together side by side so it is easier to see the difference.", "axes": {}}, {"pid": "22838760", "topic": "Politics", "activation": 0.1958, "text": "Is there any chance this story will get NY Times opinion page carpet bomb coverage like Biden's age gets?", "axes": {}}]}, {"f": 31, "density": 0.0, "category": "dead", "lifts": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "rs": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "best_axis": "reading_level", "best_r": 0.0, "best_lift": 0.0, "examples": []}, {"f": 32, "density": 0.2048, "category": "partial_overlap", "lifts": {"reading_level": -0.051, "concreteness": 0.018, "narrativity": 0.07, "hedging": -0.027, "tone": -0.001, "warmth": 0.04, "self_disclosure": 0.044, "casualness": 0.024, "humor": 0.031}, "rs": {"reading_level": -0.165, "concreteness": 0.044, "narrativity": 0.12, "hedging": -0.064, "tone": -0.003, "warmth": 0.09, "self_disclosure": 0.082, "casualness": 0.067, "humor": 0.022}, "best_axis": "reading_level", "best_r": -0.165, "best_lift": 0.07, "examples": [{"pid": "33130260", "topic": "Gardening & Plants", "activation": 0.3083, "text": "Saturday. The 56th American Dahlia Society convention. So many blooms. We did not stay for the finale Champions Court. A thread with pictures.", "axes": {}}, {"pid": "22038977", "topic": "Birds & Nature", "activation": 0.2987, "text": "NorCal folks! The Snow Goose Festival of the Pacific Flyway is happening in Chico in January, with 60 guided field trips that look pretty fun if you're a bird nerd. There's also an art exhibit/reception and a banquet. HMU if you're coming into town for it.\n\nsnowgoosefestival.org", "axes": {}}, {"pid": "58151172", "topic": "Books & Reading", "activation": 0.2728, "text": "Tonight's screening/book signing at IFC went incredibly well! Great Q&A with Alan Scherstuhl (my former editor). My book's editor and my publicist was there. People bought multiple copies of the book and told me what movies they loved. Sweet Sweetback played better than I expected. It was humbling.", "axes": {}}, {"pid": "39090018", "topic": "Music", "activation": 0.2626, "text": "Pretty spectacular first ever Slowdive gig once we’d negotiated the chaos of the unreserved upstairs balcony. A really fun meet up too with a great bunch of pals and a pre-gig curry with half the band #chopsgigs #slowdive #institutebirmingham", "axes": {}}, {"pid": "438496", "topic": "Politics", "activation": 0.2586, "text": "Car crashes into Biden's motorcade as president leaves campaign event in Delaware. Biden was rushed into his car and was not involved", "axes": {}}, {"pid": "80115086", "topic": "Music", "activation": 0.2567, "text": "God, Low were incredible. Fuck. All the times they probably performed in Milwaukee and I wasn't in to them yet", "axes": {}}, {"pid": "35181932", "topic": "Pets", "activation": 0.2517, "text": "Went to a bab party yesterday and gave uppies to all the smol pups and it was super cute seeing their eyes light up and giggling. 🐶❤️", "axes": {"reading_level": 0.25, "concreteness": 0.65, "narrativity": 0.6, "hedging": 0.05, "tone": 0.7, "warmth": 0.85, "self_disclosure": 0.55, "casualness": 0.75, "humor": 0.3}}, {"pid": "169164394", "topic": "Politics", "activation": 0.2453, "text": "got skybox tickets to the state of the union, me and the boys have biden 2024 written on our bare asses to press against the glass during the speech", "axes": {}}, {"pid": "146982957", "topic": "Fitness & Gym", "activation": 0.2446, "text": "Tuesday night is naked yoga night. Practice is still a little rough with the shoulder but better every day.", "axes": {}}, {"pid": "27421811", "topic": "Music", "activation": 0.244, "text": "Came all the way to #yyz to see #BobDylan play a couple of shows at #MasseyHall. Here are my notes from last night's amazing show!", "axes": {}}]}, {"f": 33, "density": 0.1673, "category": "confirms_axis", "lifts": {"reading_level": -0.033, "concreteness": -0.068, "narrativity": -0.05, "hedging": 0.137, "tone": 0.01, "warmth": -0.024, "self_disclosure": 0.04, "casualness": 0.066, "humor": 0.05}, "rs": {"reading_level": -0.084, "concreteness": -0.169, "narrativity": -0.132, "hedging": 0.311, "tone": -0.003, "warmth": -0.039, "self_disclosure": 0.039, "casualness": 0.12, "humor": 0.036}, "best_axis": "hedging", "best_r": 0.311, "best_lift": 0.137, "examples": [{"pid": "95794600", "topic": "Fitness & Gym", "activation": 0.2941, "text": "Enjoying some post-workout pigeon pose. Anyone else enjoy yoga as part of their physical and mental wellness routines?", "axes": {"reading_level": 0.3, "concreteness": 0.6, "narrativity": 0.5, "hedging": 0.4, "tone": 0.35, "warmth": 0.7, "self_disclosure": 0.4, "casualness": 0.45, "humor": 0.0}}, {"pid": "59536284", "topic": "Food & Cooking", "activation": 0.2611, "text": "Do people ever just eat hummus with a spoon? You know, like peanut butter, or Nutella? Does hummus have to be a dip, or can it be supper?", "axes": {}}, {"pid": "25196994", "topic": "Transportation & Urbanism", "activation": 0.2565, "text": "Can you think of an American historic district or neighborhood that blocks off cars for at least a portion of the day? The French Quarter is the main one I can think of- but does Alexandria VA or Annapolis MD etc have some car-free zones too?", "axes": {}}, {"pid": "113496550", "topic": "Video Games", "activation": 0.2469, "text": "why are there no outstanding aquarium games? is it because rendering water is hard? or some other reason?", "axes": {"reading_level": 0.3, "concreteness": 0.2, "narrativity": 0.05, "hedging": 0.7, "tone": 0.35, "warmth": 0.5, "self_disclosure": 0.2, "casualness": 0.65, "humor": 0.0}}, {"pid": "35968979", "topic": "Fitness & Gym", "activation": 0.2455, "text": "hey, question for folks with hypermobility / ehlers danlos only: \n\ndoes working out feel good for you? do you get the \"endorphine rush\" people talk about? \n\nor is working out more or less just pain and fatigue all the way through, despite the benefits we get from it afterwards? \nfor me, it's the 2nd", "axes": {}}, {"pid": "86307045", "topic": "Space & Astronomy", "activation": 0.2438, "text": "Thinking of getting a Meade LX-85 8\" telescope 🔭 Would it be large enough to see Jupiters Banding, Saturns rings as rings instead of a white line? Maybe make out closer galaxies instead of a blob of stars?  And Neptunes Bluish colouring?  🔭", "axes": {"reading_level": 0.55, "concreteness": 0.75, "narrativity": 0.2, "hedging": 0.65, "tone": 0.5, "warmth": 0.6, "self_disclosure": 0.4, "casualness": 0.6, "humor": 0.0}}, {"pid": "54892500", "topic": "Gardening & Plants", "activation": 0.2436, "text": "Poppy love. Anyone know how to prep poppyseeds so they're okay to eat? Like, do you wash them or anything once you take them out of the pod?", "axes": {}}, {"pid": "40229365", "topic": "Video Games", "activation": 0.2285, "text": "Do you believe the appeal of pixel art is limited to older players that are nostalgic to past eras of gaming (NES, SNES, PS1 and even GBA)?\n\nOr do you think young players are actually more accepting of that aesthetic choice, and understand it as such, thanks to indies?", "axes": {}}, {"pid": "85956624", "topic": "Climate & Energy", "activation": 0.2282, "text": "Can we have the conversation yet about whether Australia has enough water bombing planes for the upcoming fire season?", "axes": {}}, {"pid": "71775321", "topic": "Sports", "activation": 0.2256, "text": "Is Riley Leonard a valid People’s Heisman candidate or does playing for Duke preclude him from consideration", "axes": {}}]}, {"f": 34, "density": 0.2394, "category": "confirms_axis", "lifts": {"reading_level": -0.032, "concreteness": -0.033, "narrativity": 0.007, "hedging": -0.003, "tone": 0.068, "warmth": -0.011, "self_disclosure": 0.059, "casualness": 0.082, "humor": 0.139}, "rs": {"reading_level": -0.072, "concreteness": -0.096, "narrativity": -0.002, "hedging": 0.005, "tone": 0.18, "warmth": -0.068, "self_disclosure": 0.074, "casualness": 0.193, "humor": 0.225}, "best_axis": "humor", "best_r": 0.225, "best_lift": 0.139, "examples": [{"pid": "2654963", "topic": "Gardening & Plants", "activation": 0.2588, "text": "day lilies are so cool because you just throw them in the ground (you can even half-ass that part by barely covering them in dirt), and walk away, never think about them again, and then one day bam! it looks like you know how to garden", "axes": {}}, {"pid": "54564886", "topic": "Music", "activation": 0.2242, "text": "radiohead is the band people say is their favorite when they're not really that into music but they wanna seem like they know a lot / have good taste", "axes": {}}, {"pid": "5378354", "topic": "Books & Reading", "activation": 0.2184, "text": "hey hey didja know i have a whole graphic novel coming out in october and it can be preordered RIGHT NOW\n\nit's like a horse girl story, if the horse was a giraffe-sized reptile. that can fly.", "axes": {}}, {"pid": "45599421", "topic": "Fitness & Gym", "activation": 0.2175, "text": "when your abs hurt after not doing any ab exercises in forever it's because they've all fused into one and now you have to rip them back apart", "axes": {}}, {"pid": "101988651", "topic": "Sports", "activation": 0.214, "text": "Football is so quintessentially American. We invented a bespoke, completely impenetrable sport just to give brain damage to Black people. It rivals the King in sheer national pathology.", "axes": {}}, {"pid": "51366886", "topic": "Pets", "activation": 0.2037, "text": "dogs gotta especially hate the 4th because it’s like the BEST day of their lives— hanging out outside with a bunch of happy drunk people, hotdogs, potato chips that they shouldn’t have etc etc— and then WAR", "axes": {}}, {"pid": "32433704", "topic": "Fitness & Gym", "activation": 0.1969, "text": "today I put on leggings for the first time since surgery and holy shit they just, like, look like they're supposed to and I didn't have to tie anything down or anything\n\nit feels a little silly to be crying over this but this exact thing is something I've been dreaming about for a very long time", "axes": {}}, {"pid": "31266880", "topic": "Video Games", "activation": 0.188, "text": "Every video game needs a \"help I have not played this in months please give me a tutorial and a plot recap\" button", "axes": {}}, {"pid": "20278922", "topic": "Sports", "activation": 0.1865, "text": "oh my god I just realized Call of Duty is the American football of esports. nobody else plays or cares about it but everybody involved kayfabes like it's all world-class talent", "axes": {}}, {"pid": "6694032", "topic": "Movies & Film", "activation": 0.1858, "text": "A perfect fantasy film. Fantasy before it became a genre -- a pulp hallucination of eldritch myth, held together with fishing line, glue and imagination.", "axes": {"reading_level": 0.65, "concreteness": 0.6, "narrativity": 0.2, "hedging": 0.05, "tone": 0.55, "warmth": 0.75, "self_disclosure": 0.25, "casualness": 0.25, "humor": 0.3}}]}, {"f": 35, "density": 0.0, "category": "dead", "lifts": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "rs": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "best_axis": "reading_level", "best_r": 0.0, "best_lift": 0.0, "examples": []}, {"f": 36, "density": 0.2629, "category": "novel_candidate", "lifts": {"reading_level": 0.016, "concreteness": 0.021, "narrativity": 0.006, "hedging": 0.014, "tone": -0.035, "warmth": 0.017, "self_disclosure": -0.009, "casualness": -0.021, "humor": -0.024}, "rs": {"reading_level": 0.01, "concreteness": 0.069, "narrativity": 0.023, "hedging": 0.012, "tone": -0.081, "warmth": 0.042, "self_disclosure": -0.035, "casualness": -0.056, "humor": -0.026}, "best_axis": "tone", "best_r": -0.081, "best_lift": -0.035, "examples": [{"pid": "63418127", "topic": "Climate & Energy", "activation": 0.353, "text": "East Anglia has had one of the wettest Februarys on record, causing delays to an important crop that is already in jeopardy | J.J. Jackson", "axes": {}}, {"pid": "5547126", "topic": "Books & Reading", "activation": 0.3294, "text": "Sheffield United fan, with her team currently 7-0 down to Newcastle United.\n\nWould love to know what book she's starting.", "axes": {}}, {"pid": "18331674", "topic": "Higher Education", "activation": 0.3264, "text": "A further irony here is that Universities such as Sunderland jettisoned subjects such as History to take on more teaching in Medicine and Health. Everyone loses here and strategic planning is impossible. So prodigal of people and resources.", "axes": {}}, {"pid": "73768367", "topic": "Economy & Jobs", "activation": 0.3128, "text": "Pay inequality in the UK is falling: \n- minimum wage is cutting hourly low pay fast (lower earners move towards the middle) \n- weekly low pay is at last also falling (low earners have stopped reducing the hours they work) \n- the middle's generally seeing faster pay growth than top", "axes": {}}, {"pid": "30542558", "topic": "Sports", "activation": 0.3048, "text": "What a test match. One of England’s greatest comeback victories away from home, showing greater fight and resourcefulness than India. Extraordinary innings from Pope and wonderful resolve from Tom Hartley on debut.", "axes": {}}, {"pid": "94438745", "topic": "Transportation & Urbanism", "activation": 0.2985, "text": "So HS2 now stands for “Half Speed Rail” - at least they won’t need to waste any more money changing the name.", "axes": {"reading_level": 0.3, "concreteness": 0.6, "narrativity": 0.2, "hedging": 0.15, "tone": 0.55, "warmth": 0.25, "self_disclosure": 0.05, "casualness": 0.5, "humor": 0.75}}, {"pid": "104869897", "topic": "Climate & Energy", "activation": 0.2923, "text": "So, we all are to pay more for our energy, because energy companies have lost £3 billion in unrecoverable debt. How much did they make during the energy crisis though? Surely it would cover that.", "axes": {"reading_level": 0.35, "concreteness": 0.65, "narrativity": 0.2, "hedging": 0.6, "tone": 0.65, "warmth": 0.3, "self_disclosure": 0.15, "casualness": 0.5, "humor": 0.3}}, {"pid": "164145104", "topic": "Sports", "activation": 0.2897, "text": "All four substitutes were involved in the Arsenal goal. Partey long pass, Tomiyasu nod down, Havertz lay off Martinelli goal", "axes": {}}, {"pid": "27910836", "topic": "Fitness & Gym", "activation": 0.2874, "text": "Those that know me from the other place may recall that 3 months ago I started Slimming World. \nI’ve since lost 20kg and my chest measurement has come down 28cm, and my waist 8cm. \nMy physical and mental health has improved mightily. If you can find the motivation, do it! \nYou won’t be sorry.", "axes": {}}, {"pid": "7973380", "topic": "Higher Education", "activation": 0.2852, "text": "University of Lincoln latest to go for the redundancies. At some point soon we're going to pass the 50% mark and a majority of unis will have severance schemes going. The speed of the crisis is really dramatic.", "axes": {}}]}, {"f": 37, "density": 0.1607, "category": "partial_overlap", "lifts": {"reading_level": 0.016, "concreteness": -0.022, "narrativity": -0.064, "hedging": 0.029, "tone": -0.004, "warmth": -0.054, "self_disclosure": -0.076, "casualness": -0.022, "humor": -0.011}, "rs": {"reading_level": 0.053, "concreteness": -0.052, "narrativity": -0.13, "hedging": 0.027, "tone": 0.025, "warmth": -0.12, "self_disclosure": -0.139, "casualness": -0.06, "humor": -0.035}, "best_axis": "self_disclosure", "best_r": -0.139, "best_lift": -0.076, "examples": [{"pid": "41830924", "topic": "Economy & Jobs", "activation": 0.3678, "text": "I know it is obviously illegal but is it common for employers to not actually follow the law where they're required to make up the difference between the tipped minimum wage and the federal minimum wage?", "axes": {}}, {"pid": "77557178", "topic": "Economy & Jobs", "activation": 0.349, "text": "The IRS recently bumped the income thresholds for its tax brackets by 5.4% for 2024, its latest adjustment to account for elevated rates of inflation", "axes": {}}, {"pid": "5857677", "topic": "Politics", "activation": 0.3232, "text": "Congress declares war, POTUS is commander in chief, and the Constitution doesn't demarcate the line.\nThe War Powers Act says POTUS can order military action, but must cease if Congress doesn't authorize within 60 days.\nAgree/disagree with the law, but it says Biden ordering strikes in Yemen is legal", "axes": {}}, {"pid": "156402977", "topic": "Economy & Jobs", "activation": 0.2947, "text": "The minimum wage in Wisconsin has not increased since I worked a minimum wage job in high school in 2009.", "axes": {}}, {"pid": "22684631", "topic": "Sports", "activation": 0.2887, "text": "Any form of VAR/instant replay should have a 60 second countdown timer. Can’t make a concrete decision after a minute of review? Call on the field stands.", "axes": {}}, {"pid": "129026091", "topic": "Transportation & Urbanism", "activation": 0.2867, "text": "TIL, SB-9 has an easy way to essentially eliminate parking minimums for SB-9 projects. Just put in one car share vehicle.", "axes": {}}, {"pid": "8248172", "topic": "Sports", "activation": 0.2759, "text": "Here’s a handy guide to the 2024 MLB season rule changes:\n\n•Shorter pitch clock \n•Wider basepath\n•Fewer mound visits\n•Everyone plays for the Dodgers now", "axes": {}}, {"pid": "47942283", "topic": "Climate & Energy", "activation": 0.2746, "text": "⚖️CA5 just upheld NASDAQ's comply-or-explain board diversity rule and I gotta tell you the part of the opinion I find interesting is this one - bc it's gonna be important for climate change disclosure (if and when that ever happens):\n\n(got it from bloomberg; opinion doesn't seem to be on the web yet)", "axes": {}}, {"pid": "5781444", "topic": "Higher Education", "activation": 0.2737, "text": "State governments are minority funders of most public research universities, yet they retain near-total control over the rules and governance of those institutions", "axes": {}}, {"pid": "130534", "topic": "Higher Education", "activation": 0.2713, "text": "The measure would require the regents to set up a department to hear grade challenges based on bias. That department would be staffed by volunteers who could determine there was bias and could order the faculty member to regrade the student’s assignment or reevaluate the student’s overall grade.", "axes": {}}]}, {"f": 38, "density": 0.0581, "category": "novel_candidate", "lifts": {"reading_level": -0.007, "concreteness": -0.004, "narrativity": -0.013, "hedging": -0.001, "tone": -0.013, "warmth": 0.025, "self_disclosure": -0.021, "casualness": -0.004, "humor": -0.026}, "rs": {"reading_level": -0.021, "concreteness": -0.011, "narrativity": -0.003, "hedging": -0.031, "tone": -0.01, "warmth": 0.034, "self_disclosure": -0.007, "casualness": 0.009, "humor": -0.008}, "best_axis": "warmth", "best_r": 0.034, "best_lift": -0.026, "examples": [{"pid": "56633781", "topic": "Food & Cooking", "activation": 0.779, "text": "This vegan katsu curry recipe uses sweet potato cutlets and a vegetable-packed curry sauce made with coconut milk.", "axes": {}}, {"pid": "7699301", "topic": "Books & Reading", "activation": 0.644, "text": "This amazing novel just won the Shirley Jackson award, and it does not have an American publisher. Someone do it!", "axes": {"reading_level": 0.3, "concreteness": 0.4, "narrativity": 0.2, "hedging": 0.15, "tone": 0.65, "warmth": 0.7, "self_disclosure": 0.2, "casualness": 0.55, "humor": 0.15}}, {"pid": "15890722", "topic": "Fitness & Gym", "activation": 0.5605, "text": "This bulk is doing very well and juicy.\nCome January, I will be going on a strict cut so watch this space. 💪🏽😤♥️", "axes": {}}, {"pid": "11443684", "topic": "Pets", "activation": 0.4883, "text": "This Friday the 13th goes out to all the beautiful black cats everywhere. the goats of the feline community", "axes": {}}, {"pid": "2559340", "topic": "Higher Education", "activation": 0.4873, "text": "\"The functional equivalent of an atomic bomb at WVU.\" Welcome coverage of the austerity scandal today in The Nation.", "axes": {}}, {"pid": "9559279", "topic": "Higher Education", "activation": 0.4166, "text": "This is a great example of how research institutions can be 'committed' to sustainability but unwilling to actually practice it.", "axes": {}}, {"pid": "191481471", "topic": "Pets", "activation": 0.4067, "text": "This is how my corgi demands my attention. He just stands up and stares at me for extended periods of time.", "axes": {}}, {"pid": "79213566", "topic": "Sports", "activation": 0.398, "text": "This is the PAC 12 After Dark game we were denied with the first round of realignment rumors a decade ago", "axes": {}}, {"pid": "164448196", "topic": "Transportation & Urbanism", "activation": 0.3844, "text": "This is the kind of smart, walkable, mixed-use urbanism is illegal to build is in most american cities", "axes": {}}, {"pid": "16000621", "topic": "Pets", "activation": 0.362, "text": "This oblong rascal conked out on the cafe floor. She knows no other reality, no other moral framework.", "axes": {"reading_level": 0.35, "concreteness": 0.75, "narrativity": 0.6, "hedging": 0.1, "tone": 0.45, "warmth": 0.8, "self_disclosure": 0.35, "casualness": 0.65, "humor": 0.65}}]}, {"f": 39, "density": 0.2233, "category": "partial_overlap", "lifts": {"reading_level": 0.021, "concreteness": 0.011, "narrativity": -0.031, "hedging": 0.013, "tone": -0.042, "warmth": -0.002, "self_disclosure": -0.043, "casualness": -0.037, "humor": -0.043}, "rs": {"reading_level": 0.048, "concreteness": -0.005, "narrativity": -0.099, "hedging": 0.014, "tone": -0.115, "warmth": -0.03, "self_disclosure": -0.085, "casualness": -0.094, "humor": -0.065}, "best_axis": "tone", "best_r": -0.115, "best_lift": -0.043, "examples": [{"pid": "19924665", "topic": "Gardening & Plants", "activation": 0.2962, "text": "Had a literal field day with strawberry growers near Charlotte NC!\n\nNC grows the 3rd largest strawberry crop in the US after CA & FL. But unlike those states, most NC strawberries come from small farms.", "axes": {}}, {"pid": "151293741", "topic": "Transportation & Urbanism", "activation": 0.275, "text": "Norway, one of the colder nations of the world, manages to make #EV usage work just fine. Unlike very highly publicized recent problems in Chicago.\n\nHere's how they do it. Surprise, surprise: Being prepared helps.", "axes": {}}, {"pid": "20571479", "topic": "Birds & Nature", "activation": 0.2563, "text": "The black-headed gull is a small gull that breeds in much of the Palearctic including Europe and also in coastal eastern Canada. Most of the population is migratory and winters further south, but some birds reside in the milder westernmost areas of Europe", "axes": {}}, {"pid": "26880573", "topic": "Books & Reading", "activation": 0.2558, "text": "all the current covers of OWLS OF THE EASTERN ICE! Top row: Russian, US English (large print), Dutch. Second row: German, Korean, Chinese, Spanish. Bottom row: US paperback, US hard cover, UK hard cover, UK paperback. Forthcoming: Japanese, Turkish, Taiwan-specific edition. 🌍", "axes": {}}, {"pid": "172845953", "topic": "Transportation & Urbanism", "activation": 0.2463, "text": "Yes. I think Europeans and especially Brits don’t grasp how much bigger the US is and how long it takes to get places. The interstate system exists for a reason.", "axes": {}}, {"pid": "28618147", "topic": "Sports", "activation": 0.2257, "text": "Duke-UNC is the Super Bowl for people in North Carolina and wealthy northerners who did well on the SAT.", "axes": {}}, {"pid": "1583010", "topic": "Higher Education", "activation": 0.2203, "text": "Do you teach at an R1 university, especially but not solely a Big 12 institution or one in the Mid-Atlantic, the South, or Appalachia? \n\nQ: What size are your literature classes capped at, please? Thanks! (At WVU, ours are 27 or 45, for seminar v. lecture courses.)", "axes": {}}, {"pid": "10344438", "topic": "Video Games", "activation": 0.2181, "text": "New Zealand makes up 0.6% of the worldwide gaming market. \nWe are gaming hobbits. The 🦐 of gaming ... 😶", "axes": {"reading_level": 0.3, "concreteness": 0.75, "narrativity": 0.2, "hedging": 0.1, "tone": 0.4, "warmth": 0.6, "self_disclosure": 0.5, "casualness": 0.7, "humor": 0.75}}, {"pid": "49536974", "topic": "Gardening & Plants", "activation": 0.212, "text": "Pink evening primrose! Although this spreading perennial has a wide naturalized range, evening primroses are considered native to only Nebraska; Kansas; Missouri; Oklahoma; Texas; though northeastern Mexico where extensive colonies occupy grassy fields. They bloom from late winter through fall. 🌿", "axes": {"reading_level": 0.6, "concreteness": 0.8, "narrativity": 0.2, "hedging": 0.15, "tone": 0.3, "warmth": 0.65, "self_disclosure": 0.0, "casualness": 0.25, "humor": 0.0}}, {"pid": "159662852", "topic": "Politics", "activation": 0.2105, "text": "So… Biden is in Utah. Ely, NV, where we are, is in the Utah media market. \n\nThe coverage is overwhelmingly positive. \n\nEven when Biden visits Miami, which is liberal, the coverage isn’t this positive. \n\nUtah is red. \n\nI’m happily confused and am enjoying this. It’s a good sign.", "axes": {}}]}, {"f": 40, "density": 0.313, "category": "confirms_axis", "lifts": {"reading_level": 0.048, "concreteness": 0.041, "narrativity": -0.02, "hedging": -0.041, "tone": -0.043, "warmth": 0.003, "self_disclosure": -0.068, "casualness": -0.091, "humor": -0.103}, "rs": {"reading_level": 0.112, "concreteness": 0.097, "narrativity": -0.081, "hedging": -0.105, "tone": -0.16, "warmth": 0.013, "self_disclosure": -0.136, "casualness": -0.251, "humor": -0.168}, "best_axis": "casualness", "best_r": -0.251, "best_lift": -0.103, "examples": [{"pid": "29330529", "topic": "Music", "activation": 0.6044, "text": "The term indie rock comes from the fact that the genre originated and is largely produced in Indiana", "axes": {}}, {"pid": "9319737", "topic": "Music", "activation": 0.5073, "text": "you either die a hero or live long enough to hear the music of your youth used as background filler on npr", "axes": {}}, {"pid": "18234468", "topic": "Birds & Nature", "activation": 0.4797, "text": "pspspsps 🐯\n\nRidhhi (Tigress) at Ranthambhore National Park, India - Feb 2024.\n\nThis was her heading to get her 3 cubs (8 months old) \n\n🦊 📸📸", "axes": {}}, {"pid": "3392100", "topic": "Politics", "activation": 0.3119, "text": "The average US Senator is ten years older than the younger Golden Girls. Sophia is younger than Biden or McConnell.", "axes": {}}, {"pid": "9929605", "topic": "Higher Education", "activation": 0.3042, "text": "The Catholic University of America was clearly intended to be a bigger deal than it actually ended up being", "axes": {}}, {"pid": "106526269", "topic": "Music", "activation": 0.2879, "text": "Now playing the original double-album release of Miles Davis Live at the Plugged Nickel, featuring the Second Great Quintet.", "axes": {"reading_level": 0.6, "concreteness": 0.85, "narrativity": 0.2, "hedging": 0.0, "tone": 0.3, "warmth": 0.5, "self_disclosure": 0.4, "casualness": 0.45, "humor": 0.0}}, {"pid": "132084856", "topic": "Fitness & Gym", "activation": 0.2831, "text": "Make sure when you're lifting heavy objects to use swift jerking motions and only your low back muscles.", "axes": {}}, {"pid": "122282", "topic": "Books & Reading", "activation": 0.2775, "text": "Everyone should read Extraordinary Popular Delusions and the Madness of Crowds, not least because it keeps coming true.", "axes": {}}, {"pid": "5698019", "topic": "Birds & Nature", "activation": 0.2747, "text": "The great blue heron is a large wading bird in the heron family Ardeidae, common near the shores of open water and in wetlands over most of North and Central America, as well as far northwestern South America, the Caribbean and the Galápagos Islands", "axes": {}}, {"pid": "22318188", "topic": "Sports", "activation": 0.2746, "text": "Kent just lost the MAC championship and a trip to the NCAA tournament because a player didn't know they had the lead", "axes": {}}]}, {"f": 41, "density": 0.0, "category": "dead", "lifts": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "rs": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "best_axis": "reading_level", "best_r": 0.0, "best_lift": 0.0, "examples": []}, {"f": 42, "density": 0.2469, "category": "partial_overlap", "lifts": {"reading_level": -0.045, "concreteness": -0.007, "narrativity": 0.036, "hedging": -0.011, "tone": 0.001, "warmth": 0.01, "self_disclosure": 0.067, "casualness": 0.02, "humor": 0.036}, "rs": {"reading_level": -0.172, "concreteness": 0.014, "narrativity": 0.12, "hedging": -0.039, "tone": -0.017, "warmth": 0.048, "self_disclosure": 0.13, "casualness": 0.065, "humor": 0.059}, "best_axis": "reading_level", "best_r": -0.172, "best_lift": 0.067, "examples": [{"pid": "23930056", "topic": "Fitness & Gym", "activation": 0.2614, "text": "Best recovery gift ever. Husband is rehabbing a basement room into a home gym. Can't use it all yet, but after weeks of no walking this will help so much.", "axes": {"reading_level": 0.2, "concreteness": 0.75, "narrativity": 0.6, "hedging": 0.2, "tone": 0.5, "warmth": 0.8, "self_disclosure": 0.7, "casualness": 0.6, "humor": 0.2}}, {"pid": "98927435", "topic": "Politics", "activation": 0.2502, "text": "The reason Biden is down in polls against Trump is because the only people at home during the day to answer the landline are old boomers watching Fox News.", "axes": {}}, {"pid": "73583018", "topic": "Fitness & Gym", "activation": 0.2487, "text": "I don't exercise but I do stand most of the day even on my day off. It helps. Don't work out just stand", "axes": {}}, {"pid": "10263713", "topic": "Birds & Nature", "activation": 0.2376, "text": "The bird feeder by my office window is super busy. The birds are jostling one another like bargain hunters on Black Friday.", "axes": {}}, {"pid": "60784112", "topic": "AI & Tech", "activation": 0.2193, "text": "My kids have replaced me with AI. They crowd around a computer that blares “Fatherbot\nloves you. Fatherbot supports you.” Sometimes it prints out a photo of a baseball. The machine does this 24/7, there’s no way a human can keep up", "axes": {"reading_level": 0.3, "concreteness": 0.75, "narrativity": 0.75, "hedging": 0.1, "tone": 0.7, "warmth": 0.25, "self_disclosure": 0.85, "casualness": 0.5, "humor": 0.65}}, {"pid": "93851430", "topic": "Fitness & Gym", "activation": 0.2171, "text": "During 2020 with all the gyms closed, I used an empty office at work to create a basic gym. I was the only one in the building all year so I thought I’d have some fun with it", "axes": {}}, {"pid": "113952076", "topic": "Economy & Jobs", "activation": 0.2067, "text": "Literally in any family, the person who does the most grocery shopping is more likely to say that they feel inflation is worse.", "axes": {}}, {"pid": "166660815", "topic": "Pets", "activation": 0.1966, "text": "This household is watching Downton Abbey instead of the GOP debate, because I value my cat’s mental health, and mine.", "axes": {}}, {"pid": "28290736", "topic": "Pets", "activation": 0.194, "text": "Hello! Marmalade living his best life enjoying his cat cabana in the tree tops of our second story deck.", "axes": {}}, {"pid": "54773430", "topic": "Birds & Nature", "activation": 0.1937, "text": "One of my sweet little cardinals.  We have about 9 that hang out in our yard that try eat us out of house and home when it comes to bark butter bits.", "axes": {}}]}, {"f": 43, "density": 0.1137, "category": "partial_overlap", "lifts": {"reading_level": -0.037, "concreteness": 0.018, "narrativity": 0.012, "hedging": 0.002, "tone": 0.016, "warmth": 0.003, "self_disclosure": 0.047, "casualness": 0.037, "humor": 0.054}, "rs": {"reading_level": -0.102, "concreteness": 0.027, "narrativity": 0.006, "hedging": 0.027, "tone": 0.005, "warmth": 0.04, "self_disclosure": 0.074, "casualness": 0.096, "humor": 0.077}, "best_axis": "reading_level", "best_r": -0.102, "best_lift": 0.054, "examples": [{"pid": "36437779", "topic": "Music", "activation": 0.2831, "text": "turned on WFMU and the first song on was the Pete & Pete theme song and it went immediately into Mother by Danzig", "axes": {}}, {"pid": "528491", "topic": "Music", "activation": 0.2727, "text": "How much Gregorian chanting do I need to add to this Katy Perry remix before it’s technically “Latin Pop”?", "axes": {"reading_level": 0.3, "concreteness": 0.6, "narrativity": 0.15, "hedging": 0.85, "tone": 0.6, "warmth": 0.5, "self_disclosure": 0.4, "casualness": 0.7, "humor": 0.75}}, {"pid": "191085775", "topic": "Video Games", "activation": 0.2536, "text": "Game Publishers please for the love of the gods stop this trend of having your commercials have random pop/EDM/Rock music for games with sound tracks that are high fantasy orchestral scores.", "axes": {}}, {"pid": "2625859", "topic": "AI & Tech", "activation": 0.2445, "text": "Thoughts? AI can detect & assess a musical piece's quality, categorising it as upload-worthy or unacceptable. If a song relies heavily on loops, lacks balance or mastering, it should be flagged and prevented from upload. A feedback system with options like \"Not Yet\" or \"Yes\".", "axes": {}}, {"pid": "2983379", "topic": "Music", "activation": 0.2388, "text": "Was listening to music on random and Caribbean Blue by Enya came on and I thought it was actually perfectly alright. What song do you think is perfectly alright that would completely ruin your music credibility?", "axes": {"reading_level": 0.25, "concreteness": 0.65, "narrativity": 0.55, "hedging": 0.4, "tone": 0.35, "warmth": 0.7, "self_disclosure": 0.6, "casualness": 0.65, "humor": 0.5}}, {"pid": "2191151", "topic": "Music", "activation": 0.2303, "text": "Max Muncy has two walk-up songs. A trash Morgan Wallen song and a banger by Stevie Nicks. \n\nThe whiplash.", "axes": {}}, {"pid": "64193382", "topic": "Fitness & Gym", "activation": 0.2029, "text": "Arm day and I’m trying to utilize the lessons of working out smarter, not harder. But I did miss this. Also I played “Raise Your Glass” by Pink twice in a row and then I paused my headphones and they were playing it at the gym, so that’s weird.", "axes": {}}, {"pid": "46039462", "topic": "Birds & Nature", "activation": 0.1955, "text": "The Oriental magpie robin near my house blends sounds from nearby birds into its song. This morning, Plaintive cuckoo, Red whiskered bulbul and White-vented myna. The birds with the real calls join in  🦉 whyp.it/tracks/16037...", "axes": {}}, {"pid": "10598476", "topic": "Music", "activation": 0.1908, "text": "I'm not a musicologist, but I feel pretty certain that there is no song that can't be made better by the drummer raising the drumsticks over their head and slamming them together four times before the song starts.", "axes": {}}, {"pid": "102587995", "topic": "Music", "activation": 0.1858, "text": "Singing changes the brain and the body of the singer. After singing, I feel more awake…\n\n#OriginalMusic\n#MusicianSky \n\nSing My Dreams Awake\n\nsongwhip.com/stanstewart/...", "axes": {}}]}, {"f": 44, "density": 0.4532, "category": "partial_overlap", "lifts": {"reading_level": -0.03, "concreteness": -0.003, "narrativity": -0.017, "hedging": -0.02, "tone": 0.022, "warmth": -0.052, "self_disclosure": -0.054, "casualness": 0.013, "humor": 0.098}, "rs": {"reading_level": -0.093, "concreteness": 0.005, "narrativity": -0.026, "hedging": -0.066, "tone": 0.042, "warmth": -0.121, "self_disclosure": -0.132, "casualness": 0.015, "humor": 0.181}, "best_axis": "humor", "best_r": 0.181, "best_lift": 0.098, "examples": [{"pid": "28769039", "topic": "Climate & Energy", "activation": 4.3515, "text": "Every day a 40 foot tree takes in 50 gallons of dissolved nutrients from the soil, raises this mixture to its topmost leaves, converts it into 10 pounds of carbohydrates, and releases about 60 cubic feet of pure oxygen into the air.\n#TreesMatter", "axes": {}}, {"pid": "10387450", "topic": "Pets", "activation": 3.3733, "text": "Everyone tiptoed on eggshells around old Rip Gunnderson. As he got older he started having memory issues, thinking he was back as a squadron leader fighting the Luftwaffe in WW2. For some reason, he also thought he was a dog.", "axes": {}}, {"pid": "11153681", "topic": "Pets", "activation": 3.1272, "text": "Pavlov is at a bar enjoying a pint. The phone rings and he shouts \"Oh! I forgot to feed the dog.\"\n#ScienceJokes", "axes": {"reading_level": 0.3, "concreteness": 0.8, "narrativity": 0.75, "hedging": 0.0, "tone": 0.4, "warmth": 0.5, "self_disclosure": 0.0, "casualness": 0.4, "humor": 0.8}}, {"pid": "2031094", "topic": "Pets", "activation": 3.1167, "text": "MISSING CAT: last seen Thursday when he ran off with the turkey. If you see him, do not approach— he will bite. Please help, he’s from Eternia and not used to the cold", "axes": {}}, {"pid": "16924955", "topic": "Pets", "activation": 3.0393, "text": "Last night, Max the cat, knowing he's not allowed upstairs at night rushed upstairs when he found a door not closed properly. He then decided to hide under the bed.\n\nRegrettably for him, he can't stand the noise of antiperspirant being sprayed.\n\nA couple of sprays and he rushed out of the room.", "axes": {"reading_level": 0.25, "concreteness": 0.85, "narrativity": 0.8, "hedging": 0.1, "tone": 0.35, "warmth": 0.7, "self_disclosure": 0.6, "casualness": 0.45, "humor": 0.6}}, {"pid": "57819759", "topic": "Higher Education", "activation": 2.9813, "text": "I have a graduate degree and one time called my husband in a panic because I couldn’t get my keys out of the ignition and it turns out I had turned the car off before putting it in park so a) clearly my degree was not in engineering and b) level of education =/= intelligence", "axes": {"reading_level": 0.4, "concreteness": 0.85, "narrativity": 0.7, "hedging": 0.1, "tone": 0.5, "warmth": 0.75, "self_disclosure": 0.85, "casualness": 0.65, "humor": 0.7}}, {"pid": "5607534", "topic": "Higher Education", "activation": 2.7253, "text": "11,000 people are employed by the coal industry in West Virginia. 7,500 are employed by West Virginia University. One of these employment bases is sacred to the GOP and must be preserved at all costs (literally) the other must be obliterated. 🤷‍♂️", "axes": {}}, {"pid": "15936019", "topic": "Space & Astronomy", "activation": 2.5258, "text": "True story. Back in the 70s there were many days/night's when power cuts happened in this country. I was about 9 during the worst of it. But it was the only time I've ever seen the Andromeda Galaxy with the naked eye. Seriously dark skies here. 🔭 🧪", "axes": {"reading_level": 0.3, "concreteness": 0.75, "narrativity": 0.7, "hedging": 0.15, "tone": 0.4, "warmth": 0.7, "self_disclosure": 0.65, "casualness": 0.55, "humor": 0.15}}, {"pid": "854630", "topic": "Economy & Jobs", "activation": 2.3379, "text": "Are people seriously comparing Biden's economy to Carter's? At this point in the Carter admin inflation was 12.6% and rising, now it's 3.1% and falling.", "axes": {}}, {"pid": "3354895", "topic": "AI & Tech", "activation": 2.303, "text": "The Internet of Things is (predatory) Shit.\n\n\"You hereby grant to HP a non-exclusive, worldwide, royalty-free right to use, copy, store, transmit, modify, create derivative works of and display Your non-personal data for its business purposes.\"\n\narstechnica.com/gadgets/2024...", "axes": {}}]}, {"f": 45, "density": 0.2273, "category": "confirms_axis", "lifts": {"reading_level": 0.076, "concreteness": -0.039, "narrativity": -0.054, "hedging": 0.045, "tone": -0.035, "warmth": -0.033, "self_disclosure": -0.07, "casualness": -0.071, "humor": -0.07}, "rs": {"reading_level": 0.227, "concreteness": -0.113, "narrativity": -0.158, "hedging": 0.114, "tone": -0.1, "warmth": -0.096, "self_disclosure": -0.139, "casualness": -0.206, "humor": -0.14}, "best_axis": "reading_level", "best_r": 0.227, "best_lift": 0.076, "examples": [{"pid": "66107725", "topic": "Sports", "activation": 0.2744, "text": "If the ballpark affects how batters see the ball, it’s logical to assume that it affects how umpires see it too.\n\n@user looks at whether umpires are more accurate in certain parks than in others: blogs.fangraphs.com/which-ballpa...", "axes": {}}, {"pid": "50009792", "topic": "Transportation & Urbanism", "activation": 0.2708, "text": "40% of the external costs of transport are the consequential costs of car crashes.\nA modal shift to rail transport not only reduces human suffering, but also lowers accident costs for the community.", "axes": {}}, {"pid": "22173325", "topic": "Transportation & Urbanism", "activation": 0.2607, "text": "Answer: No.\n\n\"We did not observe any change in public transit use among those who anticipated increased use in the before period, nor among those who anticipated no change in their use after the implementation of the free fare policy.\"\n\nfindingspress.org/article/9391...", "axes": {}}, {"pid": "22208564", "topic": "Climate & Energy", "activation": 0.2574, "text": "Key Finding of new paper: \"Fire was historically far more frequent in western Oregon Cascades landscapes than previously believed.\"🧪🌎", "axes": {}}, {"pid": "37454876", "topic": "Climate & Energy", "activation": 0.2486, "text": "New paper says “the conflicting literature on historical precipitation trends can be explained by offsetting aerosol and greenhouse gas signals” and warn that the combination of decreased aerosol “masking” and increased emissions “points toward dramatic increases in flood risk in the near future”.", "axes": {}}, {"pid": "24615675", "topic": "Climate & Energy", "activation": 0.2472, "text": "Correlation between ENSO status and February snowfall over the last 50 years. For El Nino Februarys, purple areas mean more snow and green areas mean less snow. Note: not a forecast.", "axes": {}}, {"pid": "52340852", "topic": "Transportation & Urbanism", "activation": 0.2459, "text": "Research on the London Underground suggests that rush hour traffic may reduce efficiency. This has many implications for urban planning.", "axes": {}}, {"pid": "9484893", "topic": "Higher Education", "activation": 0.2373, "text": "How can a school district affect student achievement just by reassigning existing teachers across in-district positions? \n\nRequires disentangling:\n1) teacher preferences over schools, \n2) school preferences over teachers,\n3) teacher potential achievement impacts in various assignments.\n\nWe do it.\n📉📈", "axes": {}}, {"pid": "12737576", "topic": "Climate & Energy", "activation": 0.2367, "text": "Correlation between Dec-Feb snowfall and the Dec-Feb El Nino Southern Oscillation (ENSO) index. For an El Nino winter like we will have this year, green means snowier than typical and purple means less snowy than typical.", "axes": {}}, {"pid": "22085223", "topic": "AI & Tech", "activation": 0.2349, "text": "🧪 Study reveals AI models are more prone to recommend the death penalty for fictitious defendants described in African American English over Standard American English. AI also favored less prestigious jobs for AAE speakers, unaffected by retrospective feedback 🩺🖥️ #ML", "axes": {}}]}, {"f": 46, "density": 0.2419, "category": "partial_overlap", "lifts": {"reading_level": -0.027, "concreteness": -0.056, "narrativity": -0.029, "hedging": 0.016, "tone": -0.002, "warmth": -0.007, "self_disclosure": 0.001, "casualness": 0.002, "humor": 0.006}, "rs": {"reading_level": -0.087, "concreteness": -0.159, "narrativity": -0.078, "hedging": 0.049, "tone": 0.009, "warmth": -0.03, "self_disclosure": -0.004, "casualness": 0.015, "humor": 0.02}, "best_axis": "concreteness", "best_r": -0.159, "best_lift": -0.056, "examples": [{"pid": "21231942", "topic": "Music", "activation": 0.231, "text": "the ideal number of albums for a band to have is three. you can go up to six but honestly I personally am going to lose track after that. I don't have the mental space for more than six albums per band.", "axes": {}}, {"pid": "45694510", "topic": "Space & Astronomy", "activation": 0.2217, "text": "The Indian space program has managed another amazing feat in a short period of time with far less resources than most. Congrats to all involved.", "axes": {}}, {"pid": "202939086", "topic": "Pets", "activation": 0.2183, "text": "There’s more than one way to skin a cat but a lot of them get points deducted and I’m playing ranked today", "axes": {}}, {"pid": "84155071", "topic": "Video Games", "activation": 0.2171, "text": "The problem with wanting to build games is I have 3 good ideas, the energy to execute on half of one, and the funding of Victorian orphan with no expectations. Anyway, fund more black and brown developers so we can make cool shit.", "axes": {}}, {"pid": "38756549", "topic": "Books & Reading", "activation": 0.2145, "text": "\"This book has a sunshine character and a grumpy character who falls in love\"\n\nthat is 20 different other books can I get some specifics or could this have been written with chatgpt", "axes": {}}, {"pid": "51916375", "topic": "Food & Cooking", "activation": 0.2133, "text": "anybody can whip up a gourmet dinner with lobster and caviar and steak. but what can you make with 'a box of spaghetti and these 3 things which is all we have in the house.' that is some cooking.", "axes": {}}, {"pid": "109259387", "topic": "Space & Astronomy", "activation": 0.2046, "text": "A binary solar system is one where there are two stars. Our solar system does not have two stars, which means our whole solar system is nonbinary.", "axes": {}}, {"pid": "70135370", "topic": "Climate & Energy", "activation": 0.2012, "text": "But it only takes one tree to make\nA thousand matches\nOnly takes one match to burn\nA thousand trees . . .", "axes": {"reading_level": 0.3, "concreteness": 0.8, "narrativity": 0.2, "hedging": 0.05, "tone": 0.65, "warmth": 0.4, "self_disclosure": 0.0, "casualness": 0.5, "humor": 0.0}}, {"pid": "11997673", "topic": "Economy & Jobs", "activation": 0.1886, "text": "America can be a country with a lot of individual horrors and structural problems AND ALSO be experiencing a period of low unemployment and wage growth. I don't understand why people are allergic to just admitting that both of these things are true.", "axes": {}}, {"pid": "128048", "topic": "Politics", "activation": 0.1852, "text": "joe biden: i never lost any of my baby teeth. i still have all of them in my mouth. and all my adult teeth are in there too. that makes 52 teeth.\n\nreporter: sir the question was about a ceasefire", "axes": {}}]}, {"f": 47, "density": 0.2148, "category": "novel_candidate", "lifts": {"reading_level": -0.013, "concreteness": -0.015, "narrativity": 0.018, "hedging": 0.008, "tone": 0.003, "warmth": 0.001, "self_disclosure": -0.018, "casualness": -0.006, "humor": 0.001}, "rs": {"reading_level": -0.043, "concreteness": -0.025, "narrativity": 0.049, "hedging": 0.029, "tone": -0.015, "warmth": 0.006, "self_disclosure": -0.021, "casualness": -0.013, "humor": 0.013}, "best_axis": "narrativity", "best_r": 0.049, "best_lift": 0.018, "examples": [{"pid": "41925552", "topic": "Gardening & Plants", "activation": 0.2771, "text": "Last harvest of the year.\n\nIt's not unusual to have a random frost in early September in these parts, and fairly consistently by mid or late September. The fact that it's nearing late October and we're still harvesting tomatoes and cucumbers because we haven't had a frost yet is just crazy.", "axes": {}}, {"pid": "21856841", "topic": "Gardening & Plants", "activation": 0.2619, "text": "Two small harvests. The citrus is coming in two months early this year, maybe from the extreme heat?", "axes": {}}, {"pid": "147332150", "topic": "Fitness & Gym", "activation": 0.2541, "text": "Late December is the best gym time. Full of footy players trying to bulk up before preseason training starts. Genuinely love the optimism.", "axes": {}}, {"pid": "98283", "topic": "Climate & Energy", "activation": 0.2512, "text": "Knowing everything I do about the climate emergency this wildfire advisory still shocked me to my core. It's February 22, people. Alberta's in for another doozy this year", "axes": {}}, {"pid": "62957594", "topic": "Climate & Energy", "activation": 0.2511, "text": "Keep a level-head going forward as we get inundated with promises of a big pattern change, severe Arctic cold, etc. The grift is simple: forecast extreme cold all the time so that when it does happen to occur, the forecaster basks in the accolades.", "axes": {}}, {"pid": "17619318", "topic": "Birds & Nature", "activation": 0.2498, "text": "This morning in Brooklyn: Bright sun, 27 deg F, 24 MPH icy wind gusts, snow covering the ground and many plants. But these conditions didn't stop the super-rare Rufous Hummingbird from making an appearance and dazzling observers. This little guy should be wintering in Mexico right now. 🪶", "axes": {}}, {"pid": "133512777", "topic": "Birds & Nature", "activation": 0.2496, "text": "Halifax may have storm chips, but it seems Vancouver has damp-but-pleasantly-mild-February-day-crow-cheesies. #NSStorm #birds", "axes": {}}, {"pid": "1809726", "topic": "Gardening & Plants", "activation": 0.2429, "text": "Almost unreal. Camellia flowers in full bloom in South East England in the month of January. They usually bloom in late February or early March.", "axes": {}}, {"pid": "13071645", "topic": "Climate & Energy", "activation": 0.2418, "text": "It got up to 102° in Albuquerque today, the hottest maximum temperature ever in the month of August. Tomorrow's forecasted high is 100°.", "axes": {}}, {"pid": "106516413", "topic": "Gardening & Plants", "activation": 0.2398, "text": "Blooming MUCH too early are my red azaleas! Our up and down temperatures have really made it difficult.  🌱", "axes": {}}]}, {"f": 48, "density": 0.0, "category": "dead", "lifts": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "rs": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "best_axis": "reading_level", "best_r": 0.0, "best_lift": 0.0, "examples": []}, {"f": 49, "density": 0.1803, "category": "partial_overlap", "lifts": {"reading_level": 0.0, "concreteness": 0.012, "narrativity": -0.043, "hedging": 0.01, "tone": -0.007, "warmth": -0.044, "self_disclosure": -0.037, "casualness": -0.017, "humor": 0.008}, "rs": {"reading_level": 0.029, "concreteness": 0.029, "narrativity": -0.11, "hedging": 0.01, "tone": -0.038, "warmth": -0.079, "self_disclosure": -0.1, "casualness": -0.078, "humor": -0.013}, "best_axis": "narrativity", "best_r": -0.11, "best_lift": -0.044, "examples": [{"pid": "57078311", "topic": "Music", "activation": 0.3328, "text": "With The Beatles sitting at #1 in the midweek singles chart, a brief history of Beatles singles since they last occupied the top spot in the charts on 6 September, 1969 with The Ballad Of John And Yoko:", "axes": {}}, {"pid": "113726993", "topic": "Birds & Nature", "activation": 0.317, "text": "Barring a last minute owl, final stats for 2023 with the help of eBird: \n\n10 life birds.\n272 species total for the year. \n226 for my state. \n213 for my county. \n113 species for the yard.\nMy eBird checklist streak is now at 1095 days. \n\nHowever you like to bird, I hope 2024 is good to you! ❤️🪶🎉", "axes": {"reading_level": 0.45, "concreteness": 0.9, "narrativity": 0.35, "hedging": 0.1, "tone": 0.5, "warmth": 0.8, "self_disclosure": 0.6, "casualness": 0.5, "humor": 0.25}}, {"pid": "33304496", "topic": "Transportation & Urbanism", "activation": 0.2887, "text": "of 30 fatalities last year, a total of 23 people died riding e-bikes, which is more than double the previous record for e-bike fatalities", "axes": {}}, {"pid": "8482398", "topic": "Sports", "activation": 0.2741, "text": "GRAND SLAM MOOKIE BETTS. The Dodgers have now tied the franchise record for grand slams in a season with 11.", "axes": {}}, {"pid": "45701990", "topic": "Transportation & Urbanism", "activation": 0.2549, "text": "\"Combined sales of hybrid vehicles, plug-in hybrid electric vehicles, and battery electric vehicles in the United States rose to 16.3% of total new light-duty vehicle sales in 2023, according to data from Wards Intelligence. In 2022, hybrid, plug-in hybrid, and BEV sales were 12.9% of total sales.\"", "axes": {"reading_level": 0.6, "concreteness": 0.85, "narrativity": 0.2, "hedging": 0.1, "tone": 0.2, "warmth": 0.5, "self_disclosure": 0.0, "casualness": 0.15, "humor": 0.0}}, {"pid": "49850360", "topic": "Sports", "activation": 0.2379, "text": "Points Iowa scored outside the state of Iowa, entire season: 38\n\nPoints Iowa State scored outside the state of Iowa, tonight: 42", "axes": {}}, {"pid": "15476794", "topic": "Video Games", "activation": 0.2364, "text": "Overwatch 2 has the ignominious honour of becoming the worst user-reviewed game on Steam ever, although its recent launch on the platform has seen tens of thousands of players.", "axes": {}}, {"pid": "68552593", "topic": "Transportation & Urbanism", "activation": 0.2354, "text": "Sacramento retains its title as the most popular moving destination in the US, absorbing thousands of San Franciscans each year. investors.redfin.com/news-events/...", "axes": {}}, {"pid": "21768209", "topic": "Books & Reading", "activation": 0.2328, "text": "i did not vote in the goodreads best-of-2023 poll because i did not read all the books. but here are some of my favorite reads this year.", "axes": {}}, {"pid": "12737486", "topic": "Climate & Energy", "activation": 0.2321, "text": "Today is the 34th consecutive day with ACE accrual in the Atlantic. If Ophelia forms on Saturday, we'll make it to 35 days, otherwise the streak ends today. The ACE is at ~140% of average for the date, and actually already ~94% of the full-season average! @user", "axes": {}}]}, {"f": 50, "density": 0.1753, "category": "partial_overlap", "lifts": {"reading_level": -0.026, "concreteness": 0.031, "narrativity": 0.043, "hedging": -0.029, "tone": 0.02, "warmth": -0.018, "self_disclosure": -0.057, "casualness": -0.009, "humor": 0.022}, "rs": {"reading_level": -0.051, "concreteness": 0.038, "narrativity": 0.039, "hedging": -0.044, "tone": 0.038, "warmth": -0.058, "self_disclosure": -0.115, "casualness": -0.042, "humor": 0.027}, "best_axis": "self_disclosure", "best_r": -0.115, "best_lift": -0.057, "examples": [{"pid": "44484514", "topic": "Video Games", "activation": 0.2345, "text": "Larian CEO being prompted to wrap up his GOTY speech as he was dedicating it to Jim Southworth (lead animator on the game who recently died) tells you exactly how much that show actually knows or cares about actual game developers", "axes": {}}, {"pid": "79646735", "topic": "AI & Tech", "activation": 0.2291, "text": "bill mitchell still pushes the boundaries as far as looking like an ai-generated version of himself though", "axes": {}}, {"pid": "8499072", "topic": "Books & Reading", "activation": 0.2154, "text": "The greatest living ghost story writer is surely Reggie Oliver, who not only writes well, but also in a variety of styles including pastiches. He’s quite remarkable. Much of his work can be purchased through Tartarus Press.", "axes": {"reading_level": 0.6, "concreteness": 0.7, "narrativity": 0.1, "hedging": 0.3, "tone": 0.35, "warmth": 0.65, "self_disclosure": 0.2, "casualness": 0.25, "humor": 0.0}}, {"pid": "438496", "topic": "Politics", "activation": 0.2086, "text": "Car crashes into Biden's motorcade as president leaves campaign event in Delaware. Biden was rushed into his car and was not involved", "axes": {}}, {"pid": "39955210", "topic": "Music", "activation": 0.2018, "text": "Dave Brubecks drummer Joe Morello,  is the only verified shape shifter in history. He eased into that Keith Moon gig so easily.....", "axes": {}}, {"pid": "92080254", "topic": "Politics", "activation": 0.1903, "text": "Ted Nugent says if Joe Biden is reelected he will leave the United States and take his pants-shitting skills elsewhere.", "axes": {}}, {"pid": "96254363", "topic": "Sports", "activation": 0.1851, "text": "Playing with Ricky Davis, JR Smith and DLo over the course of his career ensured LeBron would be supremely patient at every stage of fatherhood.", "axes": {"reading_level": 0.45, "concreteness": 0.65, "narrativity": 0.25, "hedging": 0.1, "tone": 0.4, "warmth": 0.5, "self_disclosure": 0.0, "casualness": 0.3, "humor": 0.65}}, {"pid": "32718701", "topic": "Sports", "activation": 0.1809, "text": "The man most famous for playing an incredible nerd on TV has quietly become one of America's greatest multi-sport athletes", "axes": {}}, {"pid": "57292300", "topic": "Sports", "activation": 0.1784, "text": "wonder if aaron roggers will heal his own achilles tear by going on a darkness retreat and doing a bunch of lsd.", "axes": {}}, {"pid": "2269564", "topic": "Sports", "activation": 0.1777, "text": "Giannis Antetokounmpo did his entire postgame interview as the Hulk for his kids, who were in the back of the room & totally delighted.", "axes": {"reading_level": 0.3, "concreteness": 0.75, "narrativity": 0.65, "hedging": 0.1, "tone": 0.4, "warmth": 0.8, "self_disclosure": 0.1, "casualness": 0.5, "humor": 0.6}}]}, {"f": 51, "density": 0.2634, "category": "partial_overlap", "lifts": {"reading_level": -0.005, "concreteness": -0.005, "narrativity": 0.004, "hedging": 0.04, "tone": 0.005, "warmth": 0.008, "self_disclosure": -0.0, "casualness": 0.009, "humor": -0.037}, "rs": {"reading_level": -0.011, "concreteness": -0.036, "narrativity": -0.036, "hedging": 0.125, "tone": 0.004, "warmth": -0.009, "self_disclosure": -0.032, "casualness": 0.016, "humor": -0.074}, "best_axis": "hedging", "best_r": 0.125, "best_lift": 0.04, "examples": [{"pid": "73291924", "topic": "Video Games", "activation": 0.3011, "text": "The CMA has approved the Microsoft / Activision Merger and they are free to close the deal as of today. We should be
