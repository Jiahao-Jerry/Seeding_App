eir products.", "axes": {}}, {"pid": "4507412", "topic": "Ancient History", "activation": 0.2482, "text": "These are scoria bricks in Middlesbrough. They are made from the slag... the remnants of the iron industry. They are pretty much indestructible.", "axes": {}}, {"pid": "42169093", "topic": "Pets", "activation": 0.2479, "text": "✅ clean the cat’s water fountain \n✅ accidentally spill diet coke all over the kitchen floor \n✅ clean the diet coke spill", "axes": {"reading_level": 0.15, "concreteness": 0.85, "narrativity": 0.65, "hedging": 0.05, "tone": 0.55, "warmth": 0.65, "self_disclosure": 0.7, "casualness": 0.8, "humor": 0.75}}, {"pid": "62967053", "topic": "Space & Astronomy", "activation": 0.2416, "text": "Helium is the second most abundant element in the universe…\n\n…& on Earth, all our primordial helium (vast majority if not all) has escaped into space. \n\nHelium on Earth is mostly product of alpha decay of uranium & thorium & offspring. \n\nHelium is gathered by extract from natural gas formations.", "axes": {}}]}, {"f": 7, "density": 0.0, "category": "dead", "lifts": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "rs": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "best_axis": "reading_level", "best_r": 0.0, "best_lift": 0.0, "examples": []}, {"f": 8, "density": 0.2439, "category": "partial_overlap", "lifts": {"reading_level": -0.034, "concreteness": -0.004, "narrativity": 0.025, "hedging": -0.015, "tone": -0.017, "warmth": 0.035, "self_disclosure": 0.071, "casualness": 0.006, "humor": 0.003}, "rs": {"reading_level": -0.1, "concreteness": -0.025, "narrativity": 0.029, "hedging": -0.026, "tone": -0.047, "warmth": 0.075, "self_disclosure": 0.124, "casualness": 0.012, "humor": 0.006}, "best_axis": "self_disclosure", "best_r": 0.124, "best_lift": 0.071, "examples": [{"pid": "118011274", "topic": "Video Games", "activation": 0.2312, "text": "mfw trying to puzzle out the design for how best to engineer a 4-player qud-level simulation that's possible to actually develop and maintain", "axes": {}}, {"pid": "35723671", "topic": "Food & Cooking", "activation": 0.2276, "text": "One of the best things I’ve done this year is signing up for an organic veg box. It’s really encouraging me to cook with more veg - and to use veg I don’t normally buy. \n\nLunch today was Hokkaido and Sweet Potato soup with lambs lettuce and tomato salad.", "axes": {}}, {"pid": "73685169", "topic": "Photography", "activation": 0.2264, "text": "This is my DIY darkroom setup in our laundry room where I make prints from my digital images. I use inkjet printed digital negatives to contact print traditional silver gelatin photo paper or do alternative processes in my UV exposure unit.", "axes": {}}, {"pid": "88406880", "topic": "Fitness & Gym", "activation": 0.2259, "text": "Babes, thanks for your support.\n\nI spent some time thinking about my current goals.\n\nMy top 3:\n⭕ New Job\n⭕ Reach 225 pounds\n⭕ Build the basement tiki bar", "axes": {"reading_level": 0.2, "concreteness": 0.8, "narrativity": 0.3, "hedging": 0.1, "tone": 0.4, "warmth": 0.75, "self_disclosure": 0.7, "casualness": 0.7, "humor": 0.2}}, {"pid": "24778833", "topic": "AI & Tech", "activation": 0.213, "text": "AI will never replace me in my job of using deep learning techniques and massively large data sets to understand, summarize, generate and predict new content.", "axes": {}}, {"pid": "8792770", "topic": "Fitness & Gym", "activation": 0.2014, "text": "Since my big medical scares this summer and fall, I've been working very hard on getting healthier. Part of that is medical care, and part of that is exercise.\n\nSo I've been going to the Silver Sneakers classes at my local rec center.", "axes": {}}, {"pid": "4497405", "topic": "Books & Reading", "activation": 0.1977, "text": "This is the time of year where I always feel I haven't gotten enough writing done, although I did have two books come out in 2023:\nThe Keeper's Six (January) (contemporary fantasy with a 60-ish protagonist)\n&\nFurious Heaven (April)(Sun Chronicles bk 2, gender swapped Alexander the Great space opera)", "axes": {"reading_level": 0.45, "concreteness": 0.8, "narrativity": 0.5, "hedging": 0.35, "tone": 0.4, "warmth": 0.6, "self_disclosure": 0.7, "casualness": 0.55, "humor": 0.2}}, {"pid": "98488232", "topic": "Fitness & Gym", "activation": 0.1942, "text": "I think the freakiest part of working out is becoming aware of how my muscles feel and work inside my body", "axes": {}}, {"pid": "145494571", "topic": "Fitness & Gym", "activation": 0.1895, "text": "Went to the range today and worked on my grip. Finally understood the role my right elbow plays in my accuracy. Tightened it up and did pretty ok.", "axes": {}}, {"pid": "68945991", "topic": "Transportation & Urbanism", "activation": 0.1881, "text": "The only way to normalize the use of bikes is to use them for things that aren’t currently normal, like biking to the airport.", "axes": {}}]}, {"f": 9, "density": 0.2649, "category": "confirms_axis", "lifts": {"reading_level": -0.007, "concreteness": -0.065, "narrativity": -0.052, "hedging": 0.075, "tone": 0.001, "warmth": -0.019, "self_disclosure": -0.011, "casualness": 0.008, "humor": 0.05}, "rs": {"reading_level": -0.047, "concreteness": -0.214, "narrativity": -0.139, "hedging": 0.168, "tone": 0.017, "warmth": -0.052, "self_disclosure": -0.012, "casualness": 0.014, "humor": 0.083}, "best_axis": "concreteness", "best_r": -0.214, "best_lift": 0.075, "examples": [{"pid": "41864885", "topic": "Video Games", "activation": 0.2482, "text": "BioWare announcing layoffs in the current climate, after the Old Republic migration, isn't *that* surprising. But it is disgusting, depressing, infuriating, unnecessary,", "axes": {}}, {"pid": "133178560", "topic": "Politics", "activation": 0.2147, "text": "No, it is not certain and even if it was it is no excuse for Biden committing suicide. \"Trump is worse\" is not a valid defense of Biden's actions.", "axes": {"reading_level": 0.3, "concreteness": 0.2, "narrativity": 0.1, "hedging": 0.15, "tone": 0.75, "warmth": 0.15, "self_disclosure": 0.0, "casualness": 0.4, "humor": 0.0}}, {"pid": "7273801", "topic": "Transportation & Urbanism", "activation": 0.2142, "text": "Road death is not a natural cause of death. Road death is not a natural cause of death. Road death is not a natural cause of death. Traffic death is not a natural cause of death. Traffic death is not a natural cause of death. Traffic death is not a natural cause of death. Traffic death is not a natu", "axes": {}}, {"pid": "124572789", "topic": "Fitness & Gym", "activation": 0.2114, "text": "exercise is great tho even though it's not great for weight loss - maybe because it is? like exercise is an incredible mental boost and will make you feel better in all facets of life, even if it's tough to get into a routine", "axes": {}}, {"pid": "10388372", "topic": "Politics", "activation": 0.1999, "text": "Biden breaking *grassroots* fundraising records is one of those facts that feels impossible to square with the narrative about him", "axes": {}}, {"pid": "92891323", "topic": "Economy & Jobs", "activation": 0.1969, "text": "I know this is an old graph, but it’s still such a good example of a contributing factor to upper-middle-class anxiety", "axes": {}}, {"pid": "68245432", "topic": "Sports", "activation": 0.1888, "text": "OL's ownership of the Reign was certainly not without its upsides but \"Seattle Reign\" is infinitely better as a name", "axes": {}}, {"pid": "47572441", "topic": "Sports", "activation": 0.1833, "text": "allowing this Giants/Jets game to go to overtime has to be a violation of international human rights law", "axes": {"reading_level": 0.3, "concreteness": 0.6, "narrativity": 0.2, "hedging": 0.05, "tone": 0.75, "warmth": 0.45, "self_disclosure": 0.4, "casualness": 0.65, "humor": 0.8}}, {"pid": "62134254", "topic": "Movies & Film", "activation": 0.1819, "text": "1946’s TANGIER is just pure old Hollywood glamour. If Casablancasploitation is a thing, this #Noirvember entry would be a harmless, fun, and stylish entry in it.", "axes": {}}, {"pid": "2167231", "topic": "Video Games", "activation": 0.1809, "text": "Hi. This may be a surprise, but I’m stepping down from The Video Game History Foundation. \nIt probably goes without saying that this was a difficult decision and that I’m not even confident it’s the right one!\nLife is complicated and difficult and often necessitates making scary decisions. (1/3)", "axes": {}}]}, {"f": 10, "density": 0.1467, "category": "partial_overlap", "lifts": {"reading_level": -0.031, "concreteness": -0.037, "narrativity": -0.04, "hedging": -0.001, "tone": 0.006, "warmth": -0.025, "self_disclosure": 0.002, "casualness": 0.029, "humor": 0.027}, "rs": {"reading_level": -0.109, "concreteness": -0.098, "narrativity": -0.084, "hedging": -0.028, "tone": 0.022, "warmth": -0.054, "self_disclosure": -0.005, "casualness": 0.083, "humor": 0.036}, "best_axis": "reading_level", "best_r": -0.109, "best_lift": -0.04, "examples": [{"pid": "5326685", "topic": "Video Games", "activation": 0.3705, "text": "How did Harvest Moon go from the amazing games of the 90s to the generic uninspired schlock of the modern day releases.", "axes": {"reading_level": 0.3, "concreteness": 0.25, "narrativity": 0.2, "hedging": 0.1, "tone": 0.65, "warmth": 0.2, "self_disclosure": 0.15, "casualness": 0.4, "humor": 0.15}}, {"pid": "73539835", "topic": "Video Games", "activation": 0.2699, "text": "I'm the gamer that refuses to play competitively unless it's Super Mario Bros. 3 or Dance Dance Revolution", "axes": {}}, {"pid": "15476794", "topic": "Video Games", "activation": 0.2645, "text": "Overwatch 2 has the ignominious honour of becoming the worst user-reviewed game on Steam ever, although its recent launch on the platform has seen tens of thousands of players.", "axes": {}}, {"pid": "100155504", "topic": "Video Games", "activation": 0.2642, "text": "Nintendo is suing the Switch emulator Yuzu over the fact that Yuzu teaches users to extract encryption keys needed to run their legally purchased games without pirating them\n\nNintendo alleges that the key extraction itself constitutes copyright infringement and that Yuzu is complicit for teaching it", "axes": {}}, {"pid": "70699739", "topic": "Video Games", "activation": 0.2253, "text": "ah, cool, my primary Wii U's fan died. looks like I'm heading to repair world. hey has anyone discussed at length about how this thing is kinda crappy?", "axes": {}}, {"pid": "159268021", "topic": "Photography", "activation": 0.2208, "text": "#ShittyCameraChallenge Epilogue \nOf course I found the missing Dreamcast SD card today, so here's at least a small impression from the Dreameye straight from VisualPark.", "axes": {}}, {"pid": "131002815", "topic": "Music", "activation": 0.2138, "text": "This arrived in the mail today! With #RidgeRacerInfinity this marks the second time my music is available on vinyl! \nCopies will be available at MAGFest too folks, so make sure to hop to the Firaga Records booth to get yours! 🏁✨\n\nAlso I have the best vinyl record box", "axes": {}}, {"pid": "5021999", "topic": "Movies & Film", "activation": 0.2097, "text": "Tron: Legacy is criminally underrated as a narrative and aesthetic achievement. I will defend this hill to the death.", "axes": {}}, {"pid": "23997084", "topic": "Video Games", "activation": 0.2075, "text": "Gamers want 2B in more games they need \"2B\" in line at the job fair instead of spending their parent's money on hentai.", "axes": {}}, {"pid": "733909", "topic": "Photography", "activation": 0.2056, "text": "#ShittyCameraChallenge\n\nGame Boy Camera\n128×112 pixels, monochrome 2-bit raw\nplastic lens that I can't find specs for", "axes": {}}]}, {"f": 11, "density": 0.1317, "category": "novel_candidate", "lifts": {"reading_level": -0.036, "concreteness": -0.011, "narrativity": -0.008, "hedging": -0.009, "tone": 0.008, "warmth": -0.014, "self_disclosure": -0.02, "casualness": 0.021, "humor": 0.026}, "rs": {"reading_level": -0.081, "concreteness": -0.02, "narrativity": -0.007, "hedging": -0.017, "tone": 0.016, "warmth": -0.026, "self_disclosure": -0.024, "casualness": 0.046, "humor": 0.025}, "best_axis": "reading_level", "best_r": -0.081, "best_lift": -0.036, "examples": [{"pid": "303503", "topic": "Sports", "activation": 0.4147, "text": "Cricket is a simple game. 22 men chase a ball for a period of time and then at the end Australia wins.", "axes": {}}, {"pid": "137207283", "topic": "Sports", "activation": 0.3418, "text": "Football should be banned. \n\nBoxing too. \n\nAnd other “sports” involving repetitive &/or damaging brain trauma.\n\nEspecially given the racism.", "axes": {}}, {"pid": "8495750", "topic": "Sports", "activation": 0.2989, "text": "You’ve heard of Turkish Oil Wrestling but have you seen a game of Calcio Storico where 54 beautiful Italian men beat each other senseless on a dirt pitch?", "axes": {}}, {"pid": "9799381", "topic": "Sports", "activation": 0.2504, "text": "Outdoor sports leagues (looking at you, NWSL) need to start thinking about how to handle increasing frequency of tornado/thunderstorm warnings, extreme heat, health-threatening air quality (from wildfire smoke, e.g.). Forcing players to play when others are being urged to stay indoors is … bad.", "axes": {}}, {"pid": "31982959", "topic": "Politics", "activation": 0.23, "text": "This sounds incredibly stupid, but it appears that Joe Biden has locked up the Oklahoma lacrosse parent vote by moving to let the 6 Nations compete under their own flag at the world championships. \n\nIt’s very cool, obviously, but the lacrosse GroupMe is exploding about it and how Biden is a leader", "axes": {"reading_level": 0.5, "concreteness": 0.7, "narrativity": 0.6, "hedging": 0.4, "tone": 0.55, "warmth": 0.6, "self_disclosure": 0.65, "casualness": 0.65, "humor": 0.55}}, {"pid": "89714760", "topic": "Fitness & Gym", "activation": 0.2294, "text": "After tearing my shoulder 8 months ago...\n\nI competed in my first Tough Mudder event and completed it!!!", "axes": {}}, {"pid": "60747074", "topic": "Sports", "activation": 0.2289, "text": "It’s opening day for the KC Current & CPKC Stadium.  The first stadium exclusively for women’s soccer.\n#kcbaby!", "axes": {}}, {"pid": "5405240", "topic": "Sports", "activation": 0.2284, "text": "My actual sports hot take is that, other than in the playoffs, every sport should just have ties. \n\nEspecially football and hockey, where the OT is essentially a different sport than the actual game.", "axes": {}}, {"pid": "8184002", "topic": "Video Games", "activation": 0.2273, "text": "Fighting games should have a \"I just want to play this like a pickup game of basketball with normal people\" mode and not \"Here's an NCAA/NBA player in disguise who practices 90 hours per week\" mode.", "axes": {}}, {"pid": "21523048", "topic": "Video Games", "activation": 0.2252, "text": "if they keep beating our players up like villa and forest sky will move the games for pay per view on box office.", "axes": {}}]}, {"f": 12, "density": 0.0, "category": "dead", "lifts": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "rs": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "best_axis": "reading_level", "best_r": 0.0, "best_lift": 0.0, "examples": []}, {"f": 13, "density": 0.2774, "category": "partial_overlap", "lifts": {"reading_level": -0.035, "concreteness": -0.027, "narrativity": -0.008, "hedging": -0.028, "tone": 0.026, "warmth": 0.044, "self_disclosure": 0.03, "casualness": -0.007, "humor": -0.047}, "rs": {"reading_level": -0.111, "concreteness": -0.107, "narrativity": -0.022, "hedging": -0.075, "tone": 0.094, "warmth": 0.114, "self_disclosure": 0.034, "casualness": -0.021, "humor": -0.096}, "best_axis": "warmth", "best_r": 0.114, "best_lift": -0.047, "examples": [{"pid": "29519803", "topic": "Transportation & Urbanism", "activation": 0.3192, "text": "Austin City Council votes to eliminate parking mandates citywide! 🎉🎉🎉\n\nThank you to CM Zo Qadri for leading on this crucial reform, and many thanks to all the supporters! We did it y'all! 🙌", "axes": {"reading_level": 0.25, "concreteness": 0.6, "narrativity": 0.35, "hedging": 0.1, "tone": 0.75, "warmth": 0.8, "self_disclosure": 0.4, "casualness": 0.7, "humor": 0.1}}, {"pid": "225875161", "topic": "Video Games", "activation": 0.3022, "text": "It was fantastic to see so many people enjoying and excited by Crow Country! \nAnd fantastic to get to meet so many game devs and indie game enjoyers!", "axes": {}}, {"pid": "1952263", "topic": "Sports", "activation": 0.2837, "text": "Happy for Joey Votto, happy for Toronto, glad I was at his last home game at GABP and forever grateful I got to watch so many years of his baseball excellence.", "axes": {}}, {"pid": "4390042", "topic": "Climate & Energy", "activation": 0.2822, "text": "Thank you, Pope Francis, for inviting us to speak at the Vatican and raising your voice for climate justice and the protection of climate activists.\n\nThe climate breakdown is happening here and now. More than ever we are in need of broad alliances, real action and true allies. #LaudateDeum", "axes": {}}, {"pid": "10085340", "topic": "Transportation & Urbanism", "activation": 0.2602, "text": "wishing you all a happy 120th anniversary of the day two bicycle hipsters from ohio spat in the face of god", "axes": {}}, {"pid": "158585373", "topic": "Pets", "activation": 0.2595, "text": "Our sweet girl Sasha crossed the rainbow Bridge today.  She was a fighter right up until the end.  Her heart stayed strong even though her body was not strong anymore.  We are going to miss her so much.", "axes": {}}, {"pid": "62763610", "topic": "Pets", "activation": 0.254, "text": "A wonderful lil parapup named River Phoenix has passed. He was the most delightful of parapups, beloved around the world for his joie de vivre. He leaves behind Tine, his HerdMom, his HerdDadGuy, his many Herd brothers and sisters, and his loving fans worldwide. He was a most wonderful and good boy.", "axes": {"reading_level": 0.3, "concreteness": 0.6, "narrativity": 0.7, "hedging": 0.05, "tone": 0.6, "warmth": 0.9, "self_disclosure": 0.4, "casualness": 0.65, "humor": 0.2}}, {"pid": "24942866", "topic": "Transportation & Urbanism", "activation": 0.2508, "text": "It was an honour to ride with everyone today, and heartbreaking to grieve with the family members of Bill Petropoulos. It never gets easier to witness the agony of a family in the aftermath of senseless #RoadViolence. All deaths on our road are completely preventable with Vision Zero design change.", "axes": {}}, {"pid": "24414883", "topic": "Books & Reading", "activation": 0.247, "text": "Happy UK release day to this gem! I’m truly grateful for both Titan and CLASH for investing so much dedication, care, and thoughtfulness into this tiny novel. It’s a special day ✨", "axes": {"reading_level": 0.25, "concreteness": 0.3, "narrativity": 0.2, "hedging": 0.1, "tone": 0.55, "warmth": 0.85, "self_disclosure": 0.4, "casualness": 0.5, "humor": 0.0}}, {"pid": "18944509", "topic": "Higher Education", "activation": 0.2378, "text": "Here is the email I sent to the WVU president, provost, and BoG (vis Valerie Lopez). I want to encourage all academics and alumni to do the same. Feel free to use any of my language here.", "axes": {}}]}, {"f": 14, "density": 0.2278, "category": "partial_overlap", "lifts": {"reading_level": -0.01, "concreteness": -0.026, "narrativity": -0.023, "hedging": -0.015, "tone": 0.019, "warmth": -0.025, "self_disclosure": -0.03, "casualness": 0.001, "humor": -0.014}, "rs": {"reading_level": 0.017, "concreteness": -0.097, "narrativity": -0.092, "hedging": -0.031, "tone": 0.048, "warmth": -0.102, "self_disclosure": -0.098, "casualness": -0.041, "humor": -0.029}, "best_axis": "warmth", "best_r": -0.102, "best_lift": -0.03, "examples": [{"pid": "154905080", "topic": "Photography", "activation": 0.248, "text": "Primary Kit: \nCanon EOS R6 Mark II\nCanon RF 24-70 f/2.8L\nCanon battery grip (not pictured) \nAtamos Shinobi (Studio Only)", "axes": {}}, {"pid": "18254232", "topic": "AI & Tech", "activation": 0.2349, "text": "Just tried the same image prompt on four different generative AI image generators. At least on this test, the new Meta image generator seems best...", "axes": {}}, {"pid": "12763410", "topic": "AI & Tech", "activation": 0.2127, "text": "The AI-generated Drake and the Weeknd track “Heart on My Sleeve” has been submitted for Grammy consideration\n\nAccording to Recording Academy CEO Harvey Mason Jr, “It’s absolutely eligible because it was written by a human\"", "axes": {}}, {"pid": "5000978", "topic": "Video Games", "activation": 0.2035, "text": "Honestly a smart move for Temu to adopt the “phone game with gameplay nothing like the ad” aesthetic", "axes": {"reading_level": 0.4, "concreteness": 0.6, "narrativity": 0.2, "hedging": 0.2, "tone": 0.5, "warmth": 0.3, "self_disclosure": 0.15, "casualness": 0.5, "humor": 0.65}}, {"pid": "55001810", "topic": "AI & Tech", "activation": 0.1987, "text": "\"AI regulation doesn't staunch innovation, it enables it. And it's a critical tool in our ongoing efforts to prevent the proliferation of deepfakes.\"", "axes": {"reading_level": 0.6, "concreteness": 0.35, "narrativity": 0.05, "hedging": 0.15, "tone": 0.55, "warmth": 0.4, "self_disclosure": 0.0, "casualness": 0.15, "humor": 0.0}}, {"pid": "49104634", "topic": "Books & Reading", "activation": 0.1924, "text": "BookTok, I'm watching all these \"top books I read in 2023\" and so many of you are putting out all or mostly white lists and I really need you to try harder to read diversely.", "axes": {}}, {"pid": "16733982", "topic": "Space & Astronomy", "activation": 0.1893, "text": "🚨 The FLAIR dataset has been accepted at NeurIPS2023 in the Benchmark & Dataset track. It contains high-resolution aerial imagery with a ground sample distance of 20 cm and over 20 billion individually labeled pixels for precise land-cover classification. arxiv.org/abs/2310.13336", "axes": {}}, {"pid": "162466627", "topic": "AI & Tech", "activation": 0.1888, "text": "Me: I can't write anything on AI regulation I don't know anything about anything.\nAlso me, once I finally sit down: <writes 30 page manifesto>", "axes": {}}, {"pid": "4518800", "topic": "Climate & Energy", "activation": 0.1856, "text": "The COP28 text being agreed upon while the Alliance of Small Island States wasn’t even in the room is highly symbolic.", "axes": {}}, {"pid": "34367707", "topic": "Politics", "activation": 0.1807, "text": "Joe Biden is in year three of his administration but to our horror it’s year eight of the Trump Show", "axes": {}}]}, {"f": 15, "density": 0.1142, "category": "novel_candidate", "lifts": {"reading_level": -0.002, "concreteness": -0.024, "narrativity": -0.029, "hedging": -0.004, "tone": 0.006, "warmth": -0.037, "self_disclosure": -0.039, "casualness": -0.011, "humor": 0.021}, "rs": {"reading_level": -0.001, "concreteness": -0.051, "narrativity": -0.083, "hedging": -0.028, "tone": -0.009, "warmth": -0.051, "self_disclosure": -0.083, "casualness": -0.055, "humor": 0.008}, "best_axis": "narrativity", "best_r": -0.083, "best_lift": -0.039, "examples": [{"pid": "173840435", "topic": "Video Games", "activation": 0.2389, "text": "The designer who reads all player feedback is conscientious. The designer who listens to all player feedback is insane.", "axes": {}}, {"pid": "99560027", "topic": "Photography", "activation": 0.2261, "text": "The spectra Polaroid film jammed in the camera and had to be dragged out with forceps! Beautiful imperfection", "axes": {}}, {"pid": "45853890", "topic": "Climate & Energy", "activation": 0.2252, "text": "The negative impacts of tourism on the environment have become so severe that drastic changes to our travel habits are inevitable.\n\nVia Sussex Bylines", "axes": {}}, {"pid": "54100028", "topic": "Higher Education", "activation": 0.2184, "text": "The final version of the \"change management\" plan at Australian Catholic University still includes the closure of the Dianoia Institute of Philosophy.", "axes": {}}, {"pid": "16562937", "topic": "Fitness & Gym", "activation": 0.216, "text": "The one silver lining about gaining 60 pounds during the pandemic is that my gargantuan ass came back", "axes": {}}, {"pid": "27669108", "topic": "Pets", "activation": 0.2146, "text": "The advantage of owning a black and white dog is accessorising  white clothes with black hair and black clothes with white", "axes": {"reading_level": 0.2, "concreteness": 0.8, "narrativity": 0.2, "hedging": 0.15, "tone": 0.3, "warmth": 0.65, "self_disclosure": 0.15, "casualness": 0.45, "humor": 0.65}}, {"pid": "9929605", "topic": "Higher Education", "activation": 0.2069, "text": "The Catholic University of America was clearly intended to be a bigger deal than it actually ended up being", "axes": {}}, {"pid": "5538165", "topic": "Pets", "activation": 0.204, "text": "The saga of Kelpie's haunted vagina continues!\n\nShe goes to the vet for exploratory surgery on Friday.", "axes": {}}, {"pid": "135411361", "topic": "Politics", "activation": 0.1927, "text": "The age group most likely to say that there's no difference between the parties? The voters Biden relies on the most.", "axes": {}}, {"pid": "336209", "topic": "Sports", "activation": 0.1923, "text": "The World Series will be held in cavernous distribution warehouses. How can you not be romantic about baseball?", "axes": {}}]}, {"f": 16, "density": 0.2879, "category": "partial_overlap", "lifts": {"reading_level": -0.004, "concreteness": 0.004, "narrativity": -0.005, "hedging": -0.016, "tone": -0.029, "warmth": 0.002, "self_disclosure": -0.024, "casualness": -0.022, "humor": -0.084}, "rs": {"reading_level": -0.026, "concreteness": 0.018, "narrativity": 0.007, "hedging": -0.039, "tone": -0.104, "warmth": 0.023, "self_disclosure": -0.047, "casualness": -0.051, "humor": -0.105}, "best_axis": "humor", "best_r": -0.105, "best_lift": -0.084, "examples": [{"pid": "133863221", "topic": "Fitness & Gym", "activation": 0.2726, "text": "Lifting program progression week #2. Two more reps on every set. This is going to be the best kind of awful.", "axes": {"reading_level": 0.3, "concreteness": 0.6, "narrativity": 0.35, "hedging": 0.1, "tone": 0.65, "warmth": 0.6, "self_disclosure": 0.55, "casualness": 0.65, "humor": 0.5}}, {"pid": "22865726", "topic": "Pets", "activation": 0.2255, "text": "Not sure if Bluesky has met the goats yet. Left to right this is Chapina, and her two boys, Weeble and Sancho.", "axes": {}}, {"pid": "11889069", "topic": "Food & Cooking", "activation": 0.2249, "text": "Second cook on the griddle went about as well as I could have hoped. 7 steak appears to be a good fajita meat.", "axes": {}}, {"pid": "50047379", "topic": "Gardening & Plants", "activation": 0.2183, "text": "All our imported dahlias are ready to go. We're planting them in PB28 bags for at least the first season to make sure they are free of gall before planting them in the garden. 🌱🇳🇿", "axes": {}}, {"pid": "12310670", "topic": "Space & Astronomy", "activation": 0.2014, "text": "The Centaur AV-104 stage should now have fired for a second time to reach escape velocity. On this mission,\nULA\n are disposing of the upper stage by sending it to solar orbit.", "axes": {}}, {"pid": "9276922", "topic": "Fitness & Gym", "activation": 0.1959, "text": "Gymbro: shouldn’t we wait a few more days between chest supplement and fly day?\n\nMe: no we’ll be fine\n\nI was not fine, I struggled with everything😂. \n\nHe succeeded and went up in weight in everything at least.", "axes": {"reading_level": 0.25, "concreteness": 0.7, "narrativity": 0.75, "hedging": 0.1, "tone": 0.35, "warmth": 0.65, "self_disclosure": 0.75, "casualness": 0.75, "humor": 0.6}}, {"pid": "94935053", "topic": "Books & Reading", "activation": 0.1956, "text": "New Review - the last of the Fractal Series Novellas Jezero by Allen Stroud offers a tense story in the face of disaster - highly recommend the whole series!", "axes": {}}, {"pid": "27230841", "topic": "Fitness & Gym", "activation": 0.1909, "text": "After almost a month off the gym from the car accident, my chiropractor almost has humpty dumpty back together again. Testing a new chain weave today which should be on the website for Majere's Metals  next week and heading to Mid-Atlantic Leather Weekend .", "axes": {}}, {"pid": "75357592", "topic": "Pets", "activation": 0.1822, "text": "In local news, we have now verified that two of our cats are using our Litter Robots, our petite 5.2  lb Naughty Agatha Darkness and 19.7 lb Rascal, bane of all chicken flesh.  Going to start phasing out the traditional litter boxes soon.", "axes": {"reading_level": 0.35, "concreteness": 0.8, "narrativity": 0.6, "hedging": 0.15, "tone": 0.4, "warmth": 0.75, "self_disclosure": 0.5, "casualness": 0.55, "humor": 0.65}}, {"pid": "23881000", "topic": "Economy & Jobs", "activation": 0.1806, "text": "Got an update on the house and it's a good one. The numbers are crunched and done. The government wants to reinspect the reinspection that needed to be addressed from the original inspection. This is just government bureaucracy at work because the lender is more than happy with the house currently.", "axes": {}}]}, {"f": 17, "density": 0.0, "category": "dead", "lifts": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "rs": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "best_axis": "reading_level", "best_r": 0.0, "best_lift": 0.0, "examples": []}, {"f": 18, "density": 0.2619, "category": "partial_overlap", "lifts": {"reading_level": -0.01, "concreteness": -0.036, "narrativity": -0.011, "hedging": 0.009, "tone": 0.004, "warmth": -0.012, "self_disclosure": -0.018, "casualness": -0.003, "humor": -0.0}, "rs": {"reading_level": -0.017, "concreteness": -0.103, "narrativity": -0.039, "hedging": 0.039, "tone": -0.019, "warmth": -0.025, "self_disclosure": -0.055, "casualness": -0.033, "humor": -0.022}, "best_axis": "concreteness", "best_r": -0.103, "best_lift": -0.036, "examples": [{"pid": "155586333", "topic": "AI & Tech", "activation": 0.2569, "text": "Half these AI videos people are saying are so realistic feel like they were produced by the protomolecule", "axes": {}}, {"pid": "12077750", "topic": "Economy & Jobs", "activation": 0.2322, "text": "Some myths about the economy are like zombies — they just keep crawling back. Here are the three that eat at me the most.", "axes": {}}, {"pid": "21779317", "topic": "Space & Astronomy", "activation": 0.232, "text": "In orbit around the Milky Way are dozens of satellite galaxies, each containing millions or even billions of stars. In their wakes, tidal forces draw out streamers of gas and stars, some of which are ancient. Just imagine the view any planets in these streams might have in their night skies.", "axes": {"reading_level": 0.6, "concreteness": 0.75, "narrativity": 0.35, "hedging": 0.2, "tone": 0.4, "warmth": 0.65, "self_disclosure": 0.15, "casualness": 0.25, "humor": 0.0}}, {"pid": "10455852", "topic": "Books & Reading", "activation": 0.2204, "text": "We recently reissued these two Sarah Caudwell mysteries as freshly reset trade paperbacks (they'd been little mass markets for a very long time), and they're great and you should read them. \n\nThe other two Hilary Tamars are on the way; stay tuned.", "axes": {"reading_level": 0.45, "concreteness": 0.65, "narrativity": 0.2, "hedging": 0.15, "tone": 0.35, "warmth": 0.7, "self_disclosure": 0.2, "casualness": 0.45, "humor": 0.15}}, {"pid": "10742935", "topic": "AI & Tech", "activation": 0.217, "text": "None of these people exist, but you can buy their books on Amazon anyway. Here's an article on Amazon authors with GAN-generated faces and the books these authors publish (which appear to be almost entirely devoid of original human-created content).\nconspirator0.substack.com/p/none-of-th...", "axes": {}}, {"pid": "5450300", "topic": "Politics", "activation": 0.2154, "text": "\"Many of the proposals on offer at the 2023 convention would have precluded endorsing Bernie Sanders and most of the socialists who are currently advancing our cause in city councils, state houses, and Congress.\"", "axes": {}}, {"pid": "160604", "topic": "Ancient History", "activation": 0.2039, "text": "One of the three Roman pools of Gafsa, in Tunisia, two of which are open. Built in the 2nd century BCE, they are about five meters deep and are fed by hot water springs", "axes": {}}, {"pid": "94201791", "topic": "AI & Tech", "activation": 0.19, "text": "There are lots of kinds of AI; the ones that do pattern recognition are generally the most useful, the generative text ones are nearly useless because they don't have models of reality, just about text; the ones that do have reality models are typically vision for steering robots, etc.", "axes": {}}, {"pid": "12261947", "topic": "Higher Education", "activation": 0.1876, "text": "What do we make of the fact that so many of the weirdest freaks in politics and punditry went to Harvard and Yale", "axes": {}}, {"pid": "66724966", "topic": "Movies & Film", "activation": 0.1867, "text": "I'm continuing through all the Halloween movies and I just found this infographic showing the continuity between the films\n\nthese movies are so deeply unserious", "axes": {"reading_level": 0.3, "concreteness": 0.4, "narrativity": 0.5, "hedging": 0.15, "tone": 0.55, "warmth": 0.65, "self_disclosure": 0.6, "casualness": 0.7, "humor": 0.6}}]}, {"f": 19, "density": 0.2394, "category": "partial_overlap", "lifts": {"reading_level": 0.005, "concreteness": -0.06, "narrativity": 0.016, "hedging": 0.001, "tone": 0.014, "warmth": 0.009, "self_disclosure": 0.022, "casualness": -0.026, "humor": -0.038}, "rs": {"reading_level": 0.008, "concreteness": -0.173, "narrativity": 0.006, "hedging": -0.029, "tone": 0.044, "warmth": 0.029, "self_disclosure": 0.048, "casualness": -0.099, "humor": -0.09}, "best_axis": "concreteness", "best_r": -0.173, "best_lift": -0.06, "examples": [{"pid": "112802463", "topic": "Gardening & Plants", "activation": 0.3011, "text": "🌱 When it's budding and so full of promise.\n\nThe cosmos buds are not quite ready to wake up. They're waiting for the sun to kiss them awake so they can bare their petaled arms.", "axes": {}}, {"pid": "87064239", "topic": "Gardening & Plants", "activation": 0.2778, "text": "It’s weird to have plants from clippings from a friend you stepped away from. It feels weird to have this living thing from that person but it doesn’t know the frame from the day it was clipped till now. It’s just sitting there growing inside where it shouldn’t be and looking cute.", "axes": {}}, {"pid": "173537534", "topic": "Video Games", "activation": 0.2576, "text": "“Don’t stare into the void. Let it do what it’s gonna do. Just leave it alone to do it’s thing. The less you even think about the backlog of steam games the better.”", "axes": {"reading_level": 0.3, "concreteness": 0.6, "narrativity": 0.2, "hedging": 0.15, "tone": 0.5, "warmth": 0.6, "self_disclosure": 0.35, "casualness": 0.65, "humor": 0.6}}, {"pid": "2467576", "topic": "Books & Reading", "activation": 0.251, "text": "Book #109 of 2023: THE SHADOW OF THE TORTURER by Gene Wolfe. “We believe that we invent symbols. The truth is that they invent us; we are their creatures, shaped by their hard, defining edges...”", "axes": {}}, {"pid": "36681781", "topic": "Music", "activation": 0.2463, "text": "Nick Cave concert in Boston last night was magical. Songs at the piano, with Colin Greenwood on bass guitar. One highlight was a new song:\n\"...sometimes I see you in the evening\nWhen the sky makes no sound\nAnd I know that I will always love you\nIn the morning when the dew is on the ground.\"", "axes": {"reading_level": 0.3, "concreteness": 0.8, "narrativity": 0.65, "hedging": 0.1, "tone": 0.55, "warmth": 0.75, "self_disclosure": 0.6, "casualness": 0.4, "humor": 0.0}}, {"pid": "4431117", "topic": "Video Games", "activation": 0.2448, "text": "Every video game that exists is a miracle in that all of existence is a miracle. Where did all this shit come from? An absurd situation but it's chill", "axes": {"reading_level": 0.3, "concreteness": 0.2, "narrativity": 0.15, "hedging": 0.6, "tone": 0.35, "warmth": 0.55, "self_disclosure": 0.5, "casualness": 0.7, "humor": 0.6}}, {"pid": "18655890", "topic": "Video Games", "activation": 0.2413, "text": "Dark Souls is about how if you keep fighting only to maintain a rotten status quo, re-recording it like a VHS tape over and over, eventually dudes get too big", "axes": {}}, {"pid": "167198180", "topic": "Economy & Jobs", "activation": 0.2396, "text": "“We are not our GDP. The economy they worship is statistical artefact which measures some parts of what makes up our welfare – the bits that are most convenient to monetise and count.”", "axes": {}}, {"pid": "43802098", "topic": "Food & Cooking", "activation": 0.2276, "text": "Decadence.\n\nFlour, water, salt, and the microscopic critters living under our roof made this.\n\nCooked using the energy of sunlight captured millions of years ago, released as fire.\n\nGrace.🍽️", "axes": {"reading_level": 0.45, "concreteness": 0.75, "narrativity": 0.6, "hedging": 0.05, "tone": 0.65, "warmth": 0.8, "self_disclosure": 0.4, "casualness": 0.3, "humor": 0.2}}, {"pid": "61391772", "topic": "Birds & Nature", "activation": 0.2157, "text": "I love taking photos of birds because it slows you down. You need to look carefully, walk slowly, sit down sometimes and don’t move for a while. Then you see the world around you come to life. 🪶", "axes": {"reading_level": 0.25, "concreteness": 0.65, "narrativity": 0.6, "hedging": 0.15, "tone": 0.4, "warmth": 0.8, "self_disclosure": 0.75, "casualness": 0.5, "humor": 0.0}}]}, {"f": 20, "density": 0.1753, "category": "novel_candidate", "lifts": {"reading_level": 0.005, "concreteness": 0.041, "narrativity": 0.012, "hedging": -0.011, "tone": -0.022, "warmth": 0.052, "self_disclosure": 0.029, "casualness": -0.015, "humor": -0.059}, "rs": {"reading_level": -0.009, "concreteness": 0.081, "narrativity": 0.006, "hedging": -0.045, "tone": -0.064, "warmth": 0.072, "self_disclosure": 0.011, "casualness": -0.034, "humor": -0.07}, "best_axis": "concreteness", "best_r": 0.081, "best_lift": -0.059, "examples": [{"pid": "15179966", "topic": "AI & Tech", "activation": 0.2885, "text": "And here we have definitive proof a B&W filter will not make your photo artsy.  Some images will forever be fartsy.", "axes": {}}, {"pid": "155586333", "topic": "AI & Tech", "activation": 0.2723, "text": "Half these AI videos people are saying are so realistic feel like they were produced by the protomolecule", "axes": {}}, {"pid": "195299139", "topic": "Photography", "activation": 0.2539, "text": "Making progress with the wedding photos, will have to select a couple of the B&W's to print in the darkroom also", "axes": {"reading_level": 0.4, "concreteness": 0.6, "narrativity": 0.3, "hedging": 0.3, "tone": 0.35, "warmth": 0.55, "self_disclosure": 0.4, "casualness": 0.5, "humor": 0.0}}, {"pid": "99590764", "topic": "Photography", "activation": 0.2359, "text": "Another shot of the Cathedral of St. Paul. This one is a little less pushed in the High Key mode, although still monochrome. #photography 📷📸", "axes": {}}, {"pid": "11809178", "topic": "AI & Tech", "activation": 0.2256, "text": "Seeing lot of people proudly showing off pictures of the moon taken with their Samsung phones, not realizing that their special \"moon zoom\" feature is actually an AI overlay over anything the camera recognizes as the moon.", "axes": {"reading_level": 0.45, "concreteness": 0.65, "narrativity": 0.35, "hedging": 0.2, "tone": 0.55, "warmth": 0.25, "self_disclosure": 0.15, "casualness": 0.5, "humor": 0.55}}, {"pid": "152877518", "topic": "Video Games", "activation": 0.2191, "text": "I think people perceive 3D images as artier and more eye-catching, but unfortunately they tend to be terrible representative images on BGG.\n\nPublishers, you want people to be able to spot your game in a store, so please use 2D front cover images to make your game more visible. —WEM", "axes": {}}, {"pid": "49283046", "topic": "AI & Tech", "activation": 0.2187, "text": "seein generated art genuinely makes me sick to my stomach it always looks too smooth and gross and i dont care how silly or fun the concept is, its always fundamentally unsettling", "axes": {}}, {"pid": "18254232", "topic": "AI & Tech", "activation": 0.2153, "text": "Just tried the same image prompt on four different generative AI image generators. At least on this test, the new Meta image generator seems best...", "axes": {}}, {"pid": "99560027", "topic": "Photography", "activation": 0.209, "text": "The spectra Polaroid film jammed in the camera and had to be dragged out with forceps! Beautiful imperfection", "axes": {}}, {"pid": "139742386", "topic": "Gardening & Plants", "activation": 0.2089, "text": "Magnolia shot on Portra 800.  Lovely little flower that will probably get burned by cold before showing itself.", "axes": {}}]}, {"f": 21, "density": 0.1903, "category": "confirms_axis", "lifts": {"reading_level": 0.017, "concreteness": -0.013, "narrativity": -0.014, "hedging": 0.003, "tone": -0.02, "warmth": -0.036, "self_disclosure": -0.137, "casualness": -0.102, "humor": -0.092}, "rs": {"reading_level": 0.068, "concreteness": -0.031, "narrativity": -0.047, "hedging": 0.005, "tone": -0.069, "warmth": -0.11, "self_disclosure": -0.25, "casualness": -0.298, "humor": -0.158}, "best_axis": "casualness", "best_r": -0.298, "best_lift": -0.137, "examples": [{"pid": "23172669", "topic": "Higher Education", "activation": 0.4618, "text": "New York could soon stop requiring many high school students to take Regents exams, a major step in an overhaul of the state’s graduation system.", "axes": {}}, {"pid": "23172692", "topic": "Politics", "activation": 0.3159, "text": "Black voters are more disconnected from the Democratic Party than they have been in decades, frustrated with what many see as inaction on their political priorities and unhappy with President Biden, a candidate they helped lift to the White House.", "axes": {}}, {"pid": "51110406", "topic": "Economy & Jobs", "activation": 0.3138, "text": "Americans have spent down their savings and racked up debt as the economy hums along, but experts are pondering whether consumers can keep going", "axes": {"reading_level": 0.5, "concreteness": 0.4, "narrativity": 0.35, "hedging": 0.6, "tone": 0.45, "warmth": 0.5, "self_disclosure": 0.0, "casualness": 0.2, "humor": 0.0}}, {"pid": "51233039", "topic": "Economy & Jobs", "activation": 0.311, "text": "Ikea says it's going to cut prices this year, and the company's comments on deflation should be setting competitors on edge", "axes": {}}, {"pid": "698858", "topic": "Politics", "activation": 0.3106, "text": "The Biden campaign says it sees a chance to win North Carolina in November. In the primary campaign, Democratic voters say new restrictions on abortion are motivating them to get to the polls.", "axes": {}}, {"pid": "16143566", "topic": "Video Games", "activation": 0.2982, "text": "Sony Interactive Entertainment is laying off about 900 PlayStation employees worldwide, a reduction of about 8%, the company announced this week.", "axes": {}}, {"pid": "82930316", "topic": "Economy & Jobs", "activation": 0.282, "text": "Two more Fed officials pushed back against the depth of interest-rate cuts expected by markets next year, reinforcing similar comments from other US central bankers", "axes": {"reading_level": 0.6, "concreteness": 0.65, "narrativity": 0.35, "hedging": 0.2, "tone": 0.3, "warmth": 0.5, "self_disclosure": 0.0, "casualness": 0.15, "humor": 0.0}}, {"pid": "2029350", "topic": "Ancient History", "activation": 0.2817, "text": "Neanderthals were morning people, a new study suggests. And some humans today who like getting up early might credit genes they inherited from their Neanderthal ancestors.", "axes": {}}, {"pid": "583876", "topic": "Transportation & Urbanism", "activation": 0.2714, "text": "A 7-year-old boy was killed when the driver of an NYPD tow truck hit him while he was crossing a street in Brooklyn on Thursday morning, the police said.", "axes": {}}, {"pid": "438496", "topic": "Politics", "activation": 0.2672, "text": "Car crashes into Biden's motorcade as president leaves campaign event in Delaware. Biden was rushed into his car and was not involved", "axes": {}}]}, {"f": 22, "density": 0.0, "category": "dead", "lifts": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "rs": {"reading_level": 0.0, "concreteness": 0.0, "narrativity": 0.0, "hedging": 0.0, "tone": 0.0, "warmth": 0.0, "self_disclosure": 0.0, "casualness": 0.0, "humor": 0.0}, "best_axis": "reading_level", "best_r": 0.0, "best_lift": 0.0, "examples": []}, {"f": 23, "density": 0.2313, "category": "novel_candidate", "lifts": {"reading_level": 0.0, "concreteness": -0.005, "narrativity": -0.013, "hedging": 0.005, "tone": 0.011, "warmth": -0.015, "self_disclosure": -0.019, "casualness": 0.001, "humor": 0.04}, "rs": {"reading_level": -0.037, "concreteness": -0.051, "narrativity": -0.064, "hedging": 0.0
