<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RecMod — Evaluation</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f14; color: #e4e4e7; min-height: 100vh; }

.container { max-width: 900px; margin: 0 auto; padding: 24px; }

header { text-align: center; margin-bottom: 32px; }
header h1 { font-size: 1.6rem; font-weight: 600; }
header p { color: #9ca3af; margin-top: 8px; font-size: 0.95rem; }

.progress-bar { background: #1f1f28; border-radius: 8px; height: 6px; margin: 20px 0; overflow: hidden; }
.progress-fill { height: 100%; background: #4b5563; transition: width 0.4s ease; }

.trial-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 24px 0; }

.post-card {
  background: #1a1a24;
  border: 2px solid #2a2a3a;
  border-radius: 12px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.2s ease;
  line-height: 1.6;
  font-size: 0.95rem;
}
.post-card:hover { border-color: #4b5563; transform: translateY(-2px); box-shadow: 0 4px 20px rgba(75, 85, 99, 0.15); }
.post-card.selected { border-color: #d1d5db; background: #1f2937; box-shadow: 0 0 0 3px rgba(209, 213, 219, 0.1); }

.instruction { text-align: center; color: #9ca3af; font-size: 1rem; margin: 16px 0; }
.instruction strong { color: #e4e4e7; }

.label-tag { display: inline-block; background: #2a2a3a; color: #9ca3af; font-size: 0.75rem; padding: 2px 8px; border-radius: 4px; margin-bottom: 12px; }

button.submit-btn {
  display: block; margin: 24px auto; padding: 12px 32px;
  background: #374151;
  color: white; border: none; border-radius: 8px;
  font-size: 1rem; font-weight: 500; cursor: pointer;
  opacity: 0.4; pointer-events: none; transition: all 0.2s;
}
button.submit-btn.active { opacity: 1; pointer-events: auto; }
button.submit-btn.active:hover { transform: scale(1.02); }

.loading { text-align: center; padding: 60px; color: #9ca3af; }
.loading .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #3a3a4a; border-top-color: #9ca3af; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

.results { text-align: center; padding: 40px; }
.results h2 { font-size: 1.4rem; margin-bottom: 16px; }
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin: 24px 0; }
.stat-card { background: #1a1a24; border-radius: 10px; padding: 20px; }
.stat-card .value { font-size: 2rem; font-weight: 700; color: #e5e7eb; }
.stat-card .label { color: #9ca3af; font-size: 0.85rem; margin-top: 4px; }

.dev-toggle { position: fixed; top: 12px; right: 12px; font-size: 0.8rem; color: #6b7280; }
.dev-toggle label { cursor: pointer; }
.dev-info { background: #111118; border: 1px solid #2a2a3a; border-radius: 8px; padding: 12px; margin-top: 12px; font-size: 0.8rem; color: #6b7280; display: none; }
.dev-info.visible { display: block; }
</style>
</head>
<body>

<div class="dev-toggle">
  <label><input type="checkbox" id="dev-mode"> Dev details</label>
</div>

<div class="container">
  <header>
    <h1>Pick the one you'd rather read.</h1>
    <p></p>
  </header>

  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="instruction" id="step-label"></div>

  <div id="loading" class="loading" style="display:none;">
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>

  <div id="trial-area" style="display:none;">
    <div class="trial-container">
      <div class="post-card" id="left-card" onclick="selectSide('left')">
        <span class="label-tag">A</span>
        <div id="left-text"></div>
      </div>
      <div class="post-card" id="right-card" onclick="selectSide('right')">
        <span class="label-tag">B</span>
        <div id="right-text"></div>
      </div>
    </div>
    <div class="dev-info" id="dev-info"></div>
    <button class="submit-btn" id="submit-btn" onclick="submitChoice()">Next →</button>
  </div>

  <div id="results-area" style="display:none;" class="results"></div>
</div>

<script>
const API = '';
const params = new URLSearchParams(window.location.search);
const sessionId = params.get('session');
const includeTypeC = params.get('type_c') === '1';

let trials = [];
let currentIdx = 0;
let selectedSide = null;

async function init() {
  if (!sessionId) {
    document.querySelector('.container').innerHTML = '<p class="loading">No session ID. Complete seeding first, then come here.</p>';
    return;
  }

  document.getElementById('loading').style.display = 'block';

  const res = await fetch(`${API}/api/eval/start`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ session_id: sessionId, include_type_c: includeTypeC }),
  });

  if (!res.ok) {
    const err = await res.json();
    document.getElementById('loading').innerHTML = `<p>Error: ${err.detail || 'Failed to start evaluation'}</p>`;
    return;
  }

  const data = await res.json();
  trials = data.trials;
  document.getElementById('loading').style.display = 'none';
  document.getElementById('trial-area').style.display = 'block';
  showTrial();
}

function showTrial() {
  if (currentIdx >= trials.length) {
    showResults();
    return;
  }

  const trial = trials[currentIdx];
  document.getElementById('left-text').textContent = trial.left_text;
  document.getElementById('right-text').textContent = trial.right_text;
  document.getElementById('step-label').innerHTML = `<strong>${currentIdx + 1}</strong> of ${trials.length}`;
  document.getElementById('progress-fill').style.width = `${((currentIdx) / trials.length) * 100}%`;

  // Reset selection
  selectedSide = null;
  document.getElementById('left-card').classList.remove('selected');
  document.getElementById('right-card').classList.remove('selected');
  document.getElementById('submit-btn').classList.remove('active');

  // Dev info
  document.getElementById('dev-info').textContent = `Trial: ${trial.trial_id}`;
}

function selectSide(side) {
  selectedSide = side;
  document.getElementById('left-card').classList.toggle('selected', side === 'left');
  document.getElementById('right-card').classList.toggle('selected', side === 'right');
  document.getElementById('submit-btn').classList.add('active');
}

async function submitChoice() {
  if (!selectedSide) return;

  const trial = trials[currentIdx];
  await fetch(`${API}/api/eval/respond`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      session_id: sessionId,
      trial_id: trial.trial_id,
      chosen_side: selectedSide,
    }),
  });

  currentIdx++;
  showTrial();
}

async function showResults() {
  document.getElementById('trial-area').style.display = 'none';
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('step-label').textContent = '';

  const res = await fetch(`${API}/api/eval/results/${sessionId}`);
  const data = await res.json();
  const s = data.stats;

  const area = document.getElementById('results-area');
  area.style.display = 'block';

  let html = `<h2>Evaluation Complete</h2><p>${s.total_trials} trials completed</p>`;
  html += `<div class="stat-grid">`;
  html += `<div class="stat-card"><div class="value">${(s.overall_win_rate * 100).toFixed(0)}%</div><div class="label">Overall: adapted preferred</div></div>`;

  for (const [type, info] of Object.entries(s.by_type)) {
    const labels = {A: 'Same relevance', B: 'Reach test', C: 'Same post'};
    html += `<div class="stat-card"><div class="value">${(info.win_rate * 100).toFixed(0)}%</div><div class="label">${labels[type] || type} (n=${info.total})</div></div>`;
  }
  html += `</div>`;

  // Per-axis breakdown
  if (Object.keys(s.by_axis).length) {
    html += `<h3 style="margin-top:24px; font-size:1rem;">By axis transformed</h3><div class="stat-grid">`;
    for (const [ax, info] of Object.entries(s.by_axis)) {
      html += `<div class="stat-card"><div class="value">${(info.win_rate * 100).toFixed(0)}%</div><div class="label">${ax.replace('_',' ')} (n=${info.total})</div></div>`;
    }
    html += `</div>`;
  }

  area.innerHTML = html;
}

// Dev toggle
document.getElementById('dev-mode').addEventListener('change', (e) => {
  document.getElementById('dev-info').classList.toggle('visible', e.target.checked);
});

init();
</script>
</body>
</html>
